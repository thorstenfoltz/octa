site_name: Octa
site_description: A desktop application for viewing and editing tabular data files.
site_url: https://thorstenfoltz.github.io/octa/
repo_url: https://github.com/thorstenfoltz/octa
repo_name: thorstenfoltz/octa

# The site footer shows whatever string is here. Setting `copyright:` also
# suppresses the "Made with Material for MkDocs" generator credit that
# Material renders by default.
copyright: Octa is MIT-licensed. Source on <a href="https://github.com/thorstenfoltz/octa">GitHub</a>.

theme:
  name: material
  language: en
  logo: assets/octa-rose.svg
  favicon: assets/octa-rose.svg
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    # Light mode (default — matches Octa's default UI theme).
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    # Dark mode.
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  font:
    text: Roboto
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

extra:
  # Suppress the "Made with Material for MkDocs" generator credit shown
  # under the footer copyright. `copyright:` above provides the
  # replacement footer text.
  generator: false

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator:
        !!python/name:material.extensions.emoji.to_svg # Nav matches the IA in the docs plan. Pages get created during Phase 1.



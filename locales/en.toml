autocomplete = "Offer SQL keyword and column-name suggestions\nbeneath the SQL editor."
editor_font = "Font face used by the SQL editor and its line-number\ngutter. JetBrains Mono is bundled with Octa.\n\nNote: programming ligatures are not applied - egui's\ntext renderer does not process OpenType GSUB\nsubstitutions yet."
sql_diff_highlight = "After an INSERT/UPDATE/DELETE query, briefly highlight the cells and rows it changed."
sql_diff_secs = "How long the SQL-change highlight stays before it fades."
mcp_intro = "Defaults for the MCP server (`octa --mcp`). The server reads these once at startup; changing them while a server is running needs an `octa --mcp` restart."
mcp_row_limit = "Maximum rows returned by `read_table` / `run_sql` when the caller omits `limit`. The tool schema advertises this default to the model so it can ask for more (or unlimited) when needed.\n\nDefault: 1,000. Setting this high - or checking Unlimited - can push very large responses through stdio and slow down the MCP client."
cell_byte_cap = "Per-cell on-wire size cap. Cells whose textual form exceeds this are replaced with a `[truncated: ...]` marker and the response flags `cell_truncated: true`. Set to 0 to disable the cap.\n\nDefault: 65,536 (64 KiB)."
chat_intro = "In-app AI assistant that drives Octa's tools against your open tabs and files. Pick a provider and set its API key (or run Ollama locally), then open the panel from the toolbar (Analyse menu, Assistant)."
chat_max_iterations = "Maximum number of tool-call rounds the assistant may run within a single message before it must stop. A guard against runaway tool loops."
chat_max_tokens = "Cap on the response length (in tokens) requested per reply. Unlimited lets the model use its own maximum (Anthropic always needs a cap, so it uses a high value there)."
chat_provider = "Which LLM backend the assistant talks to. Each provider needs its own API key, except Ollama which runs locally."
chat_model = "The model used for this provider. Pick a preset or type any model name."
chat_base_url = "Base URL for the OpenAI-compatible endpoint (OpenRouter, Groq, LM Studio, a custom gateway)."
chat_ollama_url = "Root URL of your local Ollama server. Octa appends the API paths."
chat_temperature = "Sampling randomness, from 0 (focused, deterministic) to 2 (creative). 0 is recommended for data tasks."
chat_position = "Where the chat panel docks relative to the table."
chat_export_dir = "Folder the assistant writes exported files into (new CSVs, charts) when you do not give a full path."
chat_audit_log = "Append every assistant tool call to a log under the config directory (chat_audit/). Off by default."
chat_audit_warn = "Show a warning at startup when the audit logs grow past this size."
chat_api_key = "Your API key for this provider. Stored in your OS keyring when available, otherwise in plaintext in settings.toml."
map_intro = "Defaults for the Map view (used by GeoJSON files). The active tab can flip between Tiles and Geometry-only via the Map toolbar."
map_default_mode = "Tiles: fetch a slippy map from the configured tile URL.\nGeometry only: paint just the features on a blank canvas."
map_fallback = "When tile fetch fails (offline, blocked), automatically switch to geometry-only rendering for that tab."
tile_url = "URL pattern for raster tiles. `{z}/{x}/{y}` are substituted with the zoom level and tile coordinates. Default points at the OSM tile server - for production / heavy use, point at a self-hosted or commercial provider."
sidebar_position = "Which side the directory tree is docked on when a\nfolder is opened via File > Open Directory."
shortcuts_intro = "Click 'Record' then press a key combo (with Ctrl / Shift / Alt).\nPress Esc to cancel recording. 'Clear' leaves the action unbound."
initial_load_cap = "Maximum rows loaded into the table on first open for\nstreaming formats (Parquet, CSV, TSV). Remaining rows\nstream in the background as you scroll.\n\nDefault: 5,000,000. Raising it improves first-paint\ncompleteness but uses more memory. Lowering it makes\nthe initial open faster but pushes more work onto\nthe background loader. Tick \"Unlimited\" to disable\nthe cap entirely and load every row up front.\n\nType a number - applied on Apply."
raw_view_cap = "Maximum file size (in MB) Octa reads fully into the Raw\nview editor. Also gates the parse-error raw fallback and\nthe Compare view's raw side. Larger files skip raw text to\nprotect memory.\n\nDefault: 500 MB. Tick \"Unlimited\" to load any file\nregardless of size. Applied on Apply."
raw_view_unlimited = "Read the full text of any file into the Raw view, with\nno size limit. Use only with RAM to spare - a multi-GB\nfile is read entirely into memory."
initial_load_unlimited = "Load every row in the file up front. Recommended only\nwhen you have RAM to spare - a 100 M-row parquet eats\nseveral GB."
syntax_size_cap = "Files larger than this fall back to plain monospace in\nthe raw editor. Set to 0 to disable syntax highlighting\nentirely; set a very large number to opt out of the\nguard. JSON/YAML/XML/Markdown/TOML are never highlighted\n- they use their dedicated tree/preview views.\n\nDefault: 1 MB. Type a number, pick a unit - applied on Apply."
open_as_text = "Extra file extensions to treat as plain text on open\n(overrides whatever reader would normally claim them).\nComma- or space-separated, no leading dot, lowercase.\nExample: log4j  myproj  rawdata\n\nApplied on Apply; takes effect for subsequent file opens."
multi_search_cap = "Per-file size cap for the Multi-search panel's directory\nscope. Files larger than this are skipped and listed in\nthe skipped-files chip. Set to 0 to disable the cap.\n\nDefault: 50 MB."
chart_max_points = "Maximum rows the Chart tab will plot before evenly-spaced\ndownsampling kicks in (Histogram, Line, Scatter). Bar charts\nalways aggregate the full input; Box plots compute the\n5-number summary over the full input. Set to 0 to disable\nsampling - only safe for moderately-sized tables.\n\nDefault: 100,000. Numeric input accepts comma separators."
chart_max_categories = "Maximum distinct X categories a Bar chart will accept before\nrefusing to draw. Above this the renderer surfaces an error\nrather than producing an unreadable wall of bars - filter or\naggregate the table first.\n\nDefault: 200. Numeric input accepts comma separators."
tables_in_picker = "How many table rows the multi-table picker dialog (SQLite,\nDuckDB, ...) should fit vertically at its default size. The\ndialog is still user-resizable - drag the corner to make\nit bigger when a database has many tables.\n\nDefault: 10. Minimum 1."
excel_auto_open = "How many sheets of a multi-sheet Excel workbook to open\nautomatically (each in its own tab). Workbooks with more\nsheets than this show a picker so you choose which to open\n(you can still pick more than this number, or all).\n\nDefault: 5. Minimum 1."
max_recent = "Number of recently opened files shown in the File menu"
start_maximised = "When on, the window opens maximised (filling the whole\nscreen), and the size below only takes effect once you\nun-maximise it. When off, the window opens at the chosen size."
initial_window_size = "Pixel size of the window when it is NOT maximised. A maximised\nwindow always fills the screen, so on a maximised window every\nsize looks the same; this only applies once you un-maximise\n(or with \"Start maximised\" turned off)."

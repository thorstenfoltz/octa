shortcuts_intro = "Kliknite „Snimaj“ pa pritisnite kombinaciju tipki (s Ctrl / Shift / Alt).\nPritisnite Esc za otkazivanje snimanja. „Očisti“ ostavlja radnju nepovezanom."
initial_load_cap = "Maksimalan broj redaka učitanih u tablicu pri prvom otvaranju za\nstreaming formate (Parquet, CSV, TSV). Preostali retci\nse učitavaju u pozadini dok pomičete.\n\nZadano: 5,000,000. Povećanje poboljšava potpunost\nprvog iscrtavanja ali koristi više memorije. Smanjenje čini\npočetno otvaranje bržim ali prebacuje više posla na\npozadinski učitavač. Označite „Neograničeno“ da onemogućite\nograničenje u potpunosti i učitate svaki redak odmah.\n\nUnesite broj — primjenjuje se pri Primijeni."
raw_view_cap = "Najveća veličina datoteke (u MB) koju Octa u cijelosti učitava u uređivač\nsirovog prikaza. Ograničava i sirovi zamjenski prikaz pri pogrešci\nraščlanjivanja te sirovu stranu prikaza usporedbe. Veće datoteke preskaču\nsirovi tekst radi zaštite memorije.\n\nZadano: 500 MB. Označite \"Neograničeno\" za učitavanje svake\ndatoteke bez obzira na veličinu. Primjenjuje se pri potvrdi."
decompress_cap = "Najveća raspakirana veličina (u MB) za prozirno otvorene\n.gz / .zst datoteke. Sitna sažeta datoteka može se golemo napuhati\n(bomba raspakiranja); iznad ovog ograničenja otvaranje se odbija.\n\nZadano: 4.295 MB (4 GB). Primjenjuje se pri potvrdi."
decompress_unlimited = "Potpuno ukloni ograničenje veličine raspakiranja. Označite ovo\nsamo za arhive kojima vjerujete."
raw_view_unlimited = "Učitaj cijeli tekst bilo koje datoteke u sirovi prikaz, bez\nograničenja veličine. Koristite samo uz višak RAM-a - datoteka od\nviše GB u cijelosti se učitava u memoriju."
initial_load_unlimited = "Učitaj svaki redak u datoteci odmah. Preporučuje se samo\nkada imate viška RAM-a — parquet od 100 M redaka pojede\nnekoliko GB."
syntax_size_cap = "Datoteke veće od ovoga prelaze na obični monospace u\nsirovom uređivaču. Postavite 0 da onemogućite isticanje\nsintakse u potpunosti; postavite vrlo velik broj da odustanete\nod zaštite. JSON/YAML/XML/Markdown/TOML se nikada ne ističu\n— oni koriste svoje namjenske prikaze stablo/pregled.\n\nZadano: 1 MB. Unesite broj, odaberite jedinicu — primjenjuje se pri Primijeni."
open_as_text = "Dodatne ekstenzije datoteka koje se tretiraju kao obični tekst pri\notvaranju (zamjenjuje čitač koji bi ih obično preuzeo).\nOdvojeno zarezom ili razmakom, bez početne točke, malim slovima.\nPrimjer: log4j  myproj  rawdata\n\nPrimjenjuje se pri Primijeni; stupa na snagu za naredna otvaranja datoteka."
multi_search_cap = "Ograničenje veličine datoteke za opseg direktorija ploče Višestruko pretraživanje.\nDatoteke veće od ovoga se preskaču i navode u oznaci\npreskočenih datoteka. Postavite 0 da onemogućite ograničenje.\n\nZadano: 50 MB."
chart_max_points = "Maksimalan broj redaka koje kartica Grafikon crta prije nego što se\nuključi ravnomjerno prorjeđivanje (Histogram, Linija, Raspršeni). Trakasti grafikoni\nuvijek agregiraju cijeli ulaz; Kutijasti računaju\n5-brojni sažetak nad cijelim ulazom. Postavite 0 da onemogućite\nprorjeđivanje — sigurno samo za umjereno velike tablice.\n\nZadano: 100,000. Numerički unos prihvaća razdjelnike-zareze."
chart_max_categories = "Maksimalan broj različitih X kategorija koje trakasti grafikon prihvaća prije nego\nšto odbije crtati. Iznad toga renderer prikazuje pogrešku\numjesto da napravi nečitljiv zid traka — prvo filtrirajte ili\nagregirajte tablicu.\n\nZadano: 200. Numerički unos prihvaća razdjelnike-zareze."
tables_in_picker = "Koliko redaka tablica dijalog za odabir višetabličnih izvora (SQLite,\nDuckDB, ...) treba uklopiti okomito pri zadanoj veličini. Dijalog\nse i dalje može mijenjati po veličini — povucite kut da ga napravite\nvećim kada baza podataka ima mnogo tablica.\n\nZadano: 10. Minimum 1."
excel_auto_open = "Koliko listova višelistne Excel radne knjige otvoriti\nautomatski (svaki u svojoj kartici). Radne knjige s više\nlistova od ovoga prikazuju birač da odaberete koje otvoriti\n(i dalje možete odabrati više od ovog broja, ili sve).\n\nZadano: 5. Minimum 1."
max_recent = "Broj nedavno otvaranih datoteka prikazanih u izborniku Datoteka"
start_maximised = "Kada je uključeno, prozor se pokreće maksimiziran, a veličina ispod\nse koristi kao veličina vraćanja iz maksimiziranja.\nKada je isključeno, prozor se pokreće odabranom veličinom."
initial_window_size = "Veličina prozora pri pokretanju (kada je „Pokreni maksimizirano“ isključeno),\nili veličina vraćanja iz maksimiziranja kada je uključeno."

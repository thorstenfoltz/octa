chat_audit_warn = "Zobrazit varovani pri spusteni, kdyz protokoly prekroci tuto velikost."
chat_api_key = "Váš klíč API pro tohoto poskytovatele. Uložen v úložišti klíčů OS, je-li dostupné, jinak jako prostý text v settings.toml."
map_intro = "Výchozí hodnoty zobrazení Mapa (pro soubory GeoJSON). Aktivní karta může přepínat mezi Dlaždicemi a Pouze geometrií přes panel Mapa."
map_default_mode = "Dlaždice: načíst posuvnou mapu z nastavené URL dlaždic.\nPouze geometrie: vykreslit jen prvky na prázdné plátno."
map_fallback = "Když načtení dlaždic selže (offline, blokováno), automaticky přepne na vykreslení pouze geometrie pro tuto kartu."
tile_url = "Vzor URL pro rastrové dlaždice. `{z}/{x}/{y}` se nahradí úrovní přiblížení a souřadnicemi dlaždice. Výchozí ukazuje na dlaždicový server OSM - pro produkci / intenzivní použití zamiřte na vlastní nebo komerční poskytovatele."
sidebar_position = "Na které straně je ukotven strom adresářů, když se\nsložka otevře přes Soubor > Otevřít složku."
shortcuts_intro = "Klikněte na 'Zaznamenat' a stiskněte kombinaci kláves (s Ctrl / Shift / Alt).\nEsc zruší záznam. 'Vymazat' ponechá akci nepřiřazenou."
initial_load_cap = "Maximální počet řádků načtených do tabulky při prvním otevření pro\nstreamovací formáty (Parquet, CSV, TSV). Zbývající řádky\nse načítají na pozadí při posouvání.\n\nVýchozí: 5 000 000. Zvýšení zlepší úplnost prvního\nvykreslení, ale spotřebuje více paměti. Snížení zrychlí\nprvní otevření, ale přesune více práce na načítání na\npozadí. Zaškrtněte \"Neomezeně\" pro úplné vypnutí\nlimitu a načtení všech řádků předem.\n\nZadejte číslo - použije se po Použít."
raw_view_cap = "Maximum file size (in MB) Octa reads fully into the Raw\nview editor. Also gates the parse-error raw fallback and\nthe Compare view's raw side. Larger files skip raw text to\nprotect memory.\n\nDefault: 500 MB. Tick \"Unlimited\" to load any file\nregardless of size. Applied on Apply."
raw_view_unlimited = "Read the full text of any file into the Raw view, with\nno size limit. Use only with RAM to spare - a multi-GB\nfile is read entirely into memory."
initial_load_unlimited = "Načíst všechny řádky souboru předem. Doporučeno jen\nkdyž máte RAM nazbyt - parquet se 100 M řádky spotřebuje\nněkolik GB."
syntax_size_cap = "Soubory větší než toto se v nezpracovaném editoru vrátí k\nprostému monospace. 0 zcela vypne zvýrazňování syntaxe;\nvelmi velké číslo se vzdá ochrany. JSON/YAML/XML/Markdown/TOML\nse nikdy nezvýrazňují - používají vlastní stromová/náhledová zobrazení.\n\nVýchozí: 1 MB. Zadejte číslo, vyberte jednotku - po Použít."
open_as_text = "Další přípony souborů, které se při otevření zpracují jako prostý text\n(přepíší čtečku, která by je jinak nárokovala).\nOddělené čárkou nebo mezerou, bez úvodní tečky, malými písmeny.\nPříklad: log4j  myproj  rawdata\n\nProjeví se po Použít pro další otevírání souborů."
multi_search_cap = "Limit velikosti na soubor pro adresářový rozsah panelu\nVícenásobné hledání. Větší soubory se přeskočí a vypíší ve\nštítku přeskočených souborů. 0 vypne limit.\n\nVýchozí: 50 MB."
chart_max_points = "Maximální počet řádků, které karta Graf vykreslí, než se zapne\nrovnoměrné podvzorkování (Histogram, Čára, Bodový). Sloupcové grafy\nvždy agregují celý vstup; krabicové grafy počítají\npětičíselný souhrn z celého vstupu. 0 vypne\nvzorkování - bezpečné jen pro středně velké tabulky.\n\nVýchozí: 100 000. Číselné pole přijímá oddělovače čárkou."
chart_max_categories = "Maximální počet odlišných kategorií X, které sloupcový graf přijme, než\nodmítne vykreslení. Nad touto hranicí vykreslovač zobrazí chybu\nmísto nečitelné zdi sloupců - nejprve tabulku vyfiltrujte nebo\nagregujte.\n\nVýchozí: 200. Číselné pole přijímá oddělovače čárkou."
tables_in_picker = "Kolik řádků tabulky se má vejít svisle v dialogu výběru\nz více tabulek (SQLite, DuckDB, ...) při výchozí velikosti.\nDialog lze stále změnit - tažením rohu jej zvětšíte,\nkdyž má databáze mnoho tabulek.\n\nVýchozí: 10. Minimum 1."
excel_auto_open = "Kolik listů vícelistového sešitu Excelu se otevře\nautomaticky (každý ve své kartě). Sešity s více\nlisty zobrazí výběr, abyste zvolili, které otevřít\n(stále můžete vybrat více, nebo vše).\n\nVýchozí: 5. Minimum 1."
max_recent = "Počet nedávno otevřených souborů zobrazených v nabídce Soubor"
start_maximised = "Když je zapnuto, okno se spustí maximalizované a velikost níže\nse použije jako velikost po obnovení z maximalizace.\nKdyž je vypnuto, okno se spustí ve zvolené velikosti."
initial_window_size = "Velikost okna při spuštění (když je \"Spustit maximalizované\" vypnuto),\nnebo velikost po obnovení z maximalizace, když je zapnuto."
ctrl_close = "Zavřít"

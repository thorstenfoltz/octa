chat_intro = "Vestavěný AI asistent, který ovládá nástroje Octy nad vašimi otevřenými kartami a soubory. Vyberte poskytovatele a nastavte jeho klíč API (nebo spusťte Ollama lokálně), pak otevřete panel z panelu nástrojů (nabídka Analýza, Asistent)."
chat_max_iterations = "Maximální počet kol volání nástrojů, která asistent může v rámci jedné zprávy provést, než se musí zastavit. Pojistka proti nekontrolovaným smyčkám nástrojů."
chat_max_tokens = "Limit délky odpovědi (v tokenech) na jednu odpověď. Neomezeně nechá model použít vlastní maximum (Anthropic vždy potřebuje limit, takže použije vysokou hodnotu)."
chat_provider = "S jakým backendem LLM asistent komunikuje. Každý poskytovatel potřebuje vlastní klíč API, kromě Ollama, která běží lokálně."
chat_model = "Model použitý pro tohoto poskytovatele. Vyberte přednastavení nebo zadejte libovolný název modelu."
chat_base_url = "Základní URL pro koncový bod kompatibilní s OpenAI (OpenRouter, Groq, LM Studio, vlastní brána)."
chat_ollama_url = "Kořenová URL vašeho místního serveru Ollama. Octa připojí cesty API."
chat_temperature = "Náhodnost vzorkování, od 0 (zaměřené, deterministické) po 2 (kreativní). Pro datové úlohy se doporučuje 0."
chat_position = "Kam se panel chatu ukotví vzhledem k tabulce."
chat_export_dir = "Složka, do které asistent zapisuje exportované soubory (nová CSV, grafy), když nezadáte úplnou cestu."

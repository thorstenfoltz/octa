warn_trim = "Pokaż baner z listą kolumn, którym przy wczytywaniu przycięto\nspacje. Niezależne od ustawienia przycinania."
clean_headers = "Normalizuj nagłówki kolumn do identyfikatorów snake_case\nprzy wczytywaniu (przycięte, małe litery, spacje i interpunkcja\nstają się podkreśleniami, duplikaty otrzymują sufiks numeryczny)."
offer_repair = "Gdy CSV/TSV wczytuje się, ale wygląda na uszkodzony (złe\nkodowanie, BOM na początku, znaki sterujące, separator niezgodny\nz rozszerzeniem lub bardzo nierówne wiersze), pokaż monit\noferujący naprawę i ponowne wczytanie. Domyślnie wyłączone;\nnaprawa uruchamia się tylko po potwierdzeniu."
readonly_notice = "Pokazuj okno potwierdzenia za każdym razem, gdy przełączany jest\ntryb tylko do odczytu (przez F8 lub menu Widok). Wyłącz, aby\nprzełączać stan po cichu."
notebook_output = "Pozycja wyniku kodu w widoku Jupyter Notebook\n(dotyczy tylko plików .ipynb w trybie Notebook)"
sql_open_default = "Przy otwieraniu pliku tabelarycznego automatycznie pokazuj\nedytor SQL obok widoku tabeli."
sql_panel_position = "Gdzie edytor SQL dokuje się względem tabeli"
sql_row_limit = "LIMIT używany w zapytaniu szablonowym przy otwarciu karty\n(np. 100 -> SELECT * FROM data LIMIT 100).\nWpisz liczbę - stosowane po kliknięciu Zastosuj."
autocomplete = "Proponuj podpowiedzi słów kluczowych SQL i nazw kolumn\npod edytorem SQL."
editor_font = "Czcionka używana przez edytor SQL i jego pasek numerów wierszy.\nJetBrains Mono jest dołączona do Octa.\n\nUwaga: ligatury programistyczne nie są stosowane - mechanizm\nrenderowania tekstu egui nie przetwarza jeszcze podstawień\nGSUB OpenType."
sql_diff_highlight = "Po zapytaniu INSERT/UPDATE/DELETE krotko podswietl zmienione komorki i wiersze."
sql_diff_secs = "Jak dlugo podswietlenie zmian SQL pozostaje, zanim zniknie."
mcp_intro = "Domyślne wartości serwera MCP (`octa --mcp`). Serwer odczytuje je raz przy starcie; zmiana ich przy działającym serwerze wymaga ponownego uruchomienia `octa --mcp`."
mcp_row_limit = "Maksymalna liczba wierszy zwracanych przez `read_table` / `run_sql`, gdy wywołujący pominie `limit`. Schemat narzędzia ogłasza tę wartość domyślną modelowi, aby mógł poprosić o więcej (lub bez ograniczeń) w razie potrzeby.\n\nDomyślnie: 1,000. Ustawienie wysokiej wartości - lub zaznaczenie Bez ograniczeń - może przepychać bardzo duże odpowiedzi przez stdio i spowalniać klienta MCP."
cell_byte_cap = "Limit rozmiaru na komórkę w transmisji. Komórki, których forma tekstowa przekracza to, są zastępowane znacznikiem `[truncated: ...]`, a odpowiedź sygnalizuje `cell_truncated: true`. Ustaw 0, aby wyłączyć limit.\n\nDomyślnie: 65,536 (64 KiB)."
map_intro = "Domyślne wartości widoku Mapy (używane przez pliki GeoJSON). Aktywna karta może przełączać się między Kafelkami a samą Geometrią z paska Mapy."
chat_intro = "Wbudowany asystent AI, ktory wykorzystuje narzedzia Octa na otwartych kartach i plikach. Wybierz dostawce i ustaw jego klucz API (lub uruchom Ollama lokalnie), a nastepnie otworz panel z paska narzedzi (menu Analizuj, Asystent)."
chat_max_iterations = "Maksymalna liczba rund wywolan narzedzi, ktore asystent moze wykonac w ramach jednej wiadomosci, zanim musi sie zatrzymac. Zabezpieczenie przed niekontrolowanymi petlami."
chat_max_tokens = "Limit dlugosci odpowiedzi (w tokenach) zadanej na odpowiedz. Bez limitu pozwala modelowi uzyc wlasnego maksimum (Anthropic zawsze wymaga limitu, wiec uzywa tam wysokiej wartosci)."
chat_provider = "Ktory backend LLM jest uzywany przez asystenta. Kazdy dostawca wymaga wlasnego klucza API, z wyjatkiem Ollama, ktora dziala lokalnie."
chat_model = "Model uzywany dla tego dostawcy. Wybierz ustawienie wstepne lub wpisz dowolna nazwe modelu."
chat_base_url = "Bazowy URL punktu koncowego zgodnego z OpenAI (OpenRouter, Groq, LM Studio, wlasna brama)."
chat_ollama_url = "Glowny URL lokalnego serwera Ollama. Octa dodaje sciezki API."
chat_temperature = "Losowosc probkowania, od 0 (skupione, deterministyczne) do 2 (kreatywne). Do zadan na danych zalecane jest 0."
chat_position = "Gdzie panel czatu jest zadokowany wzgledem tabeli."
chat_export_dir = "Folder, do ktorego asystent zapisuje wyeksportowane pliki (nowe pliki CSV, wykresy), gdy nie podasz pelnej sciezki."
chat_audit_log = "Dopisuje kazde wywolanie narzedzia asystenta do dziennika w katalogu konfiguracji (chat_audit/). Domyslnie wylaczone."
chat_audit_warn = "Pokaz ostrzezenie przy starcie, gdy dzienniki przekrocza ten rozmiar."
chat_api_key = "Twoj klucz API dla tego dostawcy. Przechowywany w pecherzyku kluczy systemu, jesli jest dostepny, w przeciwnym razie jako zwykly tekst w settings.toml."
map_default_mode = "Kafelki: pobierz mapę slippy z skonfigurowanego URL kafelków.\nTylko geometria: rysuj tylko obiekty na pustym płótnie."
map_fallback = "Gdy pobieranie kafelków zawiedzie (offline, zablokowane), automatycznie przełącz na renderowanie samej geometrii dla tej karty."
tile_url = "Wzorzec URL dla kafelków rastrowych. `{z}/{x}/{y}` są zastępowane poziomem powiększenia i współrzędnymi kafelka. Domyślnie wskazuje na serwer kafelków OSM - na produkcję / intensywne użycie wskaż własny lub komercyjny serwer."
sidebar_position = "Po której stronie dokuje się drzewo katalogów, gdy folder\njest otwierany przez Plik > Otwórz katalog."
shortcuts_intro = "Kliknij 'Nagraj' i naciśnij kombinację klawiszy (z Ctrl / Shift / Alt).\nNaciśnij Esc, aby anulować nagrywanie. 'Wyczyść' pozostawia akcję bez przypisania."
initial_load_cap = "Maksymalna liczba wierszy wczytywanych do tabeli przy pierwszym\notwarciu dla formatów strumieniowych (Parquet, CSV, TSV). Pozostałe\nwiersze doczytują się w tle podczas przewijania.\n\nDomyślnie: 5,000,000. Zwiększenie poprawia kompletność pierwszego\nrysowania, ale zużywa więcej pamięci. Zmniejszenie przyspiesza\npierwsze otwarcie, ale przenosi więcej pracy na moduł ładujący w tle.\nZaznacz \"Bez ograniczeń\", aby całkiem wyłączyć limit i wczytać\nwszystkie wiersze od razu.\n\nWpisz liczbę - stosowane po kliknięciu Zastosuj."
raw_view_cap = "Maximum file size (in MB) Octa reads fully into the Raw\nview editor. Also gates the parse-error raw fallback and\nthe Compare view's raw side. Larger files skip raw text to\nprotect memory.\n\nDefault: 500 MB. Tick \"Unlimited\" to load any file\nregardless of size. Applied on Apply."
raw_view_unlimited = "Read the full text of any file into the Raw view, with\nno size limit. Use only with RAM to spare - a multi-GB\nfile is read entirely into memory."
initial_load_unlimited = "Wczytaj od razu wszystkie wiersze pliku. Zalecane tylko\ngdy masz nadmiar RAM - parquet z 100 mln wierszy zjada\nkilka GB."
syntax_size_cap = "Pliki większe niż to przechodzą na zwykły monospace w edytorze\nsurowym. Ustaw 0, aby całkiem wyłączyć podświetlanie składni;\nustaw bardzo dużą liczbę, aby zrezygnować z zabezpieczenia.\nJSON/YAML/XML/Markdown/TOML nigdy nie są podświetlane - używają\nwłasnych widoków drzewa/podglądu.\n\nDomyślnie: 1 MB. Wpisz liczbę, wybierz jednostkę - stosowane po Zastosuj."
open_as_text = "Dodatkowe rozszerzenia plików traktowane jako zwykły tekst przy\notwieraniu (zastępuje czytnik, który normalnie by je przejął).\nOddzielone przecinkami lub spacjami, bez kropki na początku, małymi\nliterami.\nPrzykład: log4j  myproj  rawdata\n\nStosowane po Zastosuj; działa dla kolejnych otwarć plików."
multi_search_cap = "Limit rozmiaru na plik dla zakresu katalogu panelu Wyszukiwania\nwielokrotnego. Większe pliki są pomijane i wymieniane w chipie\npominiętych plików. Ustaw 0, aby wyłączyć limit.\n\nDomyślnie: 50 MB."
chart_max_points = "Maksymalna liczba wierszy, które karta Wykres narysuje, zanim\nwłączy się równomierne próbkowanie (Histogram, Linia, Punktowy).\nWykresy słupkowe zawsze agregują całe wejście; wykresy pudełkowe\nliczą podsumowanie 5-liczbowe na całym wejściu. Ustaw 0, aby\nwyłączyć próbkowanie - bezpieczne tylko dla tabel umiarkowanej\nwielkości.\n\nDomyślnie: 100,000. Wejście liczbowe akceptuje separatory przecinka."
chart_max_categories = "Maksymalna liczba odrębnych kategorii X, którą wykres słupkowy\nzaakceptuje, zanim odmówi rysowania. Powyżej tego mechanizm\nrenderujący pokazuje błąd zamiast nieczytelnej ściany słupków -\nnajpierw przefiltruj lub zagreguj tabelę.\n\nDomyślnie: 200. Wejście liczbowe akceptuje separatory przecinka."
tables_in_picker = "Ile wierszy tabeli ma zmieścić pionowo okno wyboru wielu tabel\n(SQLite, DuckDB, ...) przy swoim domyślnym rozmiarze. Okno nadal\nmożna skalować - przeciągnij róg, aby je powiększyć, gdy baza ma\nwiele tabel.\n\nDomyślnie: 10. Minimum 1."
excel_auto_open = "Ile arkuszy wieloarkuszowego skoroszytu Excel otwierać\nautomatycznie (każdy w swojej karcie). Skoroszyty z większą liczbą\narkuszy pokazują okno wyboru, w którym wybierasz, które otworzyć\n(nadal możesz wybrać więcej niż ta liczba lub wszystkie).\n\nDomyślnie: 5. Minimum 1."
max_recent = "Liczba ostatnio otwieranych plików pokazywanych w menu Plik"
start_maximised = "Gdy włączone, okno uruchamia się zmaksymalizowane, a rozmiar poniżej\njest używany jako rozmiar przywracania.\nGdy wyłączone, okno uruchamia się w wybranym rozmiarze."
initial_window_size = "Rozmiar okna przy starcie (gdy \"Uruchom zmaksymalizowane\" jest\nwyłączone) lub rozmiar przywracania, gdy jest włączone."
ctrl_close = "Zamknij"
ctrl_restore = "Przywróć"
ctrl_full_size = "Pełny rozmiar"
ctrl_minimise = "Minimalizuj"


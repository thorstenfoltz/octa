chat_api_key = "Twoj klucz API dla tego dostawcy. Przechowywany w pecherzyku kluczy systemu, jesli jest dostepny, w przeciwnym razie jako zwykly tekst w settings.toml."
map_default_mode = "Kafelki: pobierz mapę slippy z skonfigurowanego URL kafelków.\nTylko geometria: rysuj tylko obiekty na pustym płótnie."

mcp_row_limit = "Maksymalna liczba wierszy zwracanych przez `read_table` / `run_sql`, gdy wywołujący pominie `limit`. Schemat narzędzia ogłasza tę wartość domyślną modelowi, aby mógł poprosić o więcej (lub bez ograniczeń) w razie potrzeby.\n\nDomyślnie: 1,000. Ustawienie wysokiej wartości - lub zaznaczenie Bez ograniczeń - może przepychać bardzo duże odpowiedzi przez stdio i spowalniać klienta MCP."
cell_byte_cap = "Limit rozmiaru na komórkę w transmisji. Komórki, których forma tekstowa przekracza to, są zastępowane znacznikiem `[truncated: ...]`, a odpowiedź sygnalizuje `cell_truncated: true`. Ustaw 0, aby wyłączyć limit.\n\nDomyślnie: 65,536 (64 KiB)."
map_intro = "Domyślne wartości widoku Mapy (używane przez pliki GeoJSON). Aktywna karta może przełączać się między Kafelkami a samą Geometrią z paska Mapy."

initial_load_cap = "Nombre maximal de lignes chargées dans le tableau à la première\nouverture pour les formats en flux (Parquet, CSV, TSV). Les lignes\nrestantes se chargent en arrière-plan au défilement.\n\nPar défaut : 5,000,000. L'augmenter améliore la complétude du\npremier rendu mais consomme plus de mémoire. Le réduire accélère\nl'ouverture initiale mais reporte plus de travail sur le chargeur\nd'arrière-plan. Cochez \"Illimité\" pour désactiver la limite et\ncharger toutes les lignes d'emblée.\n\nSaisissez un nombre - appliqué via Appliquer."
raw_view_cap = "Maximum file size (in MB) Octa reads fully into the Raw\nview editor. Also gates the parse-error raw fallback and\nthe Compare view's raw side. Larger files skip raw text to\nprotect memory.\n\nDefault: 500 MB. Tick \"Unlimited\" to load any file\nregardless of size. Applied on Apply."
raw_view_unlimited = "Read the full text of any file into the Raw view, with\nno size limit. Use only with RAM to spare - a multi-GB\nfile is read entirely into memory."
initial_load_unlimited = "Charger toutes les lignes du fichier d'emblée. Recommandé\nuniquement si vous avez de la RAM à revendre - un parquet de\n100 M de lignes consomme plusieurs Go."
syntax_size_cap = "Les fichiers plus grands que ceci basculent en monospace simple\ndans l'éditeur brut. Mettre 0 pour désactiver entièrement la\ncoloration syntaxique ; mettre un très grand nombre pour ignorer\nla garde. JSON/YAML/XML/Markdown/TOML ne sont jamais colorés -\nils utilisent leurs vues arbre/aperçu dédiées.\n\nPar défaut : 1 Mo. Saisissez un nombre, choisissez une unité - appliqué via Appliquer."
open_as_text = "Extensions de fichier supplémentaires à traiter comme texte brut\nà l'ouverture (remplace le lecteur qui les revendiquerait\nnormalement). Séparées par virgules ou espaces, sans point initial,\nen minuscules.\nExemple : log4j  myproj  rawdata\n\nAppliqué via Appliquer ; prend effet pour les ouvertures suivantes."
multi_search_cap = "Limite de taille par fichier pour la portée répertoire du panneau\nde Recherche multiple. Les fichiers plus grands sont ignorés et\nlistés dans la puce des fichiers ignorés. Mettre 0 pour désactiver\nla limite.\n\nPar défaut : 50 Mo."
chart_max_points = "Nombre maximal de lignes que l'onglet Graphique tracera avant que\nle sous-échantillonnage régulier ne s'active (Histogramme, Ligne,\nNuage). Les graphiques à barres agrègent toujours toute l'entrée ;\nles boîtes calculent le résumé à 5 nombres sur toute l'entrée.\nMettre 0 pour désactiver l'échantillonnage - sûr seulement pour\ndes tableaux de taille modérée.\n\nPar défaut : 100,000. La saisie numérique accepte les séparateurs de virgule."
chart_max_categories = "Nombre maximal de catégories X distinctes qu'un graphique à barres\nacceptera avant de refuser de dessiner. Au-delà, le moteur affiche\nune erreur plutôt qu'un mur illisible de barres - filtrez ou\nagrégez le tableau d'abord.\n\nPar défaut : 200. La saisie numérique accepte les séparateurs de virgule."
tables_in_picker = "Combien de lignes de table la boîte de sélection multi-tables\n(SQLite, DuckDB, ...) doit afficher verticalement à sa taille par\ndéfaut. La boîte reste redimensionnable - tirez le coin pour\nl'agrandir quand une base a beaucoup de tables.\n\nPar défaut : 10. Minimum 1."
excel_auto_open = "Combien de feuilles d'un classeur Excel multi-feuilles ouvrir\nautomatiquement (chacune dans son onglet). Les classeurs avec plus\nde feuilles affichent un sélecteur pour choisir lesquelles ouvrir\n(vous pouvez en choisir plus que ce nombre, ou toutes).\n\nPar défaut : 5. Minimum 1."
max_recent = "Nombre de fichiers récemment ouverts affichés dans le menu Fichier"
start_maximised = "Quand activé, la fenêtre démarre agrandie et la taille ci-dessous\nsert de taille de restauration.\nQuand désactivé, la fenêtre démarre à la taille choisie."
initial_window_size = "Taille de la fenêtre au démarrage (quand \"Démarrer agrandi\" est\ndésactivé), ou taille de restauration quand il est activé."

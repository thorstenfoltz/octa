decompress_unlimited = "Açma boyutu sınırını tamamen kaldır. Bunu yalnızca güvendiğiniz\narşivler için işaretleyin."
raw_view_unlimited = "Herhangi bir dosyanın tam metnini boyut sınırı olmadan Ham\ngörünüme oku. Yalnızca bol belleğiniz varsa kullanın, birkaç\nGB'lık bir dosya tümüyle belleğe okunur."
initial_load_unlimited = "Dosyadaki tüm satırları önceden yükle. Yalnızca yedek RAM'iniz\nvarsa önerilir - 100 milyon satırlık bir parquet birkaç GB yer."
syntax_size_cap = "Bundan büyük dosyalar ham düzenleyicide düz monospace'e geri\ndöner. Sözdizimi vurgulamayı tamamen devre dışı bırakmak için 0\nayarlayın; korumayı atlamak için çok büyük bir sayı ayarlayın.\nJSON/YAML/XML/Markdown/TOML asla vurgulanmaz - kendi ağaç/önizleme\ngörünümlerini kullanırlar.\n\nVarsayılan: 1 MB. Bir sayı yazın, bir birim seçin - Uygula ile uygulanır."
open_as_text = "Açılışta düz metin olarak ele alınacak ek dosya uzantıları\n(normalde bunları talep edecek okuyucuyu geçersiz kılar). Virgül\nveya boşlukla ayrılmış, baştaki nokta olmadan, küçük harfle.\nÖrnek: log4j  myproj  rawdata\n\nUygula ile uygulanır; sonraki dosya açılışları için geçerli olur."
multi_search_cap = "Çoklu arama panelinin dizin kapsamı için dosya başına boyut sınırı.\nBundan büyük dosyalar atlanır ve atlanan dosyalar çipinde listelenir.\nSınırı devre dışı bırakmak için 0 ayarlayın.\n\nVarsayılan: 50 MB."
chart_max_points = "Grafik sekmesinin eşit aralıklı alt örnekleme devreye girmeden önce\nçizeceği en fazla satır sayısı (Histogram, Çizgi, Dağılım). Çubuk\ngrafikler her zaman tüm girişi toplar; kutu grafikleri 5 sayılık\nözeti tüm giriş üzerinde hesaplar. Örneklemeyi devre dışı bırakmak\niçin 0 ayarlayın - yalnızca orta boyutlu tablolar için güvenlidir.\n\nVarsayılan: 100,000. Sayısal giriş virgül ayırıcıları kabul eder."
chart_max_categories = "Bir çubuk grafiğin çizmeyi reddetmeden önce kabul edeceği en fazla\nfarklı X kategorisi sayısı. Bunun üzerinde oluşturucu, okunamaz bir\nçubuk duvarı yerine bir hata gösterir - önce tabloyu filtreleyin ya\nda toplayın.\n\nVarsayılan: 200. Sayısal giriş virgül ayırıcıları kabul eder."

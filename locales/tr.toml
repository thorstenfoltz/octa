mcp_row_limit = "Çağıran `limit` belirtmediğinde `read_table` / `run_sql` tarafından döndürülen en fazla satır sayısı. Araç şeması bu varsayılanı modele bildirir, böylece gerektiğinde daha fazlasını (veya sınırsız) isteyebilir.\n\nVarsayılan: 1,000. Bunu yüksek ayarlamak - veya Sınırsız'ı işaretlemek - stdio üzerinden çok büyük yanıtlar gönderebilir ve MCP istemcisini yavaşlatabilir."

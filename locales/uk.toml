chat_api_key = "Ваш ключ API для цього провайдера. Зберігається в сховищі ключів ОС, коли доступно, інакше у відкритому вигляді в settings.toml."
map_intro = "Типові значення для вигляду Карта (використовується файлами GeoJSON). Активна вкладка може перемикатися між Плитками та Лише геометрією через панель Карти."
map_default_mode = "Плитки: отримати слизьку карту з налаштованого URL плитки.\nЛише геометрія: малювати лише об'єкти на порожньому полотні."
map_fallback = "Коли отримання плиток не вдається (офлайн, заблоковано), автоматично перемикатися на рендеринг лише геометрії для цієї вкладки."
tile_url = "Шаблон URL для растрових плиток. `{z}/{x}/{y}` замінюються рівнем масштабу та координатами плитки. Типове вказує на сервер плиток OSM — для продакшну / інтенсивного використання вкажіть на самостійно розміщеного чи комерційного провайдера."
sidebar_position = "З якого боку прикріплено дерево каталогів, коли\nтеку відкрито через Файл > Відкрити теку."
shortcuts_intro = "Натисніть «Записати», потім натисніть комбінацію клавіш (з Ctrl / Shift / Alt).\nНатисніть Esc, щоб скасувати запис. «Очистити» залишає дію непризначеною."
initial_load_cap = "Максимум рядків, завантажених у таблицю при першому відкритті для\nпотокових форматів (Parquet, CSV, TSV). Решта рядків\nпотоково завантажуються у фоні під час прокручування.\n\nТипово: 5,000,000. Підвищення покращує повноту першого\nвідображення, але використовує більше пам'яті. Зниження робить\nпочаткове відкриття швидшим, але переносить більше роботи на\nфоновий завантажувач. Позначте «Необмежено», щоб вимкнути\nобмеження повністю та завантажити кожен рядок одразу.\n\nВведіть число — застосовується при Застосувати."
initial_load_unlimited = "Завантажити кожен рядок у файлі одразу. Рекомендовано лише\nколи у вас є вільна RAM — parquet на 100 млн рядків з'їдає\nкілька ГБ."
syntax_size_cap = "Файли, більші за це, переходять на звичайний моноширинний у\nнеобробленому редакторі. Встановіть 0, щоб вимкнути підсвічування\nсинтаксису повністю; встановіть дуже велике число, щоб відмовитися\nвід захисту. JSON/YAML/XML/Markdown/TOML ніколи не підсвічуються\n— вони використовують свої спеціальні вигляди дерева/перегляду.\n\nТипово: 1 МБ. Введіть число, виберіть одиницю — застосовується при Застосувати."
open_as_text = "Додаткові розширення файлів, що трактуються як звичайний текст при\nвідкритті (перевизначає будь-який читач, що зазвичай їх вимагає).\nЧерез кому або пробіл, без початкової крапки, малими літерами.\nПриклад: log4j  myproj  rawdata\n\nЗастосовується при Застосувати; діє для подальших відкриттів файлів."
multi_search_cap = "Обмеження розміру файлу для області каталогу панелі Багатопошуку.\nФайли, більші за це, пропускаються та перелічуються в чипі\nпропущених файлів. Встановіть 0, щоб вимкнути обмеження.\n\nТипово: 50 МБ."
chart_max_points = "Максимум рядків, які вкладка Діаграма побудує перед тим, як\nувімкнеться рівномірне прорідження (Гістограма, Лінія, Точкова).\nСтовпчасті діаграми завжди агрегують увесь вхід; Коробкові обчислюють\n5-числове резюме за всім входом. Встановіть 0, щоб вимкнути\nпрорідження — безпечно лише для таблиць помірного розміру.\n\nТипово: 100,000. Числове введення приймає роздільники-коми."
chart_max_categories = "Максимум окремих категорій X, які стовпчаста діаграма прийме перед\nвідмовою малювати. Понад це рендерер показує помилку\nзамість того, щоб видати нечитабельну стіну стовпців — спочатку\nвідфільтруйте чи агрегуйте таблицю.\n\nТипово: 200. Числове введення приймає роздільники-коми."
tables_in_picker = "Скільки рядків таблиць діалог вибору багатотабличних джерел (SQLite,\nDuckDB, ...) має вмістити вертикально за типового розміру. Діалог\nвсе одно можна змінити розмір — потягніть кут, щоб зробити його\nбільшим, коли база даних має багато таблиць.\n\nТипово: 10. Мінімум 1."
excel_auto_open = "Скільки аркушів багатоаркушевої книги Excel відкривати\nавтоматично (кожен у власній вкладці). Книги з більшою\nкількістю аркушів показують вікно вибору, щоб ви обрали, які відкрити\n(ви все одно можете вибрати більше за це число або всі).\n\nТипово: 5. Мінімум 1."
max_recent = "Кількість нещодавно відкритих файлів, показаних у меню Файл"
start_maximised = "Коли увімкнено, вікно запускається розгорнутим, а розмір нижче\nвикористовується як розмір відновлення з розгортання.\nКоли вимкнено, вікно запускається з вибраним розміром."
initial_window_size = "Розмір вікна під час запуску (коли «Запускати розгорнутим» вимкнено),\nабо розмір відновлення з розгортання, коли увімкнено."

editor_font = "Накреслення шрифту, що використовується редактором SQL і його\nсмугою номерів рядків. JetBrains Mono постачається з Octa.\n\nПримітка: програмні лігатури не застосовуються — текстовий\nрендерер egui ще не обробляє підстановки OpenType GSUB."

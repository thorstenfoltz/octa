mcp_row_limit = "Максимум рядків, що повертаються `read_table` / `run_sql`, коли викликач пропускає `limit`. Схема інструмента повідомляє це типове значення моделі, щоб вона могла запитати більше (або необмежено) за потреби.\n\nТипово: 1,000. Встановлення високого значення — або позначення Необмежено — може проштовхнути дуже великі відповіді через stdio й уповільнити клієнт MCP."
cell_byte_cap = "Обмеження розміру комірки на дроті. Комірки, текстова форма яких перевищує це, замінюються маркером `[truncated: ...]`, а відповідь позначає `cell_truncated: true`. Встановіть 0, щоб вимкнути обмеження.\n\nТипово: 65,536 (64 КіБ)."
chat_intro = "Вбудований ШІ-помічник, що керує інструментами Octa щодо ваших відкритих вкладок і файлів. Виберіть провайдера та задайте його ключ API (або запустіть Ollama локально), потім відкрийте панель з панелі інструментів (меню Аналіз, Помічник)."
chat_max_iterations = "Максимальна кількість раундів виклику інструментів, які помічник може виконати в межах одного повідомлення, перш ніж зупинитися. Захист від нескінченних циклів інструментів."
chat_max_tokens = "Обмеження на довжину відповіді (в токенах), що запитується на відповідь. Необмежено дозволяє моделі використовувати власний максимум (Anthropic завжди потребує обмеження, тож там використовується високе значення)."

sidebar_position = "På hvilken side mappetræet dokker når en mappe åbnes\nvia Filer > Åbn mappe."
shortcuts_intro = "Klik på 'Optag', og tryk derefter en tastekombination (med Ctrl / Skift / Alt).\nTryk Esc for at annullere optagelsen. 'Ryd' lader handlingen være ubundet."
initial_load_cap = "Maksimalt antal rækker der indlæses i tabellen ved første åbning\nfor streamingformater (Parquet, CSV, TSV). De resterende rækker\nstreamer i baggrunden, mens du ruller.\n\nStandard: 5,000,000. At hæve den forbedrer fuldstændigheden ved\nførste tegning, men bruger mere hukommelse. At sænke den gør den\nførste åbning hurtigere, men flytter mere arbejde til\nbaggrundsindlæseren. Markér \"Ubegrænset\" for at deaktivere grænsen\nhelt og indlæse alle rækker på forhånd.\n\nSkriv et tal - anvendes ved Anvend."
raw_view_cap = "Maximum file size (in MB) Octa reads fully into the Raw\nview editor. Also gates the parse-error raw fallback and\nthe Compare view's raw side. Larger files skip raw text to\nprotect memory.\n\nDefault: 500 MB. Tick \"Unlimited\" to load any file\nregardless of size. Applied on Apply."
raw_view_unlimited = "Read the full text of any file into the Raw view, with\nno size limit. Use only with RAM to spare - a multi-GB\nfile is read entirely into memory."
initial_load_unlimited = "Indlæs alle rækker i filen på forhånd. Anbefales kun\nnår du har RAM til overs - en parquet med 100 M rækker\næder flere GB."
syntax_size_cap = "Filer større end dette falder tilbage til almindelig monospace i\nden rå editor. Sæt 0 for at deaktivere syntaksfremhævning helt;\nsæt et meget stort tal for at fravælge beskyttelsen.\nJSON/YAML/XML/Markdown/TOML fremhæves aldrig - de bruger deres\negne træ-/forhåndsvisningsvisninger.\n\nStandard: 1 MB. Skriv et tal, vælg en enhed - anvendes ved Anvend."
open_as_text = "Ekstra filtyper der skal behandles som almindelig tekst ved åbning\n(tilsidesætter den læser der normalt ville gøre krav på dem).\nKomma- eller mellemrumsadskilt, ingen indledende prik, små bogstaver.\nEksempel: log4j  myproj  rawdata\n\nAnvendes ved Anvend; gælder for efterfølgende filåbninger."
multi_search_cap = "Størrelsesgrænse pr. fil for Multisøgning-panelets mappeomfang.\nStørre filer springes over og angives i chippen for oversprungne\nfiler. Sæt 0 for at deaktivere grænsen.\n\nStandard: 50 MB."
chart_max_points = "Maksimalt antal rækker som Diagram-fanen tegner, før jævnt fordelt\nnedsampling sætter ind (Histogram, Linje, Spredning). Søjlediagrammer\naggregerer altid hele inputtet; boksplot beregner 5-tals-\nopsummeringen over hele inputtet. Sæt 0 for at deaktivere\nsamplingen - kun sikkert for moderat store tabeller.\n\nStandard: 100,000. Numerisk input accepterer kommaadskillere."
chart_max_categories = "Maksimalt antal distinkte X-kategorier som et søjlediagram accepterer,\nfør det nægter at tegne. Derover viser rendereren en fejl i stedet\nfor en ulæselig mur af søjler - filtrér eller aggregér tabellen\nførst.\n\nStandard: 200. Numerisk input accepterer kommaadskillere."
tables_in_picker = "Hvor mange tabelrækker dialogen til valg af flere tabeller (SQLite,\nDuckDB, ...) skal rumme lodret ved sin standardstørrelse. Dialogen\ner stadig størrelsesjusterbar - træk i hjørnet for at gøre den\nstørre, når en database har mange tabeller.\n\nStandard: 10. Minimum 1."
excel_auto_open = "Hvor mange ark i en Excel-projektmappe med flere ark der åbnes\nautomatisk (hvert i sin egen fane). Projektmapper med flere ark end\ndette viser en vælger, så du vælger hvilke der skal åbnes (du kan\nstadig vælge flere end dette antal, eller alle).\n\nStandard: 5. Minimum 1."
max_recent = "Antal nyligt åbnede filer der vises i menuen Filer"
start_maximised = "Når slået til starter vinduet maksimeret, og størrelsen nedenfor\nbruges som gendannelsesstørrelse.\nNår slået fra starter vinduet i den valgte størrelse."
initial_window_size = "Vinduesstørrelse ved start (når \"Start maksimeret\" er slået fra),\neller gendannelsesstørrelsen når det er slået til."
ctrl_close = "Luk"
ctrl_restore = "Gendan"
ctrl_full_size = "Fuld størrelse"
ctrl_minimise = "Minimér"


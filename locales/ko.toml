map_default_mode = "타일: 구성된 타일 URL에서 지도를 가져옵니다.\n지오메트리만: 빈 캔버스에 피처만 그립니다."
map_fallback = "타일 가져오기에 실패하면(오프라인, 차단됨) 해당 탭에 대해 자동으로 지오메트리만 렌더링으로 전환합니다."

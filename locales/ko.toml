sidebar_position = "파일 > 디렉터리 열기 로 폴더를 열 때\n디렉터리 트리가 도킹되는 쪽."
shortcuts_intro = "'기록'을 클릭한 다음 키 조합(Ctrl / Shift / Alt 포함)을 누르세요.\nEsc를 눌러 기록을 취소합니다. '지우기'는 동작을 바인딩 없이 둡니다."
initial_load_cap = "스트리밍 형식(Parquet, CSV, TSV)에서 처음 열 때\n표에 불러오는 최대 행 수. 나머지 행은\n스크롤할 때 백그라운드에서 스트리밍됩니다.\n\n기본값: 5,000,000. 높이면 첫 화면의 완전성이\n좋아지지만 메모리를 더 사용합니다. 낮추면 첫\n열기가 빨라지지만 더 많은 작업이 백그라운드\n로더로 넘어갑니다. \"무제한\"을 선택하면 상한을\n완전히 비활성화하고 모든 행을 미리 불러옵니다.\n\n숫자를 입력 - 적용 시 반영됩니다."
raw_view_cap = "Maximum file size (in MB) Octa reads fully into the Raw\nview editor. Also gates the parse-error raw fallback and\nthe Compare view's raw side. Larger files skip raw text to\nprotect memory.\n\nDefault: 500 MB. Tick \"Unlimited\" to load any file\nregardless of size. Applied on Apply."
raw_view_unlimited = "Read the full text of any file into the Raw view, with\nno size limit. Use only with RAM to spare - a multi-GB\nfile is read entirely into memory."
initial_load_unlimited = "파일의 모든 행을 미리 불러옵니다. RAM에 여유가\n있을 때만 권장됩니다 - 1억 행 parquet는 수 GB를\n사용합니다."
syntax_size_cap = "이보다 큰 파일은 원시 편집기에서 일반 고정폭으로\n대체됩니다. 0으로 설정하면 구문 강조를 완전히\n비활성화합니다. 보호를 해제하려면 매우 큰 숫자를\n설정하세요. JSON/YAML/XML/Markdown/TOML은 절대\n강조되지 않습니다 - 전용 트리/미리보기 보기를 사용합니다.\n\n기본값: 1 MB. 숫자를 입력하고 단위를 선택 - 적용 시 반영됩니다."
open_as_text = "열 때 일반 텍스트로 처리할 추가 파일 확장자\n(일반적으로 이를 처리하는 리더를 재정의).\n쉼표 또는 공백으로 구분, 앞쪽 점 없음, 소문자.\n예: log4j  myproj  rawdata\n\n적용 시 반영되며 이후 파일 열기에 적용됩니다."
multi_search_cap = "다중 검색 패널 디렉터리 범위의 파일당 크기 상한.\n이보다 큰 파일은 건너뛰고 건너뛴 파일 칩에\n나열됩니다. 0으로 설정하면 상한을 비활성화합니다.\n\n기본값: 50 MB."
chart_max_points = "차트 탭이 균등 다운샘플링을 적용하기 전에 그릴 최대\n행 수(히스토그램, 선, 산점도). 막대 차트는 항상\n전체 입력을 집계합니다. 상자 그림은 전체 입력에 대해\n5수 요약을 계산합니다. 0으로 설정하면 다운샘플링을\n비활성화합니다 - 중간 크기의 표에만 안전합니다.\n\n기본값: 100,000. 숫자 입력은 쉼표 구분을 허용합니다."
chart_max_categories = "막대 차트가 그리기를 거부하기 전에 허용하는 고유 X\n범주의 최대 수. 이를 초과하면 렌더러가 읽을 수 없는\n막대 벽을 만드는 대신 오류를 표시합니다 - 먼저\n표를 필터링하거나 집계하세요.\n\n기본값: 200. 숫자 입력은 쉼표 구분을 허용합니다."
tables_in_picker = "다중 테이블 선택기 대화 상자(SQLite, DuckDB, ...)가\n기본 크기에서 세로로 담아야 하는 테이블 행 수. 대화\n상자는 사용자가 크기를 조절할 수 있습니다 - 데이터베이스에\n테이블이 많을 때 모서리를 끌어 크게 만드세요.\n\n기본값: 10. 최소 1."
excel_auto_open = "여러 시트가 있는 Excel 통합 문서에서 자동으로 열\n시트 수(각각 자체 탭에). 이보다 시트가 많은\n통합 문서는 선택기를 표시하여 어떤 것을 열지\n선택할 수 있게 합니다(이 수보다 많거나 전부 선택 가능).\n\n기본값: 5. 최소 1."
max_recent = "파일 메뉴에 표시되는 최근 열린 파일 수"
start_maximised = "켜면 창이 최대화되어 시작하고 아래 크기가\n최대화 복원 크기로 사용됩니다.\n끄면 창이 선택한 크기로 시작합니다."
initial_window_size = "시작 시 사용되는 창 크기(\"최대화하여 시작\"이 꺼져 있을 때),\n또는 켜져 있을 때 최대화 복원 크기."

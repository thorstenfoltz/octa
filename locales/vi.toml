chat_ollama_url = "URL gốc của máy chủ Ollama cục bộ. Octa sẽ nối thêm các đường dẫn API."
chat_temperature = "Độ ngẫu nhiên khi lấy mẫu, từ 0 (tập trung, xác định) đến 2 (sáng tạo). Nên dùng 0 cho tác vụ dữ liệu."
chat_position = "Vị trí bảng trò chuyện neo so với bảng."
chat_export_dir = "Thư mục nơi trợ lý ghi các tệp đã xuất (CSV mới, biểu đồ) khi bạn không cung cấp đường dẫn đầy đủ."
chat_audit_log = "Ghi moi lan goi cong cu cua tro ly vao nhat ky trong thu muc cau hinh (chat_audit/). Mac dinh tat."
chat_audit_warn = "Hien canh bao khi khoi dong neu nhat ky vuot kich thuoc nay."
chat_api_key = "Khóa API của bạn cho nhà cung cấp này. Lưu trong keyring hệ điều hành nếu có, nếu không thì dạng văn bản thuần trong settings.toml."
map_intro = "Mặc định cho chế độ Bản đồ (dùng cho tệp GeoJSON). Thẻ đang mở có thể chuyển giữa Ô bản đồ và Chỉ hình học qua thanh công cụ Bản đồ."
map_default_mode = "Ô bản đồ: lấy bản đồ trượt từ URL ô đã cấu hình.\nChỉ hình học: chỉ vẽ các đối tượng trên nền trống."
map_fallback = "Khi tải ô thất bại (ngoại tuyến, bị chặn), tự động chuyển sang kết xuất chỉ hình học cho thẻ đó."
tile_url = "Mẫu URL cho ô raster. `{z}/{x}/{y}` được thay bằng mức thu phóng và tọa độ ô. Mặc định trỏ tới máy chủ ô OSM - cho sản xuất / dùng nhiều, hãy trỏ tới nhà cung cấp tự lưu trữ hoặc thương mại."
sidebar_position = "Cây thư mục neo ở phía nào khi mở\nthư mục qua Tệp > Mở thư mục."
shortcuts_intro = "Nhấp 'Ghi' rồi nhấn tổ hợp phím (với Ctrl / Shift / Alt).\nNhấn Esc để hủy ghi. 'Xóa' để hành động không được gán."
initial_load_cap = "Số hàng tối đa nạp vào bảng khi mở lần đầu cho\ncác định dạng truyền (Parquet, CSV, TSV). Các hàng còn lại\ntruyền nền khi bạn cuộn.\n\nMặc định: 5.000.000. Tăng giúp lần vẽ đầu đầy đủ\nhơn nhưng tốn bộ nhớ. Giảm khiến mở lần đầu\nnhanh hơn nhưng dồn việc cho bộ nạp nền.\nĐánh dấu \"Không giới hạn\" để tắt hẳn\ngiới hạn và nạp mọi hàng ngay.\n\nNhập số - áp dụng khi nhấn Áp dụng."
raw_view_cap = "Kích thước tệp tối đa (tính bằng MB) mà Octa đọc toàn bộ vào trình soạn thảo\nxem Thô. Cũng chi phối phương án dự phòng thô khi lỗi phân tích và\nphía thô của khung So sánh. Các tệp lớn hơn bỏ qua văn bản thô để\nbảo vệ bộ nhớ.\n\nMặc định: 500 MB. Tích \"Không giới hạn\" để tải bất kỳ tệp nào\nbất kể kích thước. Áp dụng khi nhấn Áp dụng."
decompress_cap = "Kích thước giải nén tối đa (tính bằng MB) cho các tệp\n.gz / .zst được mở trong suốt. Một tệp nén nhỏ có thể phồng lên rất lớn\n(một quả bom giải nén); vượt quá giới hạn này thì việc mở bị từ chối.\n\nMặc định: 4.295 MB (4 GB). Áp dụng khi nhấn Áp dụng."
decompress_unlimited = "Loại bỏ hoàn toàn giới hạn kích thước giải nén. Chỉ tích điều này\ncho các kho lưu trữ bạn tin tưởng."
raw_view_unlimited = "Đọc toàn bộ văn bản của bất kỳ tệp nào vào khung xem Thô, không\ngiới hạn kích thước. Chỉ dùng khi còn dư RAM - một tệp nhiều GB\nsẽ được đọc hoàn toàn vào bộ nhớ."
initial_load_unlimited = "Nạp mọi hàng trong tệp ngay từ đầu. Chỉ nên dùng\nkhi bạn dư RAM - một parquet 100 triệu hàng ngốn\nvài GB."
syntax_size_cap = "Tệp lớn hơn mức này chuyển về monospace thường trong\ntrình soạn thô. Đặt 0 để tắt hoàn toàn tô màu cú pháp;\nđặt số rất lớn để bỏ giới hạn. JSON/YAML/XML/Markdown/TOML\nkhông bao giờ được tô màu - chúng dùng chế độ cây/xem trước riêng.\n\nMặc định: 1 MB. Nhập số, chọn đơn vị - áp dụng khi nhấn Áp dụng."
open_as_text = "Phần mở rộng tệp bổ sung được coi là văn bản thuần khi mở\n(ghi đè trình đọc thường nhận chúng).\nNgăn cách bằng dấu phẩy hoặc khoảng trắng, không dấu chấm đầu, chữ thường.\nVí dụ: log4j  myproj  rawdata\n\nÁp dụng khi nhấn Áp dụng; có hiệu lực cho các lần mở tệp sau."
multi_search_cap = "Giới hạn kích thước mỗi tệp cho phạm vi thư mục của\nbảng Tìm kiếm đa tệp. Tệp lớn hơn bị bỏ qua và liệt kê trong\nchip tệp bị bỏ qua. Đặt 0 để tắt giới hạn.\n\nMặc định: 50 MB."
chart_max_points = "Số hàng tối đa thẻ Biểu đồ sẽ vẽ trước khi lấy mẫu xuống\ncách đều (Histogram, Đường, Phân tán). Biểu đồ Cột\nluôn tổng hợp toàn bộ dữ liệu; biểu đồ Hộp tính\ntóm tắt 5 số trên toàn bộ dữ liệu. Đặt 0 để tắt\nlấy mẫu - chỉ an toàn cho bảng cỡ vừa.\n\nMặc định: 100.000. Ô nhập số chấp nhận dấu phẩy."
chart_max_categories = "Số danh mục X riêng biệt tối đa mà biểu đồ Cột chấp nhận trước khi\ntừ chối vẽ. Vượt mức này bộ kết xuất báo lỗi\nthay vì tạo bức tường cột không đọc nổi - hãy lọc hoặc\ntổng hợp bảng trước.\n\nMặc định: 200. Ô nhập số chấp nhận dấu phẩy."
tables_in_picker = "Số hàng bảng mà hộp thoại chọn nhiều bảng (SQLite,\nDuckDB, ...) hiển thị theo chiều dọc ở kích thước mặc định.\nHộp thoại vẫn đổi kích thước được - kéo góc để\nlàm lớn hơn khi cơ sở dữ liệu có nhiều bảng.\n\nMặc định: 10. Tối thiểu 1."
excel_auto_open = "Số trang tính của sổ Excel nhiều trang được mở\ntự động (mỗi trang một thẻ). Sổ có nhiều trang\nhơn mức này hiện bộ chọn để bạn chọn trang mở\n(bạn vẫn có thể chọn nhiều hơn, hoặc tất cả).\n\nMặc định: 5. Tối thiểu 1."
max_recent = "Số tệp mở gần đây hiển thị trong menu Tệp"
start_maximised = "Khi bật, cửa sổ khởi chạy ở chế độ phóng to và kích thước bên dưới\nđược dùng làm kích thước khôi phục từ phóng to.\nKhi tắt, cửa sổ khởi chạy ở kích thước đã chọn."
initial_window_size = "Kích thước cửa sổ khi khởi động (khi \"Khởi động phóng to\" tắt),\nhoặc kích thước khôi phục từ phóng to khi bật."
ctrl_close = "Đóng"
ctrl_restore = "Khôi phục"
ctrl_full_size = "Kích thước đầy đủ"
ctrl_minimise = "Thu nhỏ"

# Chat assistant panel. NOTE: values are English placeholders pending
# translation; the i18n parity test only requires the keys to exist.
write_protection = "Bảo vệ các tệp của bạn khỏi việc lưu qua GUI và mặc định của máy chủ MCP.\nKhi bật, việc thêm hoặc bớt cột trong tệp SQLite, DuckDB hoặc GeoPackage\nbị từ chối khi lưu. Trợ lý được chi phối theo từng hồ sơ trò chuyện\n(công tắc Cho phép ghi của hồ sơ), không phải bởi cài đặt này."
backup_before_modify = "Trước khi trợ lý hoặc một thao tác lưu cơ sở dữ liệu thay đổi lược đồ ghi đè\nlên một tệp, hãy sao chép nó thành một tệp .bak có dấu thời gian bên cạnh trước.\nCác thao tác lưu thủ công thông thường không được sao lưu."
chat_profiles = "Mỗi hồ sơ là một thiết lập đã lưu: một nhà cung cấp, một mô hình, một nhiệt độ và một ngân sách suy nghĩ tùy chọn, dưới một tên bạn chọn. Tạo bao nhiêu tùy thích, kể cả nhiều hồ sơ cho cùng một nhà cung cấp, và chuyển đổi giữa chúng từ bảng trợ lý."
chat_profile_base_url = "Điểm cuối cho hồ sơ này. Để trống để dùng địa chỉ máy chủ Ollama đặt bên dưới."


open_as_text = "Extensões de arquivo extras a tratar como texto simples ao abrir\n(substitui o leitor que normalmente as reivindicaria). Separadas\npor vírgulas ou espaços, sem ponto inicial, em minúsculas.\nExemplo: log4j  myproj  rawdata\n\nAplicado ao Aplicar; tem efeito para aberturas subsequentes."
multi_search_cap = "Limite de tamanho por arquivo para o escopo de diretório do painel\nde Busca múltipla. Arquivos maiores são ignorados e listados no chip\nde arquivos ignorados. Defina 0 para desativar o limite.\n\nPadrão: 50 MB."
chart_max_points = "Máximo de linhas que a aba Gráfico traçará antes de a subamostragem\nequiespaçada entrar em ação (Histograma, Linha, Dispersão). Gráficos\nde barras sempre agregam toda a entrada; box plots calculam o resumo\nde 5 números sobre toda a entrada. Defina 0 para desativar a\namostragem - seguro apenas para tabelas de tamanho moderado.\n\nPadrão: 100,000. A entrada numérica aceita separadores de vírgula."
chart_max_categories = "Máximo de categorias X distintas que um gráfico de barras aceitará\nantes de se recusar a desenhar. Acima disso o renderizador mostra um\nerro em vez de um muro ilegível de barras - filtre ou agregue a\ntabela primeiro.\n\nPadrão: 200. A entrada numérica aceita separadores de vírgula."
tables_in_picker = "Quantas linhas de tabela o diálogo seletor de várias tabelas\n(SQLite, DuckDB, ...) deve caber verticalmente no seu tamanho\npadrão. O diálogo continua redimensionável - arraste o canto para\naumentá-lo quando um banco de dados tem muitas tabelas.\n\nPadrão: 10. Mínimo 1."

initial_load_cap = "Máximo de linhas carregadas na tabela na primeira abertura para\nformatos de streaming (Parquet, CSV, TSV). As linhas restantes são\ncarregadas em segundo plano conforme você rola.\n\nPadrão: 5,000,000. Aumentá-lo melhora a completude do primeiro\ndesenho mas usa mais memória. Reduzi-lo torna a abertura inicial\nmais rápida mas passa mais trabalho ao carregador em segundo plano.\nMarque \"Ilimitado\" para desativar totalmente o limite e carregar\ntodas as linhas de imediato.\n\nDigite um número - aplicado ao clicar em Aplicar."
raw_view_cap = "Maximum file size (in MB) Octa reads fully into the Raw\nview editor. Also gates the parse-error raw fallback and\nthe Compare view's raw side. Larger files skip raw text to\nprotect memory.\n\nDefault: 500 MB. Tick \"Unlimited\" to load any file\nregardless of size. Applied on Apply."
raw_view_unlimited = "Read the full text of any file into the Raw view, with\nno size limit. Use only with RAM to spare - a multi-GB\nfile is read entirely into memory."
initial_load_unlimited = "Carregar todas as linhas do arquivo de imediato. Recomendado\nsomente quando você tem RAM de sobra - um parquet de 100 M de\nlinhas consome vários GB."
syntax_size_cap = "Arquivos maiores que isto voltam para monospace simples no\neditor bruto. Defina 0 para desativar totalmente o realce de\nsintaxe; defina um número muito grande para ignorar a proteção.\nJSON/YAML/XML/Markdown/TOML nunca são realçados - usam suas\npróprias visualizações de árvore/prévia.\n\nPadrão: 1 MB. Digite um número, escolha uma unidade - aplicado ao Aplicar."
open_as_text = "Extensões de arquivo extras a tratar como texto simples ao abrir\n(substitui o leitor que normalmente as reivindicaria). Separadas\npor vírgulas ou espaços, sem ponto inicial, em minúsculas.\nExemplo: log4j  myproj  rawdata\n\nAplicado ao Aplicar; tem efeito para aberturas subsequentes."
multi_search_cap = "Limite de tamanho por arquivo para o escopo de diretório do painel\nde Busca múltipla. Arquivos maiores são ignorados e listados no chip\nde arquivos ignorados. Defina 0 para desativar o limite.\n\nPadrão: 50 MB."
chart_max_points = "Máximo de linhas que a aba Gráfico traçará antes de a subamostragem\nequiespaçada entrar em ação (Histograma, Linha, Dispersão). Gráficos\nde barras sempre agregam toda a entrada; box plots calculam o resumo\nde 5 números sobre toda a entrada. Defina 0 para desativar a\namostragem - seguro apenas para tabelas de tamanho moderado.\n\nPadrão: 100,000. A entrada numérica aceita separadores de vírgula."
chart_max_categories = "Máximo de categorias X distintas que um gráfico de barras aceitará\nantes de se recusar a desenhar. Acima disso o renderizador mostra um\nerro em vez de um muro ilegível de barras - filtre ou agregue a\ntabela primeiro.\n\nPadrão: 200. A entrada numérica aceita separadores de vírgula."
tables_in_picker = "Quantas linhas de tabela o diálogo seletor de várias tabelas\n(SQLite, DuckDB, ...) deve caber verticalmente no seu tamanho\npadrão. O diálogo continua redimensionável - arraste o canto para\naumentá-lo quando um banco de dados tem muitas tabelas.\n\nPadrão: 10. Mínimo 1."
excel_auto_open = "Quantas planilhas de uma pasta de trabalho Excel com várias\nplanilhas abrir automaticamente (cada uma em sua aba). Pastas com\nmais planilhas que isto mostram um seletor para você escolher quais\nabrir (você ainda pode escolher mais que este número, ou todas).\n\nPadrão: 5. Mínimo 1."

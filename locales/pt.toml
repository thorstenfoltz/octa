initial_load_cap = "Máximo de linhas carregadas na tabela na primeira abertura para\nformatos de streaming (Parquet, CSV, TSV). As linhas restantes são\ncarregadas em segundo plano conforme você rola.\n\nPadrão: 5,000,000. Aumentá-lo melhora a completude do primeiro\ndesenho mas usa mais memória. Reduzi-lo torna a abertura inicial\nmais rápida mas passa mais trabalho ao carregador em segundo plano.\nMarque \"Ilimitado\" para desativar totalmente o limite e carregar\ntodas as linhas de imediato.\n\nDigite um número - aplicado ao clicar em Aplicar."
raw_view_cap = "Tamanho máximo de ficheiro (em MB) que o Octa lê por completo\npara o editor da vista bruta. Também rege o recurso a texto bruto\napós um erro de análise e o lado bruto da vista de comparação.\nOs ficheiros maiores dispensam o texto bruto para poupar memória.\n\nPredefinição: 500 MB. Marque \"Sem limite\" para carregar qualquer\nficheiro, seja qual for o tamanho. Aplicado ao premir Aplicar."
decompress_cap = "Tamanho máximo descomprimido (em MB) para os ficheiros\n.gz / .zst abertos de forma transparente. Um ficheiro comprimido\nminúsculo pode expandir enormemente (uma bomba de descompressão);\nacima deste limite a abertura é recusada.\n\nPredefinição: 4.295 MB (4 GB). Aplicado ao premir Aplicar."

raw_view_unlimited = "Lê o texto completo de qualquer ficheiro na vista bruta, sem\nlimite de tamanho. Use apenas com RAM de sobra: um ficheiro de\nvários GB é lido inteiro para a memória."
initial_load_unlimited = "Carregar todas as linhas do arquivo de imediato. Recomendado\nsomente quando você tem RAM de sobra - um parquet de 100 M de\nlinhas consome vários GB."

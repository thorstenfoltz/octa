sql_diff_secs = "Cik ilgi SQL izmainu izcelums paliek pirms izzud."
mcp_intro = "MCP servera noklusējumi (`octa --mcp`). Serveris tos nolasa vienreiz palaišanas laikā; to maiņa, kamēr serveris darbojas, prasa `octa --mcp` restartu."
mcp_row_limit = "Maksimālais rindu skaits, ko atgriež `read_table` / `run_sql`, kad izsaucējs izlaiž `limit`. Rīka shēma reklamē šo noklusējumu modelim, lai tas vajadzības gadījumā varētu prasīt vairāk (vai neierobežoti).\n\nNoklusējums: 1,000. Iestatot to augstu - vai atzīmējot Neierobežots - caur stdio var tikt nosūtītas ļoti lielas atbildes un palēnināt MCP klientu."
cell_byte_cap = "Vienas šūnas pārraides izmēra ierobežojums. Šūnas, kuru teksta forma to pārsniedz, tiek aizstātas ar `[truncated: ...]` marķieri, un atbilde atzīmē `cell_truncated: true`. Iestatiet 0, lai atspējotu ierobežojumu.\n\nNoklusējums: 65,536 (64 KiB)."
chat_intro = "Lietotnē iebūvēts MI asistents, kas vada Octa rīkus jūsu atvērtajās cilnēs un failos. Izvēlieties piegādātāju un iestatiet tā API atslēgu (vai palaidiet Ollama lokāli), pēc tam atveriet paneli no rīkjoslas (Analīzes izvēlne, Asistents)."
chat_max_iterations = "Maksimālais rīku izsaukumu kārtu skaits, ko asistents var izpildīt vienā ziņojumā, pirms tam jāapstājas. Aizsardzība pret nekontrolētām rīku cilpām."
chat_max_tokens = "Atbildes garuma ierobežojums (žetonos), ko prasa katrai atbildei. Neierobežots ļauj modelim izmantot savu maksimumu (Anthropic vienmēr nepieciešams ierobežojums, tāpēc tur izmanto augstu vērtību)."
chat_provider = "Ar kuru LLM aizmuguri asistents sazinās. Katram piegādātājam ir vajadzīga sava API atslēga, izņemot Ollama, kas darbojas lokāli."
chat_model = "Modelis, ko izmanto šim piegādātājam. Izvēlieties iepriekšiestatījumu vai ierakstiet jebkuru modeļa nosaukumu."
chat_base_url = "Bāzes URL OpenAI saderīgam galapunktam (OpenRouter, Groq, LM Studio, pielāgota vārteja)."
chat_ollama_url = "Jūsu lokālā Ollama servera saknes URL. Octa pievieno API ceļus."
chat_temperature = "Izlases nejaušība, no 0 (fokusēts, determinēts) līdz 2 (radošs). Datu uzdevumiem ieteicams 0."
chat_position = "Kur tērzēšanas panelis tiek piestiprināts attiecībā pret tabulu."
chat_export_dir = "Mape, kurā asistents raksta eksportētos failus (jaunus CSV, diagrammas), kad nenorādāt pilnu ceļu."
chat_audit_log = "Pievieno katru asistenta riku izsaukumu zurnalam konfiguracijas direktorija (chat_audit/). Pec noklusejuma izslegts."
chat_audit_warn = "Radit bridinajumu startejot, kad zurnali parsniedz so izmeru."
chat_api_key = "Jūsu API atslēga šim piegādātājam. Glabāta jūsu OS atslēgu saišķī, kad pieejams, citādi vienkāršā tekstā settings.toml."
map_intro = "Kartes skata noklusējumi (izmanto GeoJSON faili). Aktīvā cilne var pārslēgties starp Flīzēm un Tikai ģeometriju ar Kartes rīkjoslu."
map_default_mode = "Flīzes: ielādēt slīdošu karti no konfigurētā flīžu URL.\nTikai ģeometrija: zīmēt tikai objektus uz tukša audekla."
map_fallback = "Kad flīžu ielāde neizdodas (bezsaistē, bloķēts), automātiski pārslēgties uz tikai ģeometrijas renderēšanu šai cilnei."
tile_url = "URL šablons rastra flīzēm. `{z}/{x}/{y}` tiek aizstāti ar tālummaiņas līmeni un flīžu koordinātām. Noklusējums norāda uz OSM flīžu serveri - ražošanai / intensīvai lietošanai norādiet uz pašmitinātu vai komerciālu piegādātāju."
sidebar_position = "Kurā pusē mapju koks tiek piestiprināts, kad\nmape tiek atvērta caur Fails > Atvērt mapi."
shortcuts_intro = "Noklikšķiniet “Ierakstīt”, pēc tam nospiediet taustiņu kombināciju (ar Ctrl / Shift / Alt).\nNospiediet Esc, lai atceltu ierakstīšanu. “Notīrīt” atstāj darbību nepiesaistītu."
initial_load_cap = "Maksimālais rindu skaits, kas ielādēts tabulā pirmajā atvēršanā\nstraumēšanas formātiem (Parquet, CSV, TSV). Atlikušās rindas\nstraumējas fonā, kad ritiniet.\n\nNoklusējums: 5,000,000. Tā palielināšana uzlabo pirmā zīmējuma\npilnīgumu, bet izmanto vairāk atmiņas. Tā samazināšana padara\nsākotnējo atvēršanu ātrāku, bet pārceļ vairāk darba uz\nfona ielādētāju. Atzīmējiet \"Neierobežots\", lai pilnībā atspējotu\nierobežojumu un ielādētu katru rindu uzreiz.\n\nIevadiet skaitli - lietots, nospiežot Lietot."
raw_view_cap = "Maximum file size (in MB) Octa reads fully into the Raw\nview editor. Also gates the parse-error raw fallback and\nthe Compare view's raw side. Larger files skip raw text to\nprotect memory.\n\nDefault: 500 MB. Tick \"Unlimited\" to load any file\nregardless of size. Applied on Apply."
raw_view_unlimited = "Read the full text of any file into the Raw view, with\nno size limit. Use only with RAM to spare - a multi-GB\nfile is read entirely into memory."
initial_load_unlimited = "Ielādēt katru faila rindu uzreiz. Ieteicams tikai,\nkad jums ir atlieka RAM - 100 milj. rindu parquet apēd\nvairākus GB."
syntax_size_cap = "Lielāki faili par šo pāriet uz vienkāršu vienplatuma\nneapstrādāta teksta redaktorā. Iestatiet 0, lai pilnībā\natspējotu sintakses iezīmēšanu; iestatiet ļoti lielu skaitli, lai\natteiktos no aizsardzības. JSON/YAML/XML/Markdown/TOML nekad netiek iezīmēti\n- tie izmanto savus koka/priekšskatījuma skatus.\n\nNoklusējums: 1 MB. Ievadiet skaitli, izvēlieties vienību - lietots, nospiežot Lietot."
open_as_text = "Papildu failu paplašinājumi, ko atverot uzskatīt par vienkāršu tekstu\n(aizstāj jebkuru lasītāju, kas tos parasti pieprasītu).\nAtdalīti ar komatu vai atstarpi, bez sākuma punkta, mazajiem burtiem.\nPiemērs: log4j  myproj  rawdata\n\nLietots, nospiežot Lietot; stājas spēkā turpmākiem failu atvērumiem."
multi_search_cap = "Viena faila izmēra ierobežojums Vairākkārtējās meklēšanas paneļa mapju\ntvērumam. Lielāki faili par šo tiek izlaisti un uzskaitīti\nizlaisto failu žetonā. Iestatiet 0, lai atspējotu ierobežojumu.\n\nNoklusējums: 50 MB."
chart_max_points = "Maksimālais rindu skaits, ko Diagrammas cilne zīmēs, pirms ieslēdzas\nvienmērīgi izvietota retināšana (Histogramma, Līnija, Izkliede). Stabiņu diagrammas\nvienmēr agregē visu ievadi; Kastīšu diagrammas aprēķina\n5 skaitļu kopsavilkumu pār visu ievadi. Iestatiet 0, lai atspējotu\nretināšanu - droši tikai vidēja izmēra tabulām.\n\nNoklusējums: 100,000. Skaitliska ievade pieņem komata atdalītājus."
chart_max_categories = "Maksimālais atšķirīgu X kategoriju skaits, ko Stabiņu diagramma pieņems, pirms\natsakās zīmēt. Virs tā renderētājs parāda kļūdu,\nnevis veido nesalasāmu stabiņu sienu - vispirms filtrējiet vai\nagregējiet tabulu.\n\nNoklusējums: 200. Skaitliska ievade pieņem komata atdalītājus."
tables_in_picker = "Cik tabulas rindu vairāktabulu atlasītāja dialogam (SQLite,\nDuckDB, ...) jāietilpina vertikāli pie tā noklusējuma izmēra. Dialoga\nizmēru lietotājs joprojām var mainīt - velciet stūri, lai padarītu\nto lielāku, kad datubāzē ir daudz tabulu.\n\nNoklusējums: 10. Minimums 1."
excel_auto_open = "Cik daudzlapu Excel darbgrāmatas lapu atvērt\nautomātiski (katru savā cilnē). Darbgrāmatas ar vairāk\nlapām par šo rāda atlasītāju, lai izvēlētos, kuras atvērt\n(jūs joprojām varat izvēlēties vairāk par šo skaitu vai visas).\n\nNoklusējums: 5. Minimums 1."
max_recent = "Nesen atvērto failu skaits, kas parādīts Faila izvēlnē"
start_maximised = "Kad ieslēgts, logs tiek palaists maksimizēts, un zemāk esošais izmērs\ntiek izmantots kā atjaunošanas-no-maksimizēšanas izmērs.\nKad izslēgts, logs tiek palaists izvēlētajā izmērā."
initial_window_size = "Loga izmērs, kas izmantots palaišanā (kad \"Sākt maksimizētu\" ir izslēgts),\nvai atjaunošanas-no-maksimizēšanas izmērs, kad tas ir ieslēgts."
ctrl_close = "Aizvērt"
ctrl_restore = "Atjaunot"
ctrl_full_size = "Pilns izmērs"
ctrl_minimise = "Minimizēt"


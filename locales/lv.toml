chat_max_tokens = "Atbildes garuma ierobežojums (žetonos), ko prasa katrai atbildei. Neierobežots ļauj modelim izmantot savu maksimumu (Anthropic vienmēr nepieciešams ierobežojums, tāpēc tur izmanto augstu vērtību)."
chat_provider = "Ar kuru LLM aizmuguri asistents sazinās. Katram piegādātājam ir vajadzīga sava API atslēga, izņemot Ollama, kas darbojas lokāli."

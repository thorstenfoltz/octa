chat_ollama_url = "Jūsu lokālā Ollama servera saknes URL. Octa pievieno API ceļus."
chat_temperature = "Izlases nejaušība, no 0 (fokusēts, determinēts) līdz 2 (radošs). Datu uzdevumiem ieteicams 0."

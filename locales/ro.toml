editor_font = "Fontul folosit de editorul SQL și de jgheabul cu numere\nde rând. JetBrains Mono este inclus în Octa.\n\nNotă: ligaturile de programare nu se aplică - randerul de\ntext egui nu procesează încă substituțiile OpenType GSUB."
sql_diff_highlight = "Dupa o interogare INSERT/UPDATE/DELETE, evidentiaza pe scurt celulele si randurile modificate."
sql_diff_secs = "Cat timp ramane evidentierea modificarilor SQL inainte sa dispara."
mcp_intro = "Valori implicite pentru serverul MCP (`octa --mcp`). Serverul le citește o dată la pornire; modificarea în timpul rulării necesită repornirea `octa --mcp`."
mcp_row_limit = "Numărul maxim de rânduri returnate de `read_table` / `run_sql` când apelantul omite `limit`. Schema instrumentului anunță această valoare implicită modelului ca să poată cere mai mult (sau nelimitat) la nevoie.\n\nImplicit: 1.000. Setarea mare - sau bifarea Nelimitat - poate împinge răspunsuri foarte mari prin stdio și încetini clientul MCP."
cell_byte_cap = "Limită de dimensiune per celulă la transmitere. Celulele a căror formă textuală depășește asta sunt înlocuite cu un marcaj `[truncated: ...]`, iar răspunsul marchează `cell_truncated: true`. Setați 0 pentru a dezactiva limita.\n\nImplicit: 65.536 (64 KiB)."
chat_intro = "Asistent AI integrat care folosește instrumentele Octa pe filele și fișierele deschise. Alegeți un furnizor și setați-i cheia API (sau rulați Ollama local), apoi deschideți panoul din bara de instrumente (meniul Analiză, Asistent)."
chat_max_iterations = "Numărul maxim de runde de apeluri de instrumente pe care asistentul le poate rula într-un singur mesaj înainte de a se opri. O protecție împotriva buclelor de instrumente scăpate de sub control."
chat_max_tokens = "Limită pentru lungimea răspunsului (în tokenuri) per replică. Nelimitat lasă modelul să folosească propriul maxim (Anthropic necesită mereu o limită, deci folosește o valoare mare)."
chat_provider = "Cu ce backend LLM vorbește asistentul. Fiecare furnizor are nevoie de propria cheie API, cu excepția Ollama care rulează local."
chat_model = "Modelul folosit pentru acest furnizor. Alegeți o presetare sau tastați orice nume de model."
chat_base_url = "URL de bază pentru endpointul compatibil OpenAI (OpenRouter, Groq, LM Studio, un gateway personalizat)."
chat_ollama_url = "URL-ul rădăcină al serverului dvs. Ollama local. Octa adaugă căile API."
chat_temperature = "Aleatoriul eșantionării, de la 0 (concentrat, determinist) la 2 (creativ). 0 este recomandat pentru sarcini de date."
chat_position = "Unde se ancorează panoul de chat față de tabel."
chat_export_dir = "Folderul în care asistentul scrie fișierele exportate (CSV-uri noi, grafice) când nu dați o cale completă."
chat_audit_log = "Adauga fiecare apel de instrument al asistentului intr-un jurnal in directorul de configurare (chat_audit/). Dezactivat implicit."
chat_audit_warn = "Afiseaza un avertisment la pornire cand jurnalele depasesc aceasta dimensiune."
chat_api_key = "Cheia dvs. API pentru acest furnizor. Stocată în keyring-ul sistemului de operare când e disponibil, altfel în text simplu în settings.toml."
map_intro = "Valori implicite pentru vizualizarea Hartă (folosită de fișierele GeoJSON). Fila activă poate comuta între Dale și Doar geometrie din bara Hartă."
map_default_mode = "Dale: preia o hartă glisantă din URL-ul de dale configurat.\nDoar geometrie: desenează doar caracteristicile pe o pânză goală."
map_fallback = "Când preluarea dalelor eșuează (offline, blocat), comută automat la randare doar-geometrie pentru acea filă."
tile_url = "Tipar URL pentru dale raster. `{z}/{x}/{y}` sunt înlocuite cu nivelul de zoom și coordonatele dalei. Implicit indică serverul de dale OSM - pentru producție / utilizare intensă, indicați un furnizor propriu sau comercial."
sidebar_position = "Pe ce parte este ancorat arborele de directoare când un\nfolder este deschis prin Fișier > Deschide director."
shortcuts_intro = "Faceți clic pe 'Înregistrează', apoi apăsați o combinație de taste (cu Ctrl / Shift / Alt).\nApăsați Esc pentru a anula. 'Șterge' lasă acțiunea nelegată."
initial_load_cap = "Numărul maxim de rânduri încărcate în tabel la prima deschidere pentru\nformatele de streaming (Parquet, CSV, TSV). Restul rândurilor\nse încarcă în fundal pe măsură ce derulați.\n\nImplicit: 5.000.000. Mărirea îmbunătățește completitudinea\nprimei afișări dar folosește mai multă memorie. Micșorarea face\ndeschiderea inițială mai rapidă dar mută mai mult lucru pe\nîncărcătorul de fundal. Bifați \"Nelimitat\" pentru a dezactiva\ncomplet limita și a încărca toate rândurile de la început.\n\nTastați un număr - aplicat la Aplică."
raw_view_cap = "Maximum file size (in MB) Octa reads fully into the Raw\nview editor. Also gates the parse-error raw fallback and\nthe Compare view's raw side. Larger files skip raw text to\nprotect memory.\n\nDefault: 500 MB. Tick \"Unlimited\" to load any file\nregardless of size. Applied on Apply."
raw_view_unlimited = "Read the full text of any file into the Raw view, with\nno size limit. Use only with RAM to spare - a multi-GB\nfile is read entirely into memory."
initial_load_unlimited = "Încarcă fiecare rând din fișier de la început. Recomandat doar\ncând aveți RAM de rezervă - un parquet de 100 M rânduri consumă\ncâțiva GB."
syntax_size_cap = "Fișierele mai mari decât atât revin la monospațiat simplu în\neditorul brut. Setați 0 pentru a dezactiva complet evidențierea\nsintaxei; o valoare foarte mare renunță la protecție.\nJSON/YAML/XML/Markdown/TOML nu sunt niciodată evidențiate\n- folosesc vizualizările lor de arbore/previzualizare.\n\nImplicit: 1 MB. Tastați un număr, alegeți o unitate - la Aplică."
open_as_text = "Extensii suplimentare de tratat ca text simplu la deschidere\n(suprascriu orice cititor le-ar revendica normal).\nSeparate prin virgulă sau spațiu, fără punct inițial, litere mici.\nExemplu: log4j  myproj  rawdata\n\nAplicate la Aplică; au efect la deschiderile ulterioare."
multi_search_cap = "Limită de dimensiune per fișier pentru domeniul de director al\npanoului Căutare multiplă. Fișierele mai mari sunt omise și listate în\nchipul fișierelor omise. Setați 0 pentru a dezactiva limita.\n\nImplicit: 50 MB."
chart_max_points = "Numărul maxim de rânduri pe care fila Grafic le va trasa înainte de\neșantionarea echidistantă (Histogramă, Linie, Dispersie). Graficele cu bare\nagregă mereu toată intrarea; diagramele Box calculează\nrezumatul în 5 numere pe toată intrarea. Setați 0 pentru a dezactiva\neșantionarea - sigur doar pentru tabele de dimensiuni moderate.\n\nImplicit: 100.000. Câmpul numeric acceptă separatori virgulă."
chart_max_categories = "Numărul maxim de categorii X distincte pe care un grafic cu bare îl acceptă\nînainte de a refuza desenarea. Peste asta randerul afișează o eroare\nîn loc de un zid ilizibil de bare - filtrați sau\nagregați mai întâi tabelul.\n\nImplicit: 200. Câmpul numeric acceptă separatori virgulă."
tables_in_picker = "Câte rânduri de tabel ar trebui să încapă vertical în dialogul\nde selecție multi-tabel (SQLite, DuckDB, ...) la dimensiunea implicită.\nDialogul rămâne redimensionabil - trageți colțul pentru a-l\nmări când o bază de date are multe tabele.\n\nImplicit: 10. Minim 1."
excel_auto_open = "Câte foi dintr-un registru Excel cu mai multe foi se deschid\nautomat (fiecare în fila sa). Registrele cu mai multe\nfoi decât atât afișează un selector ca să alegeți care se deschid\n(puteți alege oricum mai mult, sau toate).\n\nImplicit: 5. Minim 1."
max_recent = "Numărul de fișiere deschise recent afișate în meniul Fișier"
start_maximised = "Când e activ, fereastra pornește maximizată, iar dimensiunea de mai jos\neste folosită ca dimensiune de restaurare din maximizare.\nCând e dezactivat, fereastra pornește la dimensiunea aleasă."
initial_window_size = "Dimensiunea ferestrei la pornire (când \"Pornește maximizat\" e dezactivat),\nsau dimensiunea de restaurare din maximizare când e activat."
ctrl_close = "Închide"
ctrl_restore = "Restaurează"
ctrl_full_size = "Dimensiune completă"
ctrl_minimise = "Minimizează"


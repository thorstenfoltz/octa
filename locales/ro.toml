# ro locale - mirrors locales/en.toml. Common UI translated;
# long explanatory hints fall back to English (runtime t() also falls
# back to English for any missing string).
# Original master note:
# English - master key list. Every other locale mirrors these keys; the
# `every_language_covers_every_english_key` test in src/i18n.rs enforces it.
#
# UI string migration to t!() is incremental: this file covers the whole
# toolbar menu bar (File / Edit / View / Search / Analyse / Help), the column
# menu actions, mark colors, common buttons, and the unsaved-changes / reload
# confirmation dialogs. Most other dialogs, the status bar, and view_modes are
# not migrated yet. Add keys here (and to every locale) as more is migrated.


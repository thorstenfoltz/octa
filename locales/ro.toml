initial_load_cap = "Numărul maxim de rânduri încărcate în tabel la prima deschidere pentru\nformatele de streaming (Parquet, CSV, TSV). Restul rândurilor\nse încarcă în fundal pe măsură ce derulați.\n\nImplicit: 5.000.000. Mărirea îmbunătățește completitudinea\nprimei afișări dar folosește mai multă memorie. Micșorarea face\ndeschiderea inițială mai rapidă dar mută mai mult lucru pe\nîncărcătorul de fundal. Bifați \"Nelimitat\" pentru a dezactiva\ncomplet limita și a încărca toate rândurile de la început.\n\nTastați un număr - aplicat la Aplică."
initial_load_unlimited = "Încarcă fiecare rând din fișier de la început. Recomandat doar\ncând aveți RAM de rezervă - un parquet de 100 M rânduri consumă\ncâțiva GB."
syntax_size_cap = "Fișierele mai mari decât atât revin la monospațiat simplu în\neditorul brut. Setați 0 pentru a dezactiva complet evidențierea\nsintaxei; o valoare foarte mare renunță la protecție.\nJSON/YAML/XML/Markdown/TOML nu sunt niciodată evidențiate\n- folosesc vizualizările lor de arbore/previzualizare.\n\nImplicit: 1 MB. Tastați un număr, alegeți o unitate - la Aplică."
open_as_text = "Extensii suplimentare de tratat ca text simplu la deschidere\n(suprascriu orice cititor le-ar revendica normal).\nSeparate prin virgulă sau spațiu, fără punct inițial, litere mici.\nExemplu: log4j  myproj  rawdata\n\nAplicate la Aplică; au efect la deschiderile ulterioare."
multi_search_cap = "Limită de dimensiune per fișier pentru domeniul de director al\npanoului Căutare multiplă. Fișierele mai mari sunt omise și listate în\nchipul fișierelor omise. Setați 0 pentru a dezactiva limita.\n\nImplicit: 50 MB."
chart_max_points = "Numărul maxim de rânduri pe care fila Grafic le va trasa înainte de\neșantionarea echidistantă (Histogramă, Linie, Dispersie). Graficele cu bare\nagregă mereu toată intrarea; diagramele Box calculează\nrezumatul în 5 numere pe toată intrarea. Setați 0 pentru a dezactiva\neșantionarea - sigur doar pentru tabele de dimensiuni moderate.\n\nImplicit: 100.000. Câmpul numeric acceptă separatori virgulă."
chart_max_categories = "Numărul maxim de categorii X distincte pe care un grafic cu bare îl acceptă\nînainte de a refuza desenarea. Peste asta randerul afișează o eroare\nîn loc de un zid ilizibil de bare - filtrați sau\nagregați mai întâi tabelul.\n\nImplicit: 200. Câmpul numeric acceptă separatori virgulă."

map_fallback = "タイルの取得に失敗したとき(オフライン、ブロック)、そのタブで自動的にジオメトリのみの描画に切り替えます。"
tile_url = "ラスタータイルの URL パターン。`{z}/{x}/{y}` はズームレベルとタイル座標に置き換えられます。既定は OSM タイルサーバーを指します - 本番 / 高負荷の用途では、セルフホストまたは商用プロバイダーを指してください。"
sidebar_position = "ファイル > ディレクトリを開く でフォルダーを開いたとき、\nディレクトリツリーがドッキングする側。"
shortcuts_intro = "「記録」をクリックしてからキーの組み合わせ(Ctrl / Shift / Alt 付き)を押してください。\nEsc で記録をキャンセルします。「クリア」は操作を未割り当てのままにします。"
initial_load_cap = "ストリーミング形式(Parquet、CSV、TSV)で初回に\nテーブルへ読み込む最大行数。残りの行は\nスクロールに応じてバックグラウンドで読み込まれます。\n\n既定: 5,000,000。上げると初回描画の完全性は\n向上しますが、メモリを多く使います。下げると\n初回の表示は速くなりますが、より多くの作業が\nバックグラウンドローダーに回ります。「無制限」を\nチェックすると上限を完全に無効にし、すべての行を\n前もって読み込みます。\n\n数値を入力 - 適用時に反映されます。"
initial_load_unlimited = "ファイルのすべての行を前もって読み込みます。RAM に\n余裕があるときのみ推奨 - 1 億行の parquet は\n数 GB を消費します。"
syntax_size_cap = "これより大きいファイルは生エディターでプレーンな\n等幅にフォールバックします。0 に設定すると構文\nハイライトを完全に無効にします。非常に大きな数値を\n設定するとガードを無効にできます。JSON/YAML/XML/\nMarkdown/TOML は決してハイライトされません - 専用の\nツリー/プレビュー表示を使います。\n\n既定: 1 MB。数値を入力し、単位を選択 - 適用時に反映されます。"
open_as_text = "開くときにプレーンテキストとして扱う追加のファイル\n拡張子(通常それらを処理するリーダーを上書きします)。\nカンマまたは空白区切り、先頭のドットなし、小文字。\n例: log4j  myproj  rawdata\n\n適用時に反映され、以降のファイルを開くときに有効になります。"
multi_search_cap = "マルチ検索パネルのディレクトリ範囲のファイルごとの\nサイズ上限。これより大きいファイルはスキップされ、\nスキップ済みファイルのチップに列挙されます。0 に\n設定すると上限を無効にします。\n\n既定: 50 MB。"
chart_max_points = "チャートタブが均等な間引きを行う前に描画する最大\n行数(ヒストグラム、折れ線、散布図)。棒グラフは常に\n入力全体を集計します。箱ひげ図は入力全体で 5 数\n要約を計算します。0 に設定すると間引きを無効にします\n- 中程度のサイズのテーブルでのみ安全です。\n\n既定: 100,000。数値入力はカンマ区切りを受け付けます。"
chart_max_categories = "棒グラフが描画を拒否する前に受け入れる個別の X\nカテゴリの最大数。これを超えると、判読不能な棒の壁を\n生成する代わりにエラーを表示します - まずテーブルを\n絞り込むか集計してください。\n\n既定: 200。数値入力はカンマ区切りを受け付けます。"
tables_in_picker = "複数テーブルピッカーダイアログ(SQLite、DuckDB、...)が\n既定サイズで縦に収めるべきテーブル行の数。ダイアログは\nユーザーがサイズ変更できます - データベースに多くの\nテーブルがあるときは角をドラッグして大きくしてください。\n\n既定: 10。最小 1。"
excel_auto_open = "複数シートの Excel ブックのうち自動で開くシート数\n(それぞれ独自のタブに)。これより多くのシートを持つ\nブックはピッカーを表示し、どれを開くか選べます\n(この数より多く、またはすべてを選ぶこともできます)。\n\n既定: 5。最小 1。"
max_recent = "ファイルメニューに表示する最近開いたファイルの数"
start_maximised = "オンのとき、ウィンドウは最大化して起動し、下の\nサイズが最大化からの復元サイズとして使われます。\nオフのとき、ウィンドウは選択したサイズで起動します。"
initial_window_size = "起動時に使うウィンドウサイズ(「最大化して起動」がオフのとき)、\nまたはオンのときは最大化からの復元サイズ。"
ctrl_close = "閉じる"
ctrl_restore = "元に戻す"
ctrl_full_size = "フルサイズ"
ctrl_minimise = "最小化"


mcp_row_limit = "Högsta antal rader som `read_table` / `run_sql` returnerar när anroparen utelämnar `limit`. Verktygsschemat annonserar detta standardvärde till modellen så att den kan be om fler (eller obegränsat) vid behov.\n\nStandard: 1,000. Att sätta det högt - eller bocka för Obegränsat - kan skicka mycket stora svar genom stdio och göra MCP-klienten långsam."
cell_byte_cap = "Storleksgräns per cell på tråden. Celler vars textform överskrider detta ersätts med en `[truncated: ...]`-markör och svaret flaggar `cell_truncated: true`. Sätt 0 för att inaktivera gränsen.\n\nStandard: 65,536 (64 KiB)."
map_intro = "Standardvärden för Kartvyn (används av GeoJSON-filer). Den aktiva fliken kan växla mellan Plattor och enbart Geometri via Kart-verktygsfältet."
chat_intro = "Inbyggd AI-assistent som anvander Octas verktyg pa dina oppna flikar och filer. Valj en leverantor och ange dess API-nyckel (eller kor Ollama lokalt), oppna sedan panelen fran verktygsfaltet (menyn Analysera, Assistent)."
chat_max_iterations = "Maximalt antal omgangar av verktygsanrop som assistenten far kora inom ett enda meddelande innan den maste stanna. Ett skydd mot skenande loopar."
chat_max_tokens = "Grans for svarslangden (i tokens) som begars per svar. Obegransat later modellen anvanda sitt eget maximum (Anthropic kraver alltid en grans och anvander dar ett hogt varde)."
chat_provider = "Vilken LLM-backend assistenten anvander. Varje leverantor behover sin egen API-nyckel, utom Ollama som kors lokalt."
chat_model = "Modellen som anvands for den har leverantoren. Valj en forinstallning eller skriv valfritt modellnamn."
chat_base_url = "Bas-URL for den OpenAI-kompatibla endpunkten (OpenRouter, Groq, LM Studio, en egen gateway)."
chat_ollama_url = "Rot-URL till din lokala Ollama-server. Octa lagger till API-sokvagarna."
chat_temperature = "Slumpmassighet i sampling, fran 0 (fokuserad, deterministisk) till 2 (kreativ). 0 rekommenderas for datauppgifter."
chat_position = "Var chattpanelen forankras i forhallande till tabellen."
chat_export_dir = "Mapp dit assistenten skriver exporterade filer (nya CSV, diagram) nar du inte anger en fullstandig sokvag."
chat_api_key = "Din API-nyckel for den har leverantoren. Lagras i systemets nyckelring om tillganglig, annars i klartext i settings.toml."
map_default_mode = "Plattor: hämta en slippy map från den konfigurerade platt-URL:en.\nEnbart geometri: rita bara objekten på en tom yta."
map_fallback = "När platthämtning misslyckas (offline, blockerad), växla automatiskt till enbart geometrirendering för den fliken."
tile_url = "URL-mönster för rasterplattor. `{z}/{x}/{y}` ersätts med zoomnivå och plattkoordinater. Standarden pekar på OSM:s plattserver - för produktion / tung användning, peka på en egen eller kommersiell leverantör."
sidebar_position = "På vilken sida katalogträdet dockas när en mapp öppnas\nvia Arkiv > Öppna katalog."
shortcuts_intro = "Klicka på 'Spela in' och tryck sedan en tangentkombination (med Ctrl / Skift / Alt).\nTryck Esc för att avbryta inspelningen. 'Rensa' lämnar åtgärden obunden."
initial_load_cap = "Högsta antal rader som läses in i tabellen vid första öppningen\nför strömmande format (Parquet, CSV, TSV). Resterande rader\nströmmar in i bakgrunden medan du rullar.\n\nStandard: 5,000,000. Att höja det förbättrar fullständigheten vid\nförsta ritningen men använder mer minne. Att sänka det gör första\növningen snabbare men flyttar mer arbete till bakgrundsinläsaren.\nKryssa i \"Obegränsat\" för att inaktivera gränsen helt och läsa in\nalla rader på förhand.\n\nSkriv ett tal - tillämpas vid Tillämpa."
initial_load_unlimited = "Läs in alla rader i filen på förhand. Rekommenderas bara\nnär du har gott om RAM - en parquet med 100 M rader äter\nflera GB."
syntax_size_cap = "Filer större än detta faller tillbaka till vanlig monospace i\nden råa redigeraren. Sätt 0 för att inaktivera syntaxmarkering\nhelt; sätt ett mycket stort tal för att avstå från skyddet.\nJSON/YAML/XML/Markdown/TOML markeras aldrig - de använder sina\negna träd-/förhandsvisningsvyer.\n\nStandard: 1 MB. Skriv ett tal, välj en enhet - tillämpas vid Tillämpa."
open_as_text = "Extra filändelser att behandla som vanlig text vid öppning\n(åsidosätter den läsare som normalt skulle göra anspråk på dem).\nKomma- eller blankstegsavgränsade, ingen inledande punkt, gemener.\nExempel: log4j  myproj  rawdata\n\nTillämpas vid Tillämpa; gäller för efterföljande filöppningar."
multi_search_cap = "Storleksgräns per fil för Multisök-panelens katalogomfattning.\nStörre filer hoppas över och listas i chippen för överhoppade\nfiler. Sätt 0 för att inaktivera gränsen.\n\nStandard: 50 MB."
chart_max_points = "Högsta antal rader som Diagram-fliken ritar innan jämnt fördelad\nnedsampling slår till (Histogram, Linje, Spridning). Stapeldiagram\naggregerar alltid hela indata; lådagram beräknar 5-talssamman-\nfattningen över hela indata. Sätt 0 för att inaktivera samplingen -\nbara säkert för måttligt stora tabeller.\n\nStandard: 100,000. Numerisk inmatning godtar kommaavgränsare."
chart_max_categories = "Högsta antal distinkta X-kategorier som ett stapeldiagram godtar\ninnan det vägrar rita. Över detta visar renderaren ett fel i\nstället för en oläslig vägg av staplar - filtrera eller aggregera\ntabellen först.\n\nStandard: 200. Numerisk inmatning godtar kommaavgränsare."
tables_in_picker = "Hur många tabellrader dialogen för val av flera tabeller (SQLite,\nDuckDB, ...) ska rymma vertikalt vid sin standardstorlek. Dialogen\när fortfarande storleksändringsbar - dra i hörnet för att göra den\nstörre när en databas har många tabeller.\n\nStandard: 10. Minimum 1."
excel_auto_open = "Hur många blad i en Excel-arbetsbok med flera blad som öppnas\nautomatiskt (vart och ett i en egen flik). Arbetsböcker med fler\nblad än så visar en väljare så att du väljer vilka som ska öppnas\n(du kan fortfarande välja fler än detta antal, eller alla).\n\nStandard: 5. Minimum 1."
max_recent = "Antal nyligen öppnade filer som visas i Arkiv-menyn"
start_maximised = "När på startar fönstret maximerat och storleken nedan används\nsom återställningsstorlek.\nNär av startar fönstret med den valda storleken."
initial_window_size = "Fönsterstorlek vid start (när \"Starta maximerat\" är av),\neller återställningsstorleken när det är på."
ctrl_close = "Stäng"
ctrl_restore = "Återställ"
ctrl_full_size = "Full storlek"
ctrl_minimise = "Minimera"


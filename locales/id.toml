tile_url = "Pola URL untuk ubin raster. `{z}/{x}/{y}` diganti dengan tingkat zoom dan koordinat ubin. Bawaan menunjuk ke server ubin OSM - untuk produksi / penggunaan berat, arahkan ke penyedia mandiri atau komersial."
sidebar_position = "Di sisi mana pohon direktori ditambatkan saat\nfolder dibuka via Berkas > Buka Direktori."
shortcuts_intro = "Klik 'Rekam' lalu tekan kombinasi tombol (dengan Ctrl / Shift / Alt).\nTekan Esc untuk membatalkan perekaman. 'Bersihkan' membiarkan aksi tanpa ikatan."
initial_load_cap = "Maksimum baris yang dimuat ke tabel saat pertama dibuka untuk\nformat streaming (Parquet, CSV, TSV). Baris sisanya\nmengalir di latar saat Anda menggulir.\n\nBawaan: 5.000.000. Menaikkannya memperbaiki kelengkapan\ncat-pertama tetapi memakai lebih banyak memori. Menurunkannya membuat\npembukaan awal lebih cepat tetapi mendorong lebih banyak kerja ke\npemuat latar. Centang \"Tak terbatas\" untuk menonaktifkan\nbatas sepenuhnya dan memuat setiap baris di awal.\n\nKetik angka - diterapkan saat Terapkan."
raw_view_cap = "Maximum file size (in MB) Octa reads fully into the Raw\nview editor. Also gates the parse-error raw fallback and\nthe Compare view's raw side. Larger files skip raw text to\nprotect memory.\n\nDefault: 500 MB. Tick \"Unlimited\" to load any file\nregardless of size. Applied on Apply."
raw_view_unlimited = "Read the full text of any file into the Raw view, with\nno size limit. Use only with RAM to spare - a multi-GB\nfile is read entirely into memory."
initial_load_unlimited = "Muat setiap baris dalam berkas di awal. Disarankan hanya\nsaat Anda punya RAM lebih - parquet 100 juta baris memakan\nbeberapa GB."
syntax_size_cap = "Berkas lebih besar dari ini beralih ke monospace polos di\neditor mentah. Setel ke 0 untuk menonaktifkan penyorotan sintaks\nsepenuhnya; setel angka sangat besar untuk melewati\npenjaga. JSON/YAML/XML/Markdown/TOML tidak pernah disorot\n- mereka memakai tampilan pohon/pratinjau khusus.\n\nBawaan: 1 MB. Ketik angka, pilih satuan - diterapkan saat Terapkan."
open_as_text = "Ekstensi berkas tambahan yang diperlakukan sebagai teks biasa saat dibuka\n(menimpa pembaca mana pun yang biasanya mengklaimnya).\nDipisah koma atau spasi, tanpa titik awal, huruf kecil.\nContoh: log4j  myproj  rawdata\n\nDiterapkan saat Terapkan; berlaku untuk pembukaan berkas berikutnya."
multi_search_cap = "Batas ukuran per-berkas untuk lingkup direktori panel\nPencarian-ganda. Berkas lebih besar dari ini dilewati dan didaftar di\nchip berkas-dilewati. Setel ke 0 untuk menonaktifkan batas.\n\nBawaan: 50 MB."
chart_max_points = "Maksimum baris yang akan diplot tab Grafik sebelum downsampling\nberjarak-rata aktif (Histogram, Garis, Sebar). Grafik Batang\nselalu mengagregasi seluruh masukan; plot Kotak menghitung\nringkasan 5-angka atas seluruh masukan. Setel ke 0 untuk menonaktifkan\nsampling - hanya aman untuk tabel berukuran sedang.\n\nBawaan: 100.000. Masukan numerik menerima pemisah koma."
chart_max_categories = "Maksimum kategori X berbeda yang diterima grafik Batang sebelum\nmenolak menggambar. Di atas ini perender memunculkan galat\nalih-alih menghasilkan dinding batang tak terbaca - saring atau\nagregasikan tabel dahulu.\n\nBawaan: 200. Masukan numerik menerima pemisah koma."
tables_in_picker = "Berapa banyak baris tabel yang harus muat secara vertikal pada dialog\npemilih multi-tabel (SQLite, DuckDB, ...) di ukuran bawaannya.\nDialog tetap bisa diubah ukurannya - seret sudut untuk\nmemperbesarnya saat basis data punya banyak tabel.\n\nBawaan: 10. Minimum 1."
excel_auto_open = "Berapa banyak lembar buku kerja Excel multi-lembar dibuka\notomatis (masing-masing di tabnya). Buku kerja dengan lebih\nbanyak lembar dari ini menampilkan pemilih agar Anda memilih mana yang dibuka\n(Anda tetap bisa memilih lebih dari jumlah ini, atau semua).\n\nBawaan: 5. Minimum 1."
max_recent = "Jumlah berkas yang baru dibuka ditampilkan di menu Berkas"
start_maximised = "Saat aktif, jendela dimulai termaksimalkan dan ukuran di bawah\ndipakai sebagai ukuran pulih-dari-maksimal.\nSaat mati, jendela dimulai pada ukuran yang dipilih."
initial_window_size = "Ukuran jendela saat mulai (ketika \"Mulai termaksimalkan\" mati),\natau ukuran pulih-dari-maksimal saat aktif."
ctrl_close = "Tutup"
ctrl_restore = "Pulihkan"
ctrl_full_size = "Ukuran penuh"
ctrl_minimise = "Minimalkan"


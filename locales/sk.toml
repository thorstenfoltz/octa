chat_audit_warn = "Zobrazit varovanie pri spusteni, ked protokoly prekrocia tuto velkost."
chat_api_key = "Váš API kľúč pre tohto poskytovateľa. Uložený v zväzku kľúčov OS, keď je dostupný, inak v obyčajnom texte v settings.toml."
map_intro = "Predvolené hodnoty pre zobrazenie Mapa (používané súbormi GeoJSON). Aktívna karta môže prepínať medzi Dlaždicami a Iba geometriou cez panel Mapy."
map_default_mode = "Dlaždice: získať posuvnú mapu z nakonfigurovanej URL dlaždíc.\nIba geometria: kresliť iba objekty na prázdnom plátne."
map_fallback = "Keď získanie dlaždíc zlyhá (offline, blokované), automaticky prepnúť na vykresľovanie iba geometrie pre túto kartu."
tile_url = "Šablóna URL pre rastrové dlaždice. `{z}/{x}/{y}` sa nahradia úrovňou priblíženia a súradnicami dlaždice. Predvolene ukazuje na server dlaždíc OSM — pre produkciu / intenzívne použitie nasmerujte na samostatne hostovaného alebo komerčného poskytovateľa."
sidebar_position = "Na ktorej strane je pripojený strom adresárov, keď\nsa priečinok otvorí cez Súbor > Otvoriť priečinok."
shortcuts_intro = "Kliknite „Nahrať“ a stlačte kombináciu klávesov (s Ctrl / Shift / Alt).\nStlačte Esc na zrušenie nahrávania. „Vymazať“ ponechá akciu nepriradenú."
initial_load_cap = "Maximálny počet riadkov načítaných do tabuľky pri prvom otvorení pre\nstreamovacie formáty (Parquet, CSV, TSV). Zvyšné riadky\nsa načítavajú na pozadí počas posúvania.\n\nPredvolene: 5,000,000. Zvýšenie zlepšuje úplnosť\nprvého vykreslenia, ale používa viac pamäte. Zníženie robí\npočiatočné otvorenie rýchlejším, ale presúva viac práce na\nnačítavač na pozadí. Zaškrtnite „Neobmedzené“ na vypnutie\nlimitu úplne a načítanie každého riadku naraz.\n\nZadajte číslo — použije sa pri Použiť."
initial_load_unlimited = "Načítať každý riadok v súbore naraz. Odporúča sa iba,\nkeď máte voľnú RAM — parquet so 100 M riadkami zožerie\nniekoľko GB."
syntax_size_cap = "Súbory väčšie ako toto prejdú na obyčajný monospace v\nsurovom editore. Nastavte 0 na vypnutie zvýrazňovania\nsyntaxe úplne; nastavte veľmi veľké číslo na vzdanie sa\nochrany. JSON/YAML/XML/Markdown/TOML sa nikdy nezvýrazňujú\n— používajú svoje vyhradené zobrazenia strom/náhľad.\n\nPredvolene: 1 MB. Zadajte číslo, vyberte jednotku — použije sa pri Použiť."
open_as_text = "Ďalšie prípony súborov, ktoré sa pri otvorení majú považovať za obyčajný\ntext (prevažuje nad čítačkou, ktorá by ich bežne nárokovala).\nOddelené čiarkou alebo medzerou, bez úvodnej bodky, malými písmenami.\nPríklad: log4j  myproj  rawdata\n\nPoužije sa pri Použiť; nadobúda účinnosť pre nasledujúce otvorenia súborov."
multi_search_cap = "Limit veľkosti súboru pre rozsah adresára panela Viacnásobné hľadanie.\nSúbory väčšie ako toto sa preskočia a uvedú v značke\npreskočených súborov. Nastavte 0 na vypnutie limitu.\n\nPredvolene: 50 MB."
chart_max_points = "Maximálny počet riadkov, ktoré karta Graf vykreslí predtým, ako sa\nzapne rovnomerné preriedenie (Histogram, Čiara, Bodový). Stĺpcové grafy\nvždy agregujú celý vstup; Krabicové počítajú\n5-číselný súhrn nad celým vstupom. Nastavte 0 na vypnutie\npreriedenia — bezpečné iba pre stredne veľké tabuľky.\n\nPredvolene: 100,000. Číselný vstup prijíma oddeľovače-čiarky."
chart_max_categories = "Maximálny počet rôznych kategórií X, ktoré stĺpcový graf prijme predtým, ako\nodmietne kresliť. Nad tým vykresľovač zobrazí chybu\nnamiesto vytvorenia nečitateľnej steny stĺpcov — najskôr filtrujte alebo\nagregujte tabuľku.\n\nPredvolene: 200. Číselný vstup prijíma oddeľovače-čiarky."
tables_in_picker = "Koľko riadkov tabuliek má dialóg výberu viactabuľkových zdrojov (SQLite,\nDuckDB, ...) vertikálne prispôsobiť pri predvolenej veľkosti. Dialóg\nje stále možné meniť veľkosťou — potiahnite roh, aby ste ho urobili\nväčším, keď databáza má veľa tabuliek.\n\nPredvolene: 10. Minimum 1."
excel_auto_open = "Koľko hárkov viachárkového zošita Excel otvoriť\nautomaticky (každý vo svojej karte). Zošity s viac\nhárkami ako toto zobrazia výber, aby ste si vybrali, ktoré otvoriť\n(stále môžete vybrať viac ako toto číslo, alebo všetky).\n\nPredvolene: 5. Minimum 1."
max_recent = "Počet nedávno otvorených súborov zobrazených v menu Súbor"
start_maximised = "Keď je zapnuté, okno sa spustí maximalizované a veľkosť nižšie\nsa použije ako veľkosť obnovenia z maximalizácie.\nKeď je vypnuté, okno sa spustí s vybranou veľkosťou."
initial_window_size = "Veľkosť okna pri spustení (keď je „Spustiť maximalizované“ vypnuté),\nalebo veľkosť obnovenia z maximalizácie, keď je zapnuté."
ctrl_close = "Zavrieť"

mcp_row_limit = "Suurin rivimäärä, jonka `read_table` / `run_sql` palauttaa, kun kutsuja jättää `limit` pois. Työkalun skeema ilmoittaa tämän oletuksen mallille, jotta se voi pyytää enemmän (tai rajoittamatonta) tarvittaessa.\n\nOletus: 1,000. Korkea arvo - tai Rajoittamaton-valinta - voi työntää erittäin suuria vastauksia stdion läpi ja hidastaa MCP-asiakasta."
cell_byte_cap = "Solukohtainen kokorajoitus siirrossa. Solut, joiden tekstimuoto ylittää tämän, korvataan `[truncated: ...]`-merkinnällä, ja vastaus merkitsee `cell_truncated: true`. Aseta 0 poistaaksesi rajoituksen.\n\nOletus: 65,536 (64 KiB)."
map_intro = "Karttanäkymän oletusarvot (GeoJSON-tiedostojen käyttämät). Aktiivinen välilehti voi vaihtaa Laattojen ja pelkän Geometrian välillä Kartta-työkalupalkista."
chat_intro = "Sisaanrakennettu tekoalyavustaja, joka kayttaa Octan tyokaluja avoimiin valilehtiisi ja tiedostoihisi. Valitse palveluntarjoaja ja maarita sen API-avain (tai suorita Ollama paikallisesti), avaa sitten paneeli tyokaluriviltä (Analysoi-valikko, Avustaja)."
chat_max_iterations = "Suurin maara tyokalukutsukierroksia, jotka avustaja voi suorittaa yhdessa viestissa ennen kuin sen on pysahdyttava. Suoja hallitsemattomilta silmukoilta."
chat_max_tokens = "Vastauksen pituuden raja (tokeneina) pyynto kohden. Rajaton antaa mallin kayttaa omaa maksimiaan (Anthropic vaatii aina rajan, joten se kayttaa siella korkeaa arvoa)."
chat_provider = "Mita LLM-taustajarjestelmaa avustaja kayttaa. Jokainen palveluntarjoaja tarvitsee oman API-avaimensa, paitsi Ollama, joka toimii paikallisesti."
chat_model = "Talle palveluntarjoajalle kaytettava malli. Valitse esiasetus tai kirjoita mika tahansa mallin nimi."
chat_base_url = "OpenAI-yhteensopivan paatepisteen perus-URL (OpenRouter, Groq, LM Studio, oma yhdyskaytava)."
chat_ollama_url = "Paikallisen Ollama-palvelimesi juuri-URL. Octa lisaa API-polut."
chat_temperature = "Otannan satunnaisuus, valilta 0 (tarkka, deterministinen) - 2 (luova). Datatehtaviin suositellaan arvoa 0."
chat_position = "Mihin chat-paneeli kiinnittyy suhteessa taulukkoon."
chat_export_dir = "Kansio, johon avustaja kirjoittaa vietavat tiedostot (uudet CSV:t, kaaviot), kun et anna taydellista polkua."
chat_audit_log = "Lisaa jokaisen avustajan tyokalukutsun lokiin asetuskansiossa (chat_audit/). Oletuksena pois."
chat_audit_warn = "Nayta varoitus kaynnistyksessa, kun lokit ylittavat taman koon."
chat_api_key = "Taman palveluntarjoajan API-avaimesi. Tallennetaan jarjestelman avainnippuun jos saatavilla, muuten selvatekstina tiedostoon settings.toml."
map_default_mode = "Laatat: hae slippy map määritetystä laatta-URL:stä.\nVain geometria: piirrä vain kohteet tyhjälle kankaalle."
map_fallback = "Kun laattojen haku epäonnistuu (offline, estetty), vaihda automaattisesti pelkkään geometriapiirtoon kyseisessä välilehdessä."
tile_url = "Rasterilaattojen URL-malli. `{z}/{x}/{y}` korvataan zoomaustasolla ja laatan koordinaateilla. Oletus osoittaa OSM:n laattapalvelimeen - tuotantoon / raskaaseen käyttöön osoita itse isännöityyn tai kaupalliseen palveluntarjoajaan."
sidebar_position = "Kummalle puolelle hakemistopuu kiinnittyy, kun kansio avataan\nkohdasta Tiedosto > Avaa hakemisto."
shortcuts_intro = "Napsauta 'Tallenna' ja paina sitten näppäinyhdistelmää (Ctrl / Vaihto / Alt).\nPaina Esc peruuttaaksesi tallennuksen. 'Tyhjennä' jättää toiminnon sitomatta."
initial_load_cap = "Suurin rivimäärä, joka ladataan taulukkoon ensimmäisellä avauksella\nsuoratoistomuodoille (Parquet, CSV, TSV). Loput rivit latautuvat\ntaustalla vierittäessäsi.\n\nOletus: 5,000,000. Korottaminen parantaa ensimmäisen piirron\ntäydellisyyttä mutta käyttää enemmän muistia. Pienentäminen tekee\nensimmäisestä avauksesta nopeamman mutta siirtää enemmän työtä\ntaustalataajalle. Valitse \"Rajoittamaton\" poistaaksesi rajoituksen\nkokonaan ja ladataksesi kaikki rivit etukäteen.\n\nKirjoita luku - otetaan käyttöön Käytä-painikkeella."
raw_view_cap = "Maximum file size (in MB) Octa reads fully into the Raw\nview editor. Also gates the parse-error raw fallback and\nthe Compare view's raw side. Larger files skip raw text to\nprotect memory.\n\nDefault: 500 MB. Tick \"Unlimited\" to load any file\nregardless of size. Applied on Apply."
raw_view_unlimited = "Read the full text of any file into the Raw view, with\nno size limit. Use only with RAM to spare - a multi-GB\nfile is read entirely into memory."
initial_load_unlimited = "Lataa kaikki tiedoston rivit etukäteen. Suositellaan vain,\nkun muistia on runsaasti - 100 milj. rivin parquet syö\nuseita gigatavuja."
syntax_size_cap = "Tätä suuremmat tiedostot palautuvat tavalliseen monospaceen\nraakaeditorissa. Aseta 0 poistaaksesi syntaksikorostuksen\nkokonaan; aseta hyvin suuri luku ohittaaksesi suojan.\nJSON/YAML/XML/Markdown/TOML ei koskaan korosteta - ne käyttävät\nomia puu-/esikatselunäkymiään.\n\nOletus: 1 MB. Kirjoita luku, valitse yksikkö - otetaan käyttöön Käytä-painikkeella."
open_as_text = "Lisätiedostopäätteet, jotka käsitellään pelkkänä tekstinä avattaessa\n(ohittaa lukijan, joka normaalisti vaatisi ne). Pilkuin tai\nvälilyönnein eroteltuna, ilman alkupistettä, pienin kirjaimin.\nEsimerkki: log4j  myproj  rawdata\n\nOtetaan käyttöön Käytä-painikkeella; vaikuttaa seuraaviin avauksiin."
multi_search_cap = "Tiedostokohtainen kokorajoitus Monihaku-paneelin hakemistolaajuudelle.\nTätä suuremmat tiedostot ohitetaan ja luetellaan ohitettujen\ntiedostojen chipissä. Aseta 0 poistaaksesi rajoituksen.\n\nOletus: 50 MB."
chart_max_points = "Suurin rivimäärä, jonka Kaavio-välilehti piirtää ennen kuin\ntasavälinen alinäytteistys käynnistyy (Histogrammi, Viiva, Hajonta).\nPylväskaaviot aggregoivat aina koko syötteen; laatikkokaaviot\nlaskevat 5-luvun yhteenvedon koko syötteestä. Aseta 0 poistaaksesi\nnäytteistyksen - turvallista vain kohtuullisen kokoisille taulukoille.\n\nOletus: 100,000. Numeerinen syöte hyväksyy pilkkuerottimet."
chart_max_categories = "Suurin määrä erillisiä X-luokkia, jotka pylväskaavio hyväksyy ennen\nkuin se kieltäytyy piirtämästä. Tämän yli piirtäjä näyttää virheen\nlukukelvottoman pylväsmuurin sijaan - suodata tai aggregoi taulukko\nensin.\n\nOletus: 200. Numeerinen syöte hyväksyy pilkkuerottimet."
tables_in_picker = "Kuinka monta taulukkoriviä monitaulukon valintaikkunan (SQLite,\nDuckDB, ...) tulisi mahduttaa pystysuunnassa oletuskoossaan.\nValintaikkuna on edelleen käyttäjän muutettavissa - vedä kulmasta\nsuurentaaksesi sitä, kun tietokannassa on paljon taulukoita.\n\nOletus: 10. Vähintään 1."
excel_auto_open = "Kuinka monta monisivuisen Excel-työkirjan taulukkoa avataan\nautomaattisesti (kukin omaan välilehteensä). Työkirjat, joissa on\nenemmän taulukoita kuin tämä, näyttävät valitsimen, josta valitset\navattavat (voit silti valita enemmän kuin tämän määrän tai kaikki).\n\nOletus: 5. Vähintään 1."
max_recent = "Tiedosto-valikossa näytettävien viimeksi avattujen tiedostojen määrä"
start_maximised = "Kun käytössä, ikkuna käynnistyy suurennettuna ja alla olevaa kokoa\nkäytetään palautuskokona.\nKun pois, ikkuna käynnistyy valitussa koossa."
initial_window_size = "Ikkunan koko käynnistyksessä (kun \"Käynnistä suurennettuna\" on pois)\ntai palautuskoko, kun se on käytössä."
ctrl_close = "Sulje"
ctrl_restore = "Palauta"
ctrl_full_size = "Täysi koko"
ctrl_minimise = "Pienennä"


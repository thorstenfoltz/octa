initial_load_cap = "Suurin rivimäärä, joka ladataan taulukkoon ensimmäisellä avauksella\nsuoratoistomuodoille (Parquet, CSV, TSV). Loput rivit latautuvat\ntaustalla vierittäessäsi.\n\nOletus: 5,000,000. Korottaminen parantaa ensimmäisen piirron\ntäydellisyyttä mutta käyttää enemmän muistia. Pienentäminen tekee\nensimmäisestä avauksesta nopeamman mutta siirtää enemmän työtä\ntaustalataajalle. Valitse \"Rajoittamaton\" poistaaksesi rajoituksen\nkokonaan ja ladataksesi kaikki rivit etukäteen.\n\nKirjoita luku - otetaan käyttöön Käytä-painikkeella."
initial_load_unlimited = "Lataa kaikki tiedoston rivit etukäteen. Suositellaan vain,\nkun muistia on runsaasti - 100 milj. rivin parquet syö\nuseita gigatavuja."
syntax_size_cap = "Tätä suuremmat tiedostot palautuvat tavalliseen monospaceen\nraakaeditorissa. Aseta 0 poistaaksesi syntaksikorostuksen\nkokonaan; aseta hyvin suuri luku ohittaaksesi suojan.\nJSON/YAML/XML/Markdown/TOML ei koskaan korosteta - ne käyttävät\nomia puu-/esikatselunäkymiään.\n\nOletus: 1 MB. Kirjoita luku, valitse yksikkö - otetaan käyttöön Käytä-painikkeella."

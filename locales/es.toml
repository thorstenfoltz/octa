default_mark_color = "Color que aplica el atajo Marcar (Ctrl+M por defecto).\nLa barra / el menú contextual aún permiten elegir cualquier color."
default_search_mode = "Modo de búsqueda/filtro por defecto para nuevas pestañas"
tab_size = "Espacios insertados al pulsar Tab en el editor de texto"
color_aligned = "Colorear columnas en la vista de texto en bruto CSV/TSV\n(solo se aplica cuando 'Alinear columnas' está activado)"
warn_unalign = "Confirmar antes de desactivar 'Alinear columnas' en la vista\nen bruto CSV/TSV - desalinear recarga el archivo del disco\ny descarta las ediciones en búfer."
warn_date_change = "Mostrar un banner cuando la inferencia de fechas reescribe una\ncolumna a la forma de visualización ISO (p. ej. guardada como\n02.05.2026, mostrada como 2026-05-02). Desactívalo para silenciar el aviso."
trim_whitespace = "Eliminar los espacios iniciales/finales de las celdas de texto\nal abrir un archivo. Los espacios interiores se conservan."
warn_trim = "Mostrar un banner con las columnas a las que se recortaron\nespacios al cargar. Independiente del ajuste de recorte."
clean_headers = "Normalizar los encabezados de columna a identificadores snake_case\nal cargar un archivo (recortados, en minúsculas, espacios y puntuación\nse convierten en guiones bajos, los duplicados reciben un sufijo numérico)."
offer_repair = "Cuando un CSV/TSV se lee pero parece mal formado (codificación\nincorrecta, BOM inicial, caracteres de control, un delimitador\nque no concuerda con la extensión o filas muy irregulares),\nmostrar un aviso que ofrece repararlo y recargarlo. Desactivado\npor defecto; la reparación solo se ejecuta si la confirmas."
readonly_notice = "Mostrar un modal de confirmación cada vez que se alterna el modo\nsolo lectura (con F8 o el menú Ver). Desactívalo para cambiar\nel estado en silencio."
notebook_output = "Posición de la salida de código en la vista de Jupyter Notebook\n(solo se aplica a archivos .ipynb en modo Notebook)"
sql_open_default = "Al abrir un archivo tabular, mostrar automáticamente el\neditor SQL junto a la vista de tabla."
sql_panel_position = "Dónde se acopla el editor SQL respecto a la tabla"
sql_row_limit = "LIMIT usado en la consulta de plantilla al abrir una pestaña\n(p. ej. 100 -> SELECT * FROM data LIMIT 100).\nEscribe un número - se aplica al pulsar Aplicar."
autocomplete = "Ofrecer sugerencias de palabras clave SQL y nombres de columna\ndebajo del editor SQL."
editor_font = "Fuente usada por el editor SQL y su columna de números de línea.\nJetBrains Mono viene incluida con Octa.\n\nNota: las ligaduras de programación no se aplican - el\nrenderizador de texto de egui aún no procesa las sustituciones\nGSUB de OpenType."
sql_diff_highlight = "Tras una consulta INSERT/UPDATE/DELETE, resaltar brevemente las celdas y filas modificadas."
sql_diff_secs = "Cuanto tiempo permanece el resaltado de cambios SQL antes de desaparecer."
mcp_intro = "Valores por defecto para el servidor MCP (`octa --mcp`). El servidor los lee una vez al iniciar; cambiarlos con un servidor en ejecución requiere reiniciar `octa --mcp`."
mcp_row_limit = "Máximo de filas que devuelven `read_table` / `run_sql` cuando el llamador omite `limit`. El esquema de la herramienta anuncia este valor por defecto al modelo para que pueda pedir más (o ilimitado) cuando lo necesite.\n\nPor defecto: 1,000. Ponerlo alto - o marcar Ilimitado - puede empujar respuestas muy grandes por stdio y ralentizar el cliente MCP."
cell_byte_cap = "Límite de tamaño por celda en la transmisión. Las celdas cuya forma textual lo supera se reemplazan por un marcador `[truncated: ...]` y la respuesta marca `cell_truncated: true`. Pon 0 para desactivar el límite.\n\nPor defecto: 65,536 (64 KiB)."
map_intro = "Valores por defecto para la vista de Mapa (usada por archivos GeoJSON). La pestaña activa puede alternar entre Teselas y solo Geometría desde la barra del Mapa."
chat_intro = "Asistente de IA integrado que utiliza las herramientas de Octa sobre sus pestanas y archivos abiertos. Elija un proveedor y configure su clave de API (o ejecute Ollama localmente), luego abra el panel desde la barra de herramientas (menu Analizar, Asistente)."
chat_max_iterations = "Numero maximo de rondas de llamadas a herramientas que el asistente puede ejecutar en un solo mensaje antes de detenerse. Una proteccion contra bucles descontrolados."
chat_max_tokens = "Limite de la longitud de la respuesta (en tokens) solicitada por respuesta. Ilimitado permite que el modelo use su propio maximo (Anthropic siempre necesita un limite, por lo que alli usa un valor alto)."
chat_provider = "Que backend de LLM usa el asistente. Cada proveedor necesita su propia clave de API, excepto Ollama, que se ejecuta localmente."
chat_model = "El modelo usado para este proveedor. Elija un preajuste o escriba cualquier nombre de modelo."
chat_base_url = "URL base del endpoint compatible con OpenAI (OpenRouter, Groq, LM Studio, una pasarela propia)."
chat_ollama_url = "URL raiz de su servidor Ollama local. Octa anade las rutas de la API."
chat_temperature = "Aleatoriedad del muestreo, de 0 (enfocado, determinista) a 2 (creativo). Se recomienda 0 para tareas de datos."
chat_position = "Donde se acopla el panel de chat respecto a la tabla."
chat_export_dir = "Carpeta donde el asistente escribe los archivos exportados (CSV nuevos, graficos) cuando no indica una ruta completa."
chat_audit_log = "Anadir cada llamada a herramienta del asistente a un registro en el directorio de configuracion (chat_audit/). Desactivado por defecto."
chat_audit_warn = "Mostrar un aviso al iniciar cuando los registros superen este tamano."
chat_api_key = "Su clave de API para este proveedor. Se guarda en el llavero del sistema si esta disponible; si no, en texto plano en settings.toml."
map_default_mode = "Teselas: obtener un mapa deslizante desde la URL de teselas configurada.\nSolo geometría: dibujar únicamente las entidades sobre un lienzo en blanco."
map_fallback = "Cuando falla la obtención de teselas (sin conexión, bloqueado), cambiar automáticamente al renderizado de solo geometría para esa pestaña."
tile_url = "Patrón de URL para teselas ráster. `{z}/{x}/{y}` se sustituyen por el nivel de zoom y las coordenadas de la tesela. Por defecto apunta al servidor de teselas de OSM - para producción / uso intensivo, apunta a un proveedor propio o comercial."
sidebar_position = "En qué lado se acopla el árbol de directorios cuando se abre\nuna carpeta mediante Archivo > Abrir directorio."
shortcuts_intro = "Haz clic en 'Grabar' y pulsa una combinación de teclas (con Ctrl / Shift / Alt).\nPulsa Esc para cancelar la grabación. 'Borrar' deja la acción sin asignar."
initial_load_cap = "Máximo de filas cargadas en la tabla en la primera apertura para\nformatos de streaming (Parquet, CSV, TSV). Las filas restantes se\ncargan en segundo plano a medida que te desplazas.\n\nPor defecto: 5,000,000. Subirlo mejora la completitud del primer\ndibujado pero usa más memoria. Bajarlo hace la apertura inicial\nmás rápida pero pasa más trabajo al cargador en segundo plano.\nMarca \"Ilimitado\" para desactivar el límite del todo y cargar\ntodas las filas de inmediato.\n\nEscribe un número - se aplica al pulsar Aplicar."
raw_view_cap = "Tamaño máximo de archivo (en MB) que Octa lee por completo en\nel editor de la vista sin formato. También rige el respaldo a texto\nsin formato tras un error de análisis y el lado sin formato de la vista\nde comparación. Los archivos mayores omiten el texto sin formato para\nproteger la memoria.\n\nPredeterminado: 500 MB. Marca \"Sin límite\" para cargar cualquier\narchivo sin importar su tamaño. Se aplica al pulsar Aplicar."
decompress_cap = "Tamaño máximo descomprimido (en MB) para los archivos\n.gz / .zst abiertos de forma transparente. Un archivo comprimido\ndiminuto puede expandirse enormemente (una bomba de descompresión);\npasado este límite se rechaza la apertura.\n\nPredeterminado: 4.295 MB (4 GB). Se aplica al pulsar Aplicar."
decompress_unlimited = "Elimina por completo el límite de descompresión. Marca esto\nsolo para archivos en los que confíes."
raw_view_unlimited = "Lee el texto completo de cualquier archivo en la vista sin formato,\nsin límite de tamaño. Úsalo solo si te sobra RAM: un archivo de\nvarios GB se lee entero en memoria."
initial_load_unlimited = "Cargar todas las filas del archivo de inmediato. Recomendado solo\ncuando tienes RAM de sobra - un parquet de 100 M de filas consume\nvarios GB."
syntax_size_cap = "Los archivos mayores que esto pasan a monospace simple en el\neditor en bruto. Pon 0 para desactivar el resaltado de sintaxis\npor completo; pon un número muy grande para anular la guarda.\nJSON/YAML/XML/Markdown/TOML nunca se resaltan - usan sus propias\nvistas de árbol/previsualización.\n\nPor defecto: 1 MB. Escribe un número, elige una unidad - se aplica al Aplicar."
open_as_text = "Extensiones de archivo extra que tratar como texto plano al abrir\n(anula el lector que normalmente las reclamaría). Separadas por\ncomas o espacios, sin punto inicial, en minúsculas.\nEjemplo: log4j  myproj  rawdata\n\nSe aplica al pulsar Aplicar; surte efecto para aperturas posteriores."
multi_search_cap = "Límite de tamaño por archivo para el ámbito de directorio del panel\nde Búsqueda múltiple. Los archivos mayores se omiten y se listan en\nel chip de archivos omitidos. Pon 0 para desactivar el límite.\n\nPor defecto: 50 MB."
chart_max_points = "Máximo de filas que el panel de Gráfico trazará antes de aplicar un\nsubmuestreo equiespaciado (Histograma, Línea, Dispersión). Los\ngráficos de barras siempre agregan toda la entrada; los diagramas\nde caja calculan el resumen de 5 números sobre toda la entrada.\nPon 0 para desactivar el muestreo - solo seguro con tablas de\ntamaño moderado.\n\nPor defecto: 100,000. La entrada numérica acepta separadores de coma."
chart_max_categories = "Máximo de categorías X distintas que un gráfico de barras aceptará\nantes de negarse a dibujar. Por encima, el renderizador muestra un\nerror en lugar de un muro ilegible de barras - filtra o agrega la\ntabla primero.\n\nPor defecto: 200. La entrada numérica acepta separadores de coma."
tables_in_picker = "Cuántas filas de tabla debe mostrar verticalmente el diálogo selector\nde varias tablas (SQLite, DuckDB, ...) en su tamaño por defecto. El\ndiálogo sigue siendo redimensionable - arrastra la esquina para\nagrandarlo cuando una base de datos tiene muchas tablas.\n\nPor defecto: 10. Mínimo 1."
excel_auto_open = "Cuántas hojas de un libro de Excel con varias hojas abrir\nautomáticamente (cada una en su pestaña). Los libros con más hojas\nque esto muestran un selector para que elijas cuáles abrir (aún\npuedes elegir más de este número, o todas).\n\nPor defecto: 5. Mínimo 1."
max_recent = "Número de archivos abiertos recientemente que se muestran en el menú Archivo"
start_maximised = "Cuando está activo, la ventana se inicia maximizada y el tamaño de\nabajo se usa como tamaño de restauración.\nCuando está desactivado, la ventana se inicia al tamaño elegido."
initial_window_size = "Tamaño de ventana al iniciar (cuando \"Iniciar maximizado\" está\ndesactivado), o el tamaño de restauración cuando está activo."
ctrl_close = "Cerrar"
ctrl_restore = "Restaurar"
ctrl_full_size = "Tamaño completo"
ctrl_minimise = "Minimizar"


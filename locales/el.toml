offer_repair = "Όταν ένα CSV/TSV διαβάζεται αλλά φαίνεται κατεστραμμένο (κακή\nκωδικοποίηση, αρχικό BOM, χαρακτήρες ελέγχου, διαχωριστής\nπου διαφωνεί με την επέκταση ή πολύ ανομοιόμορφες γραμμές),\nεμφάνιση προτροπής που προσφέρει επιδιόρθωση και επαναφόρτωση.\nΑνενεργό από προεπιλογή· η επιδιόρθωση εκτελείται μόνο\nαν την επιβεβαιώσετε."
readonly_notice = "Εμφάνιση παραθύρου επιβεβαίωσης κάθε φορά που εναλλάσσεται η\nλειτουργία μόνο για ανάγνωση (μέσω F8 ή του μενού Προβολή).\nΑπενεργοποιήστε για σιωπηλή εναλλαγή της κατάστασης."
notebook_output = "Θέση εξόδου κώδικα στην προβολή σημειωματαρίου Jupyter\n(ισχύει μόνο για αρχεία .ipynb σε λειτουργία προβολής σημειωματαρίου)"

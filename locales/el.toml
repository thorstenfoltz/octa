initial_load_cap = "Μέγιστος αριθμός γραμμών που φορτώνονται στον πίνακα στο πρώτο άνοιγμα\nγια μορφές ροής (Parquet, CSV, TSV). Οι υπόλοιπες γραμμές\nφορτώνονται στο παρασκήνιο καθώς κάνετε κύλιση.\n\nΠροεπιλογή: 5.000.000. Η αύξηση βελτιώνει την πληρότητα της πρώτης\nαπεικόνισης αλλά χρησιμοποιεί περισσότερη μνήμη. Η μείωση κάνει\nτο αρχικό άνοιγμα ταχύτερο αλλά μεταφέρει περισσότερη δουλειά στον\nφορτωτή παρασκηνίου. Επιλέξτε \"Απεριόριστο\" για να απενεργοποιήσετε\nεντελώς το όριο και να φορτώσετε κάθε γραμμή εκ των προτέρων.\n\nΠληκτρολογήστε αριθμό - εφαρμόζεται με Εφαρμογή."
raw_view_cap = "Maximum file size (in MB) Octa reads fully into the Raw\nview editor. Also gates the parse-error raw fallback and\nthe Compare view's raw side. Larger files skip raw text to\nprotect memory.\n\nDefault: 500 MB. Tick \"Unlimited\" to load any file\nregardless of size. Applied on Apply."
raw_view_unlimited = "Read the full text of any file into the Raw view, with\nno size limit. Use only with RAM to spare - a multi-GB\nfile is read entirely into memory."
initial_load_unlimited = "Φόρτωση κάθε γραμμής του αρχείου εκ των προτέρων. Συνιστάται μόνο\nόταν έχετε άφθονη RAM - ένα parquet 100 εκατ. γραμμών τρώει\nαρκετά GB."
syntax_size_cap = "Αρχεία μεγαλύτερα από αυτό επιστρέφουν σε απλή μονοαποστασιακή\nστον ακατέργαστο επεξεργαστή. Ορίστε 0 για να απενεργοποιήσετε\nεντελώς την επισήμανση σύνταξης· ορίστε πολύ μεγάλο αριθμό για να\nεξαιρεθείτε από την προστασία. Τα JSON/YAML/XML/Markdown/TOML δεν\nεπισημαίνονται ποτέ - χρησιμοποιούν τις δικές τους προβολές δέντρου/προεπισκόπησης.\n\nΠροεπιλογή: 1 MB. Πληκτρολογήστε αριθμό, επιλέξτε μονάδα - εφαρμόζεται με Εφαρμογή."
open_as_text = "Επιπλέον επεκτάσεις αρχείων που αντιμετωπίζονται ως απλό κείμενο κατά το άνοιγμα\n(υπερισχύει του αναγνώστη που κανονικά θα τις διεκδικούσε).\nΧωρισμένες με κόμμα ή κενό, χωρίς αρχική τελεία, πεζά.\nΠαράδειγμα: log4j  myproj  rawdata\n\nΕφαρμόζεται με Εφαρμογή· ισχύει για τα επόμενα ανοίγματα αρχείων."
multi_search_cap = "Όριο μεγέθους ανά αρχείο για την εμβέλεια φακέλου του πίνακα\nπολλαπλής αναζήτησης. Αρχεία μεγαλύτερα από αυτό παραλείπονται και\nαναφέρονται στο chip παραλειφθέντων αρχείων. Ορίστε 0 για απενεργοποίηση του ορίου.\n\nΠροεπιλογή: 50 MB."
chart_max_points = "Μέγιστος αριθμός γραμμών που θα απεικονίσει η καρτέλα Γράφημα πριν ενεργοποιηθεί\nη ομοιόμορφη υποδειγματοληψία (Ιστόγραμμα, Γραμμή, Διασπορά). Τα ραβδογράμματα\nπάντα συναθροίζουν όλη την είσοδο· τα θηκογράμματα υπολογίζουν την\nπεντάριθμη σύνοψη σε όλη την είσοδο. Ορίστε 0 για απενεργοποίηση της\nυποδειγματοληψίας - ασφαλές μόνο για πίνακες μέτριου μεγέθους.\n\nΠροεπιλογή: 100.000. Η αριθμητική είσοδος δέχεται διαχωριστές με κόμμα."
chart_max_categories = "Μέγιστος αριθμός διακριτών κατηγοριών X που θα δεχτεί ένα ραβδόγραμμα πριν\nαρνηθεί να σχεδιάσει. Πάνω από αυτό ο αποδότης εμφανίζει σφάλμα\nαντί να παράγει έναν δυσανάγνωστο τοίχο ράβδων - φιλτράρετε ή\nσυναθροίστε πρώτα τον πίνακα.\n\nΠροεπιλογή: 200. Η αριθμητική είσοδος δέχεται διαχωριστές με κόμμα."
tables_in_picker = "Πόσες γραμμές πινάκων πρέπει να χωρά κατακόρυφα ο διάλογος επιλογής\nπολλών πινάκων (SQLite, DuckDB, ...) στο προεπιλεγμένο μέγεθός του. Ο\nδιάλογος εξακολουθεί να αλλάζει μέγεθος - σύρετε τη γωνία για να τον\nμεγαλώσετε όταν μια βάση έχει πολλούς πίνακες.\n\nΠροεπιλογή: 10. Ελάχιστο 1."
excel_auto_open = "Πόσα φύλλα ενός πολυφυλλικού βιβλίου εργασίας Excel να ανοίγουν\nαυτόματα (το καθένα στη δική του καρτέλα). Βιβλία με περισσότερα\nφύλλα από αυτό εμφανίζουν επιλογέα ώστε να επιλέξετε ποια θα ανοίξουν\n(μπορείτε να επιλέξετε περισσότερα από αυτόν τον αριθμό ή όλα).\n\nΠροεπιλογή: 5. Ελάχιστο 1."
max_recent = "Αριθμός πρόσφατα ανοιγμένων αρχείων που εμφανίζονται στο μενού Αρχείο"
start_maximised = "Όταν είναι ενεργό, το παράθυρο εκκινεί μεγιστοποιημένο και το παρακάτω μέγεθος\nχρησιμοποιείται ως μέγεθος επαναφοράς από τη μεγιστοποίηση.\nΌταν είναι ανενεργό, το παράθυρο εκκινεί στο επιλεγμένο μέγεθος."
initial_window_size = "Μέγεθος παραθύρου που χρησιμοποιείται κατά την εκκίνηση (όταν το \"Έναρξη μεγιστοποιημένο\" είναι ανενεργό),\nή το μέγεθος επαναφοράς από τη μεγιστοποίηση όταν είναι ενεργό."

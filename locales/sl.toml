chat_base_url = "Osnovni URL za s OpenAI združljivo končno točko (OpenRouter, Groq, LM Studio, prehod po meri)."
chat_ollama_url = "Korenski URL vašega lokalnega strežnika Ollama. Octa doda poti API."
chat_temperature = "Naključnost vzorčenja, od 0 (osredotočeno, deterministično) do 2 (ustvarjalno). 0 je priporočeno za naloge s podatki."
chat_position = "Kje se plošča klepeta priključi glede na tabelo."
chat_export_dir = "Mapa, v katero pomočnik zapisuje izvožene datoteke (nove CSV, grafikone), ko ne navedete polne poti."

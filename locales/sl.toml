mcp_row_limit = "Največ vrstic, ki jih vrneta `read_table` / `run_sql`, ko klicatelj izpusti `limit`. Shema orodja oglašuje to privzeto vrednost modelu, da lahko zahteva več (ali neomejeno) po potrebi.\n\nPrivzeto: 1,000. Visoka nastavitev — ali oznaka Neomejeno — lahko potisne zelo velike odgovore skozi stdio in upočasni odjemalca MCP."

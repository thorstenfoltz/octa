tile_url = "URL predloga za rastrske ploščice. `{z}/{x}/{y}` se zamenjajo z ravnjo povečave in koordinatami ploščice. Privzeto kaže na strežnik ploščic OSM — za produkcijo / intenzivno uporabo usmerite na samostojno gostovanega ali komercialnega ponudnika."
sidebar_position = "Na kateri strani je priključeno drevo imenikov, ko\nse mapa odpre prek Datoteka > Odpri mapo."
shortcuts_intro = "Kliknite „Posnemi“ in pritisnite kombinacijo tipk (s Ctrl / Shift / Alt).\nPritisnite Esc za preklic snemanja. „Počisti“ pusti dejanje nepovezano."
initial_load_cap = "Največje število vrstic, naloženih v tabelo ob prvem odpiranju za\nstreaming oblike (Parquet, CSV, TSV). Preostale vrstice\nse nalagajo v ozadju med pomikanjem.\n\nPrivzeto: 5,000,000. Povečanje izboljša popolnost\nprvega izrisa, a porabi več pomnilnika. Zmanjšanje naredi\nzačetno odpiranje hitrejše, a prenese več dela na\nnalagalnik v ozadju. Označite „Neomejeno“, da onemogočite\nomejitev v celoti in naložite vsako vrstico naenkrat.\n\nVnesite število — uporabi se ob Uporabi."
raw_view_cap = "Največja velikost datoteke (v MB), ki jo Octa v celoti prebere v\nurejevalnik surovega pogleda. Omejuje tudi surovi nadomestni prikaz ob napaki\nrazčlenjevanja in surovo stran primerjave. Večje datoteke surovo besedilo\nizpustijo, da se prihrani pomnilnik.\n\nPrivzeto: 500 MB. Označi \"Brez omejitve\" za nalaganje datoteke\nne glede na velikost. Uveljavi se ob potrditvi."
decompress_cap = "Največja velikost po razširitvi (v MB) za prosojno odprte\ndatoteke .gz / .zst. Majhna stisnjena datoteka se lahko silno napihne\n(dekompresijska bomba); nad to omejitvijo je odpiranje zavrnjeno.\n\nPrivzeto: 4.295 MB (4 GB). Uveljavi se ob potrditvi."
decompress_unlimited = "Popolnoma odstrani omejitev velikosti po razširitvi. Označi le\nza arhive, ki jim zaupaš."
raw_view_unlimited = "Preberi celotno besedilo poljubne datoteke v surovi pogled brez\nomejitve velikosti. Uporabljaj le, če imaš dovolj pomnilnika - datoteka\nvelikosti več GB se v celoti prebere v pomnilnik."
initial_load_unlimited = "Naloži vsako vrstico v datoteki naenkrat. Priporočeno samo,\nko imate odvečen RAM — parquet s 100 M vrsticami poje\nnekaj GB."
syntax_size_cap = "Datoteke, večje od tega, preidejo na navaden monospace v\nsurovem urejevalniku. Nastavite 0, da onemogočite poudarjanje\nskladnje v celoti; nastavite zelo veliko število, da se odpoveste\nzaščiti. JSON/YAML/XML/Markdown/TOML se nikoli ne poudarjajo\n— uporabljajo svoje namenske poglede drevo/predogled.\n\nPrivzeto: 1 MB. Vnesite število, izberite enoto — uporabi se ob Uporabi."
open_as_text = "Dodatne pripone datotek, ki naj se ob odpiranju obravnavajo kot navadno\nbesedilo (prevlada nad bralnikom, ki bi jih običajno zahteval).\nLočeno z vejico ali presledkom, brez vodilne pike, z malimi črkami.\nPrimer: log4j  myproj  rawdata\n\nUporabi se ob Uporabi; začne veljati za naslednja odpiranja datotek."
multi_search_cap = "Omejitev velikosti datoteke za obseg imenika plošče Večkratno iskanje.\nDatoteke, večje od tega, se preskočijo in navedejo v oznaki\npreskočenih datotek. Nastavite 0, da onemogočite omejitev.\n\nPrivzeto: 50 MB."
chart_max_points = "Največje število vrstic, ki jih zavihek Grafikon nariše, preden se\nvklopi enakomerno redčenje (Histogram, Črta, Razsevni). Stolpčni grafikoni\nvedno agregirajo celoten vhod; Škatlasti izračunajo\n5-številčni povzetek nad celotnim vhodom. Nastavite 0, da onemogočite\nredčenje — varno samo za zmerno velike tabele.\n\nPrivzeto: 100,000. Številski vnos sprejema ločila-vejice."
chart_max_categories = "Največje število različnih kategorij X, ki jih stolpčni grafikon sprejme, preden\nzavrne risanje. Nad tem upodabljalnik prikaže napako\nnamesto neberljive stene stolpcev — najprej filtrirajte ali\nagregirajte tabelo.\n\nPrivzeto: 200. Številski vnos sprejema ločila-vejice."
tables_in_picker = "Koliko vrstic tabel naj pogovorno okno za izbiro večtabelnih virov (SQLite,\nDuckDB, ...) navpično prilagodi pri privzeti velikosti. Pogovorno okno\nje še vedno mogoče spreminjati po velikosti — povlecite vogal, da ga naredite\nvečjega, ko ima podatkovna baza veliko tabel.\n\nPrivzeto: 10. Najmanj 1."
excel_auto_open = "Koliko listov večlistnega Excelovega delovnega zvezka odpreti\nsamodejno (vsakega v svojem zavihku). Delovni zvezki z več\nlisti od tega prikažejo izbirnik, da izberete, katere odpreti\n(še vedno lahko izberete več od tega števila, ali vse).\n\nPrivzeto: 5. Najmanj 1."
max_recent = "Število nedavno odprtih datotek, prikazanih v meniju Datoteka"
start_maximised = "Ko je vklopljeno, se okno zažene maksimirano, velikost spodaj\npa se uporabi kot velikost obnovitve iz maksimiranja.\nKo je izklopljeno, se okno zažene z izbrano velikostjo."
initial_window_size = "Velikost okna ob zagonu (ko je „Zaženi maksimirano“ izklopljeno),\nali velikost obnovitve iz maksimiranja, ko je vklopljeno."
ctrl_close = "Zapri"
ctrl_restore = "Obnovi"
ctrl_full_size = "Polna velikost"
ctrl_minimise = "Pomanjšaj"


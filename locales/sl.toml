chat_intro = "Vgrajeni AI pomočnik, ki upravlja orodja Octa nad vašimi odprtimi zavihki in datotekami. Izberite ponudnika in nastavite njegov ključ API (ali zaženite Ollama lokalno), nato odprite ploščo iz orodne vrstice (meni Analiza, Pomočnik)."
chat_max_iterations = "Največje število krogov klicev orodij, ki jih pomočnik lahko izvede znotraj enega sporočila, preden se mora ustaviti. Zaščita pred neobvladljivimi zankami orodij."
chat_max_tokens = "Omejitev dolžine odgovora (v žetonih), zahtevana na odgovor. Neomejeno dovoli modelu, da uporabi svoj maksimum (Anthropic vedno potrebuje omejitev, zato tam uporablja visoko vrednost)."
chat_provider = "S katerim zaledjem LLM se pomočnik pogovarja. Vsak ponudnik potrebuje svoj ključ API, razen Ollama, ki teče lokalno."

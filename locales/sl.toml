sql_row_limit = "LIMIT, uporabljen v poizvedbi-ograde ob odpiranju zavihka\n(npr. 100 -> SELECT * FROM data LIMIT 100).\nVnesite število — uporabi se ob Uporabi."
autocomplete = "Ponudi predloge ključnih besed SQL in imen stolpcev\npod urejevalnikom SQL."
editor_font = "Videz pisave, ki ga uporablja urejevalnik SQL in njegova\nvrstica s številkami vrstic. JetBrains Mono je priložen Octa.\n\nOpomba: programske ligature se ne uporabljajo — egui\nupodabljalnik besedila še ne obdeluje zamenjav OpenType GSUB."
sql_diff_highlight = "Po poizvedbi INSERT/UPDATE/DELETE na kratko oznaci spremenjene celice in vrstice."
sql_diff_secs = "Kako dolgo ostane oznacevanje sprememb SQL, preden zbledi."
mcp_intro = "Privzete vrednosti za strežnik MCP (`octa --mcp`). Strežnik jih prebere enkrat ob zagonu; sprememba med delovanjem strežnika zahteva ponovni zagon `octa --mcp`."
mcp_row_limit = "Največ vrstic, ki jih vrneta `read_table` / `run_sql`, ko klicatelj izpusti `limit`. Shema orodja oglašuje to privzeto vrednost modelu, da lahko zahteva več (ali neomejeno) po potrebi.\n\nPrivzeto: 1,000. Visoka nastavitev — ali oznaka Neomejeno — lahko potisne zelo velike odgovore skozi stdio in upočasni odjemalca MCP."
cell_byte_cap = "Omejitev velikosti celice po žici. Celice, katerih besedilna oblika presega to, se zamenjajo z oznako `[truncated: ...]`, odgovor pa označi `cell_truncated: true`. Nastavite 0, da onemogočite omejitev.\n\nPrivzeto: 65,536 (64 KiB)."
chat_intro = "Vgrajeni AI pomočnik, ki upravlja orodja Octa nad vašimi odprtimi zavihki in datotekami. Izberite ponudnika in nastavite njegov ključ API (ali zaženite Ollama lokalno), nato odprite ploščo iz orodne vrstice (meni Analiza, Pomočnik)."
chat_max_iterations = "Največje število krogov klicev orodij, ki jih pomočnik lahko izvede znotraj enega sporočila, preden se mora ustaviti. Zaščita pred neobvladljivimi zankami orodij."
chat_max_tokens = "Omejitev dolžine odgovora (v žetonih), zahtevana na odgovor. Neomejeno dovoli modelu, da uporabi svoj maksimum (Anthropic vedno potrebuje omejitev, zato tam uporablja visoko vrednost)."
chat_provider = "S katerim zaledjem LLM se pomočnik pogovarja. Vsak ponudnik potrebuje svoj ključ API, razen Ollama, ki teče lokalno."
chat_model = "Model, uporabljen za tega ponudnika. Izberite prednastavitev ali vnesite ime modela."
chat_base_url = "Osnovni URL za s OpenAI združljivo končno točko (OpenRouter, Groq, LM Studio, prehod po meri)."
chat_ollama_url = "Korenski URL vašega lokalnega strežnika Ollama. Octa doda poti API."
chat_temperature = "Naključnost vzorčenja, od 0 (osredotočeno, deterministično) do 2 (ustvarjalno). 0 je priporočeno za naloge s podatki."
chat_position = "Kje se plošča klepeta priključi glede na tabelo."
chat_export_dir = "Mapa, v katero pomočnik zapisuje izvožene datoteke (nove CSV, grafikone), ko ne navedete polne poti."
chat_audit_log = "Doda vsak klic orodja pomocnika v dnevnik v mapi nastavitev (chat_audit/). Privzeto izklopljeno."
chat_audit_warn = "Ob zagonu prikazi opozorilo, ko dnevniki presezejo to velikost."
chat_api_key = "Vaš ključ API za tega ponudnika. Shranjen v zbirki ključev OS, ko je na voljo, sicer v navadnem besedilu v settings.toml."
map_intro = "Privzete vrednosti za pogled Zemljevid (uporabljajo ga datoteke GeoJSON). Aktivni zavihek lahko preklaplja med Ploščicami in Samo geometrijo prek orodne vrstice Zemljevida."
map_default_mode = "Ploščice: pridobi drsni zemljevid z nastavljenega URL ploščic.\nSamo geometrija: nariši samo objekte na praznem platnu."
map_fallback = "Ko pridobivanje ploščic ne uspe (brez povezave, blokirano), samodejno preklopi na upodabljanje samo geometrije za ta zavihek."
tile_url = "URL predloga za rastrske ploščice. `{z}/{x}/{y}` se zamenjajo z ravnjo povečave in koordinatami ploščice. Privzeto kaže na strežnik ploščic OSM — za produkcijo / intenzivno uporabo usmerite na samostojno gostovanega ali komercialnega ponudnika."
sidebar_position = "Na kateri strani je priključeno drevo imenikov, ko\nse mapa odpre prek Datoteka > Odpri mapo."
shortcuts_intro = "Kliknite „Posnemi“ in pritisnite kombinacijo tipk (s Ctrl / Shift / Alt).\nPritisnite Esc za preklic snemanja. „Počisti“ pusti dejanje nepovezano."
initial_load_cap = "Največje število vrstic, naloženih v tabelo ob prvem odpiranju za\nstreaming oblike (Parquet, CSV, TSV). Preostale vrstice\nse nalagajo v ozadju med pomikanjem.\n\nPrivzeto: 5,000,000. Povečanje izboljša popolnost\nprvega izrisa, a porabi več pomnilnika. Zmanjšanje naredi\nzačetno odpiranje hitrejše, a prenese več dela na\nnalagalnik v ozadju. Označite „Neomejeno“, da onemogočite\nomejitev v celoti in naložite vsako vrstico naenkrat.\n\nVnesite število — uporabi se ob Uporabi."
raw_view_cap = "Maximum file size (in MB) Octa reads fully into the Raw\nview editor. Also gates the parse-error raw fallback and\nthe Compare view's raw side. Larger files skip raw text to\nprotect memory.\n\nDefault: 500 MB. Tick \"Unlimited\" to load any file\nregardless of size. Applied on Apply."
raw_view_unlimited = "Read the full text of any file into the Raw view, with\nno size limit. Use only with RAM to spare - a multi-GB\nfile is read entirely into memory."
initial_load_unlimited = "Naloži vsako vrstico v datoteki naenkrat. Priporočeno samo,\nko imate odvečen RAM — parquet s 100 M vrsticami poje\nnekaj GB."
syntax_size_cap = "Datoteke, večje od tega, preidejo na navaden monospace v\nsurovem urejevalniku. Nastavite 0, da onemogočite poudarjanje\nskladnje v celoti; nastavite zelo veliko število, da se odpoveste\nzaščiti. JSON/YAML/XML/Markdown/TOML se nikoli ne poudarjajo\n— uporabljajo svoje namenske poglede drevo/predogled.\n\nPrivzeto: 1 MB. Vnesite število, izberite enoto — uporabi se ob Uporabi."
open_as_text = "Dodatne pripone datotek, ki naj se ob odpiranju obravnavajo kot navadno\nbesedilo (prevlada nad bralnikom, ki bi jih običajno zahteval).\nLočeno z vejico ali presledkom, brez vodilne pike, z malimi črkami.\nPrimer: log4j  myproj  rawdata\n\nUporabi se ob Uporabi; začne veljati za naslednja odpiranja datotek."
multi_search_cap = "Omejitev velikosti datoteke za obseg imenika plošče Večkratno iskanje.\nDatoteke, večje od tega, se preskočijo in navedejo v oznaki\npreskočenih datotek. Nastavite 0, da onemogočite omejitev.\n\nPrivzeto: 50 MB."
chart_max_points = "Največje število vrstic, ki jih zavihek Grafikon nariše, preden se\nvklopi enakomerno redčenje (Histogram, Črta, Razsevni). Stolpčni grafikoni\nvedno agregirajo celoten vhod; Škatlasti izračunajo\n5-številčni povzetek nad celotnim vhodom. Nastavite 0, da onemogočite\nredčenje — varno samo za zmerno velike tabele.\n\nPrivzeto: 100,000. Številski vnos sprejema ločila-vejice."
chart_max_categories = "Največje število različnih kategorij X, ki jih stolpčni grafikon sprejme, preden\nzavrne risanje. Nad tem upodabljalnik prikaže napako\nnamesto neberljive stene stolpcev — najprej filtrirajte ali\nagregirajte tabelo.\n\nPrivzeto: 200. Številski vnos sprejema ločila-vejice."
tables_in_picker = "Koliko vrstic tabel naj pogovorno okno za izbiro večtabelnih virov (SQLite,\nDuckDB, ...) navpično prilagodi pri privzeti velikosti. Pogovorno okno\nje še vedno mogoče spreminjati po velikosti — povlecite vogal, da ga naredite\nvečjega, ko ima podatkovna baza veliko tabel.\n\nPrivzeto: 10. Najmanj 1."
excel_auto_open = "Koliko listov večlistnega Excelovega delovnega zvezka odpreti\nsamodejno (vsakega v svojem zavihku). Delovni zvezki z več\nlisti od tega prikažejo izbirnik, da izberete, katere odpreti\n(še vedno lahko izberete več od tega števila, ali vse).\n\nPrivzeto: 5. Najmanj 1."
max_recent = "Število nedavno odprtih datotek, prikazanih v meniju Datoteka"
start_maximised = "Ko je vklopljeno, se okno zažene maksimirano, velikost spodaj\npa se uporabi kot velikost obnovitve iz maksimiranja.\nKo je izklopljeno, se okno zažene z izbrano velikostjo."
initial_window_size = "Velikost okna ob zagonu (ko je „Zaženi maksimirano“ izklopljeno),\nali velikost obnovitve iz maksimiranja, ko je vklopljeno."
ctrl_close = "Zapri"
ctrl_restore = "Obnovi"
ctrl_full_size = "Polna velikost"
ctrl_minimise = "Pomanjšaj"


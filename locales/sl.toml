map_intro = "Privzete vrednosti za pogled Zemljevid (uporabljajo ga datoteke GeoJSON). Aktivni zavihek lahko preklaplja med Ploščicami in Samo geometrijo prek orodne vrstice Zemljevida."
map_default_mode = "Ploščice: pridobi drsni zemljevid z nastavljenega URL ploščic.\nSamo geometrija: nariši samo objekte na praznem platnu."

mcp_intro = "Standardwerte für den MCP-Server (`octa --mcp`). Der Server liest diese einmal beim Start; eine Änderung bei laufendem Server erfordert einen `octa --mcp`-Neustart."
mcp_row_limit = "Maximale Zeilenzahl, die `read_table` / `run_sql` zurückgeben, wenn der Aufrufer `limit` weglässt. Das Tool-Schema gibt diesen Standard an das Modell weiter, damit es bei Bedarf mehr (oder unbegrenzt) anfordern kann.\n\nStandard: 1.000. Ein hoher Wert - oder das Aktivieren von Unbegrenzt - kann sehr große Antworten durch stdio schieben und den MCP-Client verlangsamen."
cell_byte_cap = "Größenobergrenze pro Zelle für die Übertragung. Zellen, deren Textform dies überschreitet, werden durch eine `[truncated: ...]`-Markierung ersetzt, und die Antwort meldet `cell_truncated: true`. Auf 0 setzen, um die Grenze zu deaktivieren.\n\nStandard: 65.536 (64 KiB)."
map_intro = "Standardwerte für die Kartenansicht (von GeoJSON-Dateien verwendet). Der aktive Tab kann über die Karten-Symbolleiste zwischen Kacheln und nur Geometrie wechseln."
chat_intro = "In-App-KI-Assistent, der Octas Tools auf Deine offenen Tabs und Dateien anwendet. Wähle einen Anbieter und hinterlege den API-Schlüssel (oder nutze Ollama lokal), dann öffne das Panel über die Symbolleiste (Menü Analyse, Assistent)."
chat_max_iterations = "Maximale Anzahl an Tool-Aufruf-Runden, die der Assistent innerhalb einer Nachricht ausführen darf, bevor er stoppen muss. Ein Schutz gegen endlose Tool-Schleifen."
chat_max_tokens = "Begrenzung der Antwortlänge (in Tokens) pro Antwort. Unbegrenzt lässt das Modell sein eigenes Maximum nutzen (Anthropic benötigt immer eine Begrenzung und verwendet dort einen hohen Wert)."
chat_provider = "Welches LLM-Backend der Assistent nutzt. Jeder Anbieter braucht seinen eigenen API-Schlüssel, außer Ollama, das lokal läuft."
chat_model = "Das für diesen Anbieter verwendete Modell. Wähle eine Vorgabe oder gib einen beliebigen Modellnamen ein."
chat_base_url = "Basis-URL für den OpenAI-kompatiblen Endpunkt (OpenRouter, Groq, LM Studio, ein eigenes Gateway)."
chat_ollama_url = "Root-URL Ihres lokalen Ollama-Servers. Octa hängt die API-Pfade an."
chat_temperature = "Zufälligkeit der Generierung, von 0 (fokussiert, deterministisch) bis 2 (kreativ). Für Datenaufgaben wird 0 empfohlen."
chat_position = "Wo das Chat-Panel relativ zur Tabelle andockt."
chat_export_dir = "Ordner, in den der Assistent exportierte Dateien schreibt (neue CSVs, Diagramme), wenn Sie keinen vollständigen Pfad angeben."
chat_audit_log = "Jeden Tool-Aufruf des Assistenten in ein Protokoll unter dem Konfigurationsordner (chat_audit/) schreiben. Standardmäßig aus."
chat_audit_warn = "Beim Start warnen, wenn die Protokolle diese Größe überschreiten."
chat_api_key = "Dein API-Schlüssel für diesen Anbieter. Wird im OS-Schlüsselbund gespeichert, sofern verfügbar, sonst im Klartext in settings.toml."
map_default_mode = "Kacheln: eine Slippy-Map von der konfigurierten Kachel-URL abrufen.\nNur Geometrie: nur die Features auf leerer Fläche zeichnen."
map_fallback = "Wenn der Kachelabruf fehlschlägt (offline, blockiert), für diesen Tab automatisch zur reinen Geometriedarstellung wechseln."
tile_url = "URL-Muster für Rasterkacheln. `{z}/{x}/{y}` werden durch Zoomstufe und Kachelkoordinaten ersetzt. Der Standard zeigt auf den OSM-Kachelserver - für Produktion / intensive Nutzung auf einen selbst gehosteten oder kommerziellen Anbieter zeigen."
sidebar_position = "Auf welcher Seite der Verzeichnisbaum andockt, wenn ein\nOrdner über Datei > Verzeichnis öffnen geöffnet wird."
shortcuts_intro = "Klicken Sie auf 'Aufnehmen' und drücken Sie eine Tastenkombination (mit Strg / Umschalt / Alt).\nEsc bricht die Aufnahme ab. 'Löschen' lässt die Aktion ungebunden."
initial_load_cap = "Maximale Zeilenzahl, die beim ersten Öffnen für Streaming-Formate\n(Parquet, CSV, TSV) in die Tabelle geladen wird. Die übrigen Zeilen\nwerden beim Scrollen im Hintergrund nachgeladen.\n\nStandard: 5.000.000. Ein höherer Wert verbessert die Vollständigkeit\nbeim ersten Zeichnen, braucht aber mehr Speicher. Ein niedrigerer Wert\nmacht das erste Öffnen schneller, verlagert aber mehr Arbeit auf den\nHintergrundlader. \"Unbegrenzt\" deaktiviert die Grenze ganz und lädt\nalle Zeilen sofort.\n\nZahl eingeben - wird beim Anwenden übernommen."
raw_view_cap = "Maximum file size (in MB) Octa reads fully into the Raw\nview editor. Also gates the parse-error raw fallback and\nthe Compare view's raw side. Larger files skip raw text to\nprotect memory.\n\nDefault: 500 MB. Tick \"Unlimited\" to load any file\nregardless of size. Applied on Apply."
raw_view_unlimited = "Read the full text of any file into the Raw view, with\nno size limit. Use only with RAM to spare - a multi-GB\nfile is read entirely into memory."
initial_load_unlimited = "Alle Zeilen der Datei sofort laden. Nur empfohlen, wenn\ngenug RAM vorhanden ist. Eine Parquet-Datei mit 100 Mio.\nZeilen erreicht schnell mehrere GB."
syntax_size_cap = "Dateien, die größer sind, fallen im Roheditor auf einfache\nMonospace-Darstellung zurück. Auf 0 setzen, um die\nSyntaxhervorhebung ganz zu deaktivieren; einen sehr großen\nWert setzen, um die Schutzgrenze abzuschalten. JSON/YAML/XML/\nMarkdown/TOML werden nie hervorgehoben - sie nutzen ihre\neigenen Baum-/Vorschauansichten.\n\nStandard: 1 MB. Zahl eingeben, Einheit wählen - beim Anwenden übernommen."
open_as_text = "Zusätzliche Dateierweiterungen, die beim Öffnen als reiner Text\nbehandelt werden (überschreibt den sonst zuständigen Reader).\nKomma- oder leerzeichengetrennt, ohne führenden Punkt, klein.\nBeispiel: log4j  myproj  rawdata\n\nBeim Anwenden übernommen; wirkt für nachfolgende Dateiöffnungen."
multi_search_cap = "Größenobergrenze pro Datei für den Verzeichnisbereich des\nMehrfachsuche-Panels. Größere Dateien werden übersprungen und\nim Chip der übersprungenen Dateien aufgeführt. Auf 0 setzen,\num die Grenze zu deaktivieren.\n\nStandard: 50 MB."
chart_max_points = "Maximale Zeilenzahl, die der Diagramm-Tab zeichnet, bevor\ngleichmäßiges Heruntertasten einsetzt (Histogramm, Linie, Streu).\nBalkendiagramme aggregieren immer die gesamte Eingabe; Boxplots\nberechnen die 5-Zahlen-Zusammenfassung über die gesamte Eingabe.\nAuf 0 setzen, um das Sampling zu deaktivieren - nur für mäßig\ngroße Tabellen sicher.\n\nStandard: 100.000. Numerische Eingabe akzeptiert Komma-Trennzeichen."
chart_max_categories = "Maximale Anzahl eindeutiger X-Kategorien, die ein Balkendiagramm\nakzeptiert, bevor es das Zeichnen verweigert. Darüber zeigt der\nRenderer einen Fehler statt einer unleserlichen Balkenwand -\nfiltern oder aggregieren Sie die Tabelle zuerst.\n\nStandard: 200. Numerische Eingabe akzeptiert Komma-Trennzeichen."
tables_in_picker = "Wie viele Tabellenzeilen der Mehrtabellen-Auswahldialog (SQLite,\nDuckDB, ...) bei seiner Standardgröße vertikal fassen soll. Der\nDialog bleibt vom Benutzer veränderbar - zieh die Ecke, um\nihn zu vergrößern, wenn eine Datenbank viele Tabellen hat.\n\nStandard: 10. Minimum 1."
excel_auto_open = "Wie viele Blätter einer mehrblättrigen Excel-Arbeitsmappe\nautomatisch geöffnet werden (jedes in eigenem Tab). Arbeitsmappen\nmit mehr Blättern zeigen eine Auswahl, damit Du wählst, welche\ngeöffnet werden (Du kannst mehr als diese Zahl oder alle wählen).\n\nStandard: 5. Minimum 1."
max_recent = "Anzahl der zuletzt geöffneten Dateien, die im Datei-Menü angezeigt werden"
start_maximised = "Wenn aktiv, startet das Fenster maximiert und die Größe unten\nwird als Wiederherstellungsgröße verwendet.\nWenn aus, startet das Fenster in der gewählten Größe."
initial_window_size = "Fenstergröße beim Start (wenn \"Maximiert starten\" aus ist),\noder die Wiederherstellungsgröße, wenn es an ist."
ctrl_close = "Schließen"
ctrl_restore = "Wiederherstellen"
ctrl_full_size = "Volle Größe"
ctrl_minimise = "Minimieren"


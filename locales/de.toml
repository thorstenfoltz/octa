write_protection = "Protects your files. When on, the assistant and database\nsaves cannot change existing files, and adding or removing columns in\na SQLite, DuckDB, or GeoPackage file is refused.\nTurn off to allow those writes."
backup_before_modify = "Before the assistant or a schema-changing database save overwrites\na file, copy it to a timestamped .bak file next to it first.\nRoutine manual saves are not backed up."
chat_profiles = "Each profile is one saved setup: a provider, a model, a temperature and an optional thinking budget, under a name you choose. Make as many as you like, including several for the same provider, and switch between them from the assistant panel."

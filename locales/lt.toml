mcp_row_limit = "Maksimalus eilučių skaičius, grąžinamas `read_table` / `run_sql`, kai iškvietėjas nenurodo `limit`. Įrankio schema skelbia šį numatytąjį modeliui, kad jis prireikus galėtų prašyti daugiau (arba neriboto).\n\nNumatyta: 1,000. Nustačius didelę reikšmę - arba pažymėjus Neribota - per stdio gali būti perduodami labai dideli atsakymai ir sulėtinti MCP klientą."
cell_byte_cap = "Vieno langelio perdavimo dydžio limitas. Langeliai, kurių tekstinė forma jį viršija, pakeičiami `[truncated: ...]` žymekliu ir atsakymas pažymi `cell_truncated: true`. Nustatykite 0, kad išjungtumėte limitą.\n\nNumatyta: 65,536 (64 KiB)."
chat_intro = "Programos viduje veikiantis DI asistentas, valdantis Octa įrankius jūsų atvertose kortelėse ir failuose. Pasirinkite tiekėją ir nustatykite jo API raktą (arba paleiskite Ollama vietoje), tada atverkite skydelį iš įrankių juostos (Analizės meniu, Asistentas)."
chat_max_iterations = "Maksimalus įrankių iškvietimų raundų skaičius, kurį asistentas gali atlikti per vieną žinutę prieš sustodamas. Apsauga nuo nevaldomų įrankių ciklų."
chat_max_tokens = "Atsakymo ilgio limitas (žetonais), prašomas kiekvienam atsakymui. Neribota leidžia modeliui naudoti savo maksimumą (Anthropic visada reikalauja limito, todėl ten naudojama didelė reikšmė)."
chat_provider = "Su kuriuo LLM posistemiu kalbasi asistentas. Kiekvienam tiekėjui reikia savo API rakto, išskyrus Ollama, kuri veikia vietoje."
chat_model = "Modelis, naudojamas šiam tiekėjui. Pasirinkite išankstinį nustatymą arba įveskite bet kurį modelio pavadinimą."
chat_base_url = "Bazinis URL OpenAI suderinamai galutinei vietai (OpenRouter, Groq, LM Studio, pasirinktinis tinklų sietuvas)."
chat_ollama_url = "Jūsų vietinio Ollama serverio šakninis URL. Octa prideda API kelius."
chat_temperature = "Atrankos atsitiktinumas, nuo 0 (sutelktas, determinuotas) iki 2 (kūrybiškas). Duomenų užduotims rekomenduojama 0."
chat_position = "Kur pokalbių skydelis prijungiamas lentelės atžvilgiu."
chat_export_dir = "Aplankas, į kurį asistentas įrašo eksportuotus failus (naujus CSV, diagramas), kai nenurodote pilno kelio."
chat_audit_log = "Prideda kiekviena asistento irankio kvietima i zurnala konfiguracijos kataloge (chat_audit/). Pagal numatymus isjungta."
chat_audit_warn = "Rodyti ispejima paleidziant, kai zurnalai virsija si dydi."
chat_api_key = "Jūsų API raktas šiam tiekėjui. Saugomas jūsų OS raktinėje, kai įmanoma, kitaip - grynu tekstu settings.toml faile."
map_intro = "Žemėlapio rodinio numatytieji nustatymai (naudojami GeoJSON failų). Aktyvi kortelė gali persijungti tarp Plytelių ir Tik geometrijos per Žemėlapio įrankių juostą."
map_default_mode = "Plytelės: atsiųsti slankų žemėlapį iš sukonfigūruoto plytelės URL.\nTik geometrija: nupiešti tik objektus tuščioje drobėje."
map_fallback = "Kai plytelės atsiuntimas nepavyksta (neprisijungus, užblokuota), automatiškai persijungti į tik geometrijos atvaizdavimą tai kortelei."
tile_url = "URL šablonas rastrinėms plytelėms. `{z}/{x}/{y}` pakeičiami mastelio lygiu ir plytelės koordinatėmis. Numatyta nukreipia į OSM plytelių serverį - gamybiniam / dideliam naudojimui nukreipkite į savarankiškai talpinamą ar komercinį tiekėją."
sidebar_position = "Kurioje pusėje prijungiamas katalogų medis,\nkai aplankas atveriamas per Failas > Atverti katalogą."
shortcuts_intro = "Spustelėkite „Įrašyti“, tada paspauskite klavišų kombinaciją (su Ctrl / Shift / Alt).\nPaspauskite Esc įrašymui atšaukti. „Išvalyti“ palieka veiksmą nepriskirtą."
initial_load_cap = "Maksimalus eilučių skaičius, įkeliamas į lentelę pirmą kartą atveriant\nsrautinius formatus (Parquet, CSV, TSV). Likusios eilutės\nsrautu įkeliamos fone jums slenkant.\n\nNumatyta: 5,000,000. Padidinus pagerinamas pirmojo piešimo\npilnumas, bet naudojama daugiau atminties. Sumažinus pradinis\natvėrimas tampa greitesnis, bet daugiau darbo perduodama\nfono įkėlikliui. Pažymėkite \"Neribota\", kad visiškai išjungtumėte\nlimitą ir įkeltumėte kiekvieną eilutę iš karto.\n\nĮveskite skaičių - taikoma paspaudus Taikyti."
raw_view_cap = "Maximum file size (in MB) Octa reads fully into the Raw\nview editor. Also gates the parse-error raw fallback and\nthe Compare view's raw side. Larger files skip raw text to\nprotect memory.\n\nDefault: 500 MB. Tick \"Unlimited\" to load any file\nregardless of size. Applied on Apply."
raw_view_unlimited = "Read the full text of any file into the Raw view, with\nno size limit. Use only with RAM to spare - a multi-GB\nfile is read entirely into memory."
initial_load_unlimited = "Įkelti kiekvieną failo eilutę iš karto. Rekomenduojama tik\nkai turite atsarginės RAM - 100 mln. eilučių parquet suvalgo\nkelis GB."
syntax_size_cap = "Už šį didesni failai pereina prie paprasto lygiapločio\nneapdoroto teksto redaktoriuje. Nustatykite 0, kad visiškai\nišjungtumėte sintaksės paryškinimą; nustatykite labai didelį skaičių\napsaugai atsisakyti. JSON/YAML/XML/Markdown/TOML niekada nepažymimi\n- jie naudoja savo medžio/peržiūros rodinius.\n\nNumatyta: 1 MB. Įveskite skaičių, pasirinkite vienetą - taikoma paspaudus Taikyti."
open_as_text = "Papildomi failų plėtiniai, traktuojami kaip paprastas tekstas atveriant\n(pakeičia bet kurią skaityklę, kuri juos paprastai paimtų).\nAtskirti kableliais arba tarpais, be pradinio taško, mažosiomis raidėmis.\nPavyzdys: log4j  myproj  rawdata\n\nTaikoma paspaudus Taikyti; įsigalioja vėlesniems failų atvėrimams."
multi_search_cap = "Vieno failo dydžio limitas Daugybinės paieškos skydelio katalogo\napimčiai. Už šį didesni failai praleidžiami ir nurodomi\npraleistų failų ženklelyje. Nustatykite 0, kad išjungtumėte limitą.\n\nNumatyta: 50 MB."
chart_max_points = "Maksimalus eilučių skaičius, kurį Diagramos kortelė nubraižys prieš įsijungiant\ntolygiam retinimui (Histograma, Linija, Sklaida). Stulpelinės diagramos\nvisada agreguoja visą įvestį; Stačiakampių diagramos apskaičiuoja\n5 skaičių santrauką visai įvesčiai. Nustatykite 0, kad išjungtumėte\nretinimą - saugu tik vidutinio dydžio lentelėms.\n\nNumatyta: 100,000. Skaitinė įvestis priima kablelius."
chart_max_categories = "Maksimalus skirtingų X kategorijų skaičius, kurį Stulpelinė diagrama priims prieš\natsisakydama braižyti. Viršijus šį skaičių piešyklė parodo klaidą,\no ne nesuprantamą stulpelių sieną - pirma filtruokite arba\nagreguokite lentelę.\n\nNumatyta: 200. Skaitinė įvestis priima kablelius."
tables_in_picker = "Kiek lentelės eilučių daugialentelis parinkiklio dialogas (SQLite,\nDuckDB, ...) turėtų vertikaliai talpinti numatytuoju dydžiu. Dialogo\ndydį naudotojas vis tiek gali keisti - tempkite kampą, kad\npadidintumėte, kai duomenų bazė turi daug lentelių.\n\nNumatyta: 10. Minimumas 1."
excel_auto_open = "Kiek kelialakščio Excel darbaknygės lakštų atverti\nautomatiškai (kiekvieną savo kortelėje). Darbaknygės su daugiau\nlakštų nei šis rodo parinkiklį, kad pasirinktumėte, kuriuos atverti\n(vis tiek galite pasirinkti daugiau nei šį skaičių arba visus).\n\nNumatyta: 5. Minimumas 1."
max_recent = "Paskutinių atvertų failų skaičius, rodomas Failo meniu"
start_maximised = "Kai įjungta, langas paleidžiamas išdidintas, o žemiau esantis dydis\nnaudojamas kaip atstatymo iš išdidinimo dydis.\nKai išjungta, langas paleidžiamas pasirinktu dydžiu."
initial_window_size = "Lango dydis, naudojamas paleidžiant (kai \"Pradėti išdidinta\" išjungta),\narba atstatymo iš išdidinimo dydis, kai įjungta."

map_default_mode = "Tessere: recupera una mappa slippy dall'URL delle tessere configurato.\nSolo geometria: disegna solo le feature su una tela vuota."
map_fallback = "Quando il recupero delle tessere fallisce (offline, bloccato), passare automaticamente al rendering solo geometria per quella scheda."
tile_url = "Modello di URL per le tessere raster. `{z}/{x}/{y}` vengono sostituiti con il livello di zoom e le coordinate della tessera. Il valore predefinito punta al server di tessere OSM - per produzione / uso intenso, punta a un provider self-hosted o commerciale."
sidebar_position = "Su quale lato si aggancia l'albero delle cartelle quando una\ncartella viene aperta tramite File > Apri cartella."
shortcuts_intro = "Fai clic su 'Registra' e premi una combinazione di tasti (con Ctrl / Shift / Alt).\nPremi Esc per annullare la registrazione. 'Cancella' lascia l'azione non associata."
initial_load_cap = "Numero massimo di righe caricate nella tabella alla prima apertura\nper i formati in streaming (Parquet, CSV, TSV). Le righe restanti\nvengono caricate in background mentre scorri.\n\nPredefinito: 5,000,000. Aumentarlo migliora la completezza del primo\ndisegno ma usa più memoria. Ridurlo rende l'apertura iniziale più\nveloce ma sposta più lavoro sul caricatore in background. Spunta\n\"Illimitato\" per disabilitare del tutto il limite e caricare subito\ntutte le righe.\n\nDigita un numero - applicato con Applica."
raw_view_cap = "Maximum file size (in MB) Octa reads fully into the Raw\nview editor. Also gates the parse-error raw fallback and\nthe Compare view's raw side. Larger files skip raw text to\nprotect memory.\n\nDefault: 500 MB. Tick \"Unlimited\" to load any file\nregardless of size. Applied on Apply."
raw_view_unlimited = "Read the full text of any file into the Raw view, with\nno size limit. Use only with RAM to spare - a multi-GB\nfile is read entirely into memory."
initial_load_unlimited = "Caricare subito tutte le righe del file. Consigliato solo\nquando hai RAM in abbondanza - un parquet da 100 M di righe\nconsuma diversi GB."
syntax_size_cap = "I file più grandi di questo passano a monospace semplice\nnell'editor grezzo. Imposta 0 per disabilitare del tutto\nl'evidenziazione della sintassi; imposta un numero molto grande\nper rinunciare alla protezione. JSON/YAML/XML/Markdown/TOML non\nvengono mai evidenziati - usano le loro viste albero/anteprima.\n\nPredefinito: 1 MB. Digita un numero, scegli un'unità - applicato con Applica."
open_as_text = "Estensioni di file aggiuntive da trattare come testo semplice\nall'apertura (sovrascrive il lettore che le rivendicherebbe\nnormalmente). Separate da virgole o spazi, senza punto iniziale,\nminuscole.\nEsempio: log4j  myproj  rawdata\n\nApplicato con Applica; ha effetto per le aperture successive."
multi_search_cap = "Limite di dimensione per file per l'ambito cartella del pannello\nRicerca multipla. I file più grandi vengono saltati ed elencati\nnel chip dei file saltati. Imposta 0 per disabilitare il limite.\n\nPredefinito: 50 MB."
chart_max_points = "Numero massimo di righe che la scheda Grafico traccerà prima che\nentri in azione il sottocampionamento equispaziato (Istogramma,\nLinea, Dispersione). I grafici a barre aggregano sempre tutto\nl'input; i box plot calcolano il riepilogo a 5 numeri su tutto\nl'input. Imposta 0 per disabilitare il campionamento - sicuro\nsolo per tabelle di dimensioni moderate.\n\nPredefinito: 100,000. L'input numerico accetta separatori di virgola."
chart_max_categories = "Numero massimo di categorie X distinte che un grafico a barre\naccetterà prima di rifiutarsi di disegnare. Oltre questo il renderer\nmostra un errore invece di un muro illeggibile di barre - filtra o\naggrega prima la tabella.\n\nPredefinito: 200. L'input numerico accetta separatori di virgola."
tables_in_picker = "Quante righe di tabella la finestra di selezione multi-tabella\n(SQLite, DuckDB, ...) deve contenere verticalmente alla sua\ndimensione predefinita. La finestra resta ridimensionabile -\ntrascina l'angolo per ingrandirla quando un database ha molte tabelle.\n\nPredefinito: 10. Minimo 1."
excel_auto_open = "Quanti fogli di una cartella di lavoro Excel multi-foglio aprire\nautomaticamente (ognuno nella propria scheda). Le cartelle con più\nfogli mostrano un selettore per scegliere quali aprire (puoi\ncomunque sceglierne più di questo numero, o tutti).\n\nPredefinito: 5. Minimo 1."
max_recent = "Numero di file aperti di recente mostrati nel menu File"
start_maximised = "Quando attivo, la finestra si avvia ingrandita e la dimensione qui\nsotto è usata come dimensione di ripristino.\nQuando disattivato, la finestra si avvia alla dimensione scelta."
initial_window_size = "Dimensione della finestra all'avvio (quando \"Avvia ingrandito\" è\ndisattivato), o dimensione di ripristino quando è attivo."

editor_font = "Carattere usato dall'editor SQL e dalla sua barra dei numeri di\nriga. JetBrains Mono è incluso in Octa.\n\nNota: le legature di programmazione non vengono applicate -\nil renderer di testo di egui non elabora ancora le\nsostituzioni GSUB di OpenType."

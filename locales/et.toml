readonly_notice = "Kuva kinnitusaken iga kord, kui lülitatakse ainult lugemise\nrežiimi (klahviga F8 või Vaate menüü kaudu). Lülitage välja, et\nmuuta olekut vaikselt."
notebook_output = "Koodi väljundi asukoht Jupyter märkmiku vaates\n(kehtib ainult .ipynb failidele märkmiku vaate režiimis)"
sql_open_default = "Tabelifaili avamisel kuva automaatselt\nSQL-redaktor tabelivaate kõrval."
sql_panel_position = "Kuhu SQL-redaktor tabeli suhtes dokitakse"
sql_row_limit = "LIMIT, mida kasutatakse kohatäitepäringus, kui kaart avatakse\n(nt 100 -> SELECT * FROM data LIMIT 100).\nSisestage arv - rakendatakse Rakenda nupul."
autocomplete = "Paku SQL-i märksõnade ja veerunimede soovitusi\nSQL-redaktori all."
editor_font = "Font, mida kasutab SQL-redaktor ja selle reanumbrite\nveeris. JetBrains Mono on Octaga kaasas.\n\nMärkus: programmeerimisligatuure ei rakendata - egui\ntekstirenderdaja ei töötle veel OpenType GSUB\nasendusi."
sql_diff_highlight = "Parast INSERT/UPDATE/DELETE paringut tosta korraks esile muudetud lahtrid ja read."
sql_diff_secs = "Kui kaua SQL muudatuste esiletostmine pusib enne kadumist."
mcp_intro = "MCP-serveri vaikeväärtused (`octa --mcp`). Server loeb need käivitamisel üks kord; nende muutmine töötava serveri ajal nõuab `octa --mcp` taaskäivitust."
mcp_row_limit = "Maksimaalne ridade arv, mille tagastavad `read_table` / `run_sql`, kui kutsuja jätab `limit` välja. Tööriista skeem reklaamib seda vaikeväärtust mudelile, et see saaks vajadusel rohkem (või piiramatult) küsida.\n\nVaikimisi: 1,000. Selle kõrgeks seadmine - või Piiramatu märkimine - võib suruda stdio kaudu väga suuri vastuseid ja aeglustada MCP-klienti."
cell_byte_cap = "Lahtripõhine ülekande suuruspiirang. Lahtrid, mille tekstivorm seda ületab, asendatakse `[truncated: ...]` märgisega ja vastus märgib `cell_truncated: true`. Seadke 0, et piirang keelata.\n\nVaikimisi: 65,536 (64 KiB)."
chat_intro = "Rakendusesisene tehisintellekti assistent, mis juhib Octa tööriistu teie avatud kaartide ja failide vastu. Valige pakkuja ja seadke selle API-võti (või käivitage Ollama kohapeal), seejärel avage paneel tööriistaribalt (Analüüsi menüü, Assistent)."
chat_max_iterations = "Maksimaalne tööriistakutsete voorude arv, mille assistent võib ühe sõnumi jooksul käivitada, enne kui ta peab peatuma. Kaitse kontrollimatute tööriistatsüklite vastu."
chat_max_tokens = "Vastuse pikkuse piirang (žetoonides), mida iga vastuse kohta küsitakse. Piiramatu laseb mudelil kasutada oma maksimumi (Anthropic vajab alati piirangut, seega kasutab seal kõrget väärtust)."
chat_provider = "Millise LLM-i taustaprogrammiga assistent suhtleb. Iga pakkuja vajab oma API-võtit, välja arvatud Ollama, mis töötab kohapeal."
chat_model = "Selle pakkuja jaoks kasutatav mudel. Valige eelseade või sisestage mis tahes mudeli nimi."
chat_base_url = "Põhi-URL OpenAI-ühilduva lõpp-punkti jaoks (OpenRouter, Groq, LM Studio, kohandatud lüüs)."
chat_ollama_url = "Teie kohaliku Ollama serveri juur-URL. Octa lisab API-teed."
chat_temperature = "Valimi juhuslikkus, vahemikus 0 (fokusseeritud, determineeritud) kuni 2 (loominguline). Andmeülesanneteks on soovitatav 0."
chat_position = "Kuhu vestluspaneel tabeli suhtes dokitakse."
chat_export_dir = "Kaust, kuhu assistent kirjutab eksporditud failid (uued CSV-d, diagrammid), kui te ei anna täielikku teed."
chat_audit_log = "Lisab iga abilise tooriistakutse logisse seadistuskaustas (chat_audit/). Vaikimisi valjas."
chat_audit_warn = "Naita kaivitamisel hoiatust, kui logid uletavad selle suuruse."
chat_api_key = "Teie API-võti selle pakkuja jaoks. Salvestatud teie OS-i võtmehoidlasse, kui saadaval, muidu lihttekstina failis settings.toml."
map_intro = "Kaardivaate vaikeväärtused (kasutavad GeoJSON-failid). Aktiivne kaart saab Kaardi tööriistariba kaudu vahetada Paanide ja Ainult geomeetria vahel."
map_default_mode = "Paanid: too libisev kaart konfigureeritud paani URL-ist.\nAinult geomeetria: joonista ainult objektid tühjale lõuendile."
map_fallback = "Kui paani toomine ebaõnnestub (võrguühenduseta, blokeeritud), lülitu selle kaardi jaoks automaatselt ainult geomeetria renderdamisele."
tile_url = "URL-muster rasterpaanide jaoks. `{z}/{x}/{y}` asendatakse suumitaseme ja paani koordinaatidega. Vaikimisi viitab OSM-i paaniserverile - tootmiseks / suure koormuse jaoks viidake ise majutatud või kommertspakkujale."
sidebar_position = "Millisel poolel kataloogipuu dokitakse, kui\nkaust avatakse menüüst Fail > Ava kataloog."
shortcuts_intro = "Klõpsake „Salvesta“, seejärel vajutage klahvikombinatsiooni (koos Ctrl / Shift / Alt).\nVajutage Esc salvestamise tühistamiseks. „Tühjenda“ jätab toimingu sidumata."
initial_load_cap = "Maksimaalne ridade arv, mis laaditakse tabelisse esimesel avamisel\nvoogesitusvormingute jaoks (Parquet, CSV, TSV). Ülejäänud read\nvoogesitatakse taustal kerides.\n\nVaikimisi: 5,000,000. Selle tõstmine parandab esimese kuva\ntäielikkust, kuid kasutab rohkem mälu. Selle langetamine muudab\nesialgse avamise kiiremaks, kuid lükkab rohkem tööd\ntaustalaaduri peale. Märkige \"Piiramatu\", et piirang täielikult\nkeelata ja laadida iga rida kohe.\n\nSisestage arv - rakendatakse Rakenda nupul."
raw_view_cap = "Maximum file size (in MB) Octa reads fully into the Raw\nview editor. Also gates the parse-error raw fallback and\nthe Compare view's raw side. Larger files skip raw text to\nprotect memory.\n\nDefault: 500 MB. Tick \"Unlimited\" to load any file\nregardless of size. Applied on Apply."
raw_view_unlimited = "Read the full text of any file into the Raw view, with\nno size limit. Use only with RAM to spare - a multi-GB\nfile is read entirely into memory."
initial_load_unlimited = "Laadi iga faili rida kohe. Soovitatav ainult,\nkui teil on RAM-i üle - 100 mln rea parquet sööb\nmitu GB."
syntax_size_cap = "Sellest suuremad failid taanduvad toorredaktoris tavalisele\npüsisammule. Seadke 0, et süntaksiesiletõst täielikult\nkeelata; seadke väga suur arv, et kaitsest loobuda.\nJSON/YAML/XML/Markdown/TOML ei tõsteta kunagi esile\n- need kasutavad oma spetsiaalseid puu/eelvaate vaateid.\n\nVaikimisi: 1 MB. Sisestage arv, valige ühik - rakendatakse Rakenda nupul."
open_as_text = "Lisafaililaiendid, mida avamisel käsitleda lihttekstina\n(alistab mis tahes lugeja, mis need tavaliselt hõivaks).\nKoma- või tühikueraldatud, ilma alguspunktita, väiketähtedega.\nNäide: log4j  myproj  rawdata\n\nRakendatakse Rakenda nupul; jõustub järgnevatel failiavamistel."
multi_search_cap = "Failipõhine suuruspiirang Mitmikotsingu paneeli kataloogi-\nulatuse jaoks. Sellest suuremad failid jäetakse vahele ja loetletakse\nvahelejäetud failide märgises. Seadke 0, et piirang keelata.\n\nVaikimisi: 50 MB."
chart_max_points = "Maksimaalne ridade arv, mille Diagrammi kaart joonistab enne, kui rakendub\nühtlaselt jaotatud allproovimine (Histogramm, Joon, Hajuvus). Tulpdiagrammid\nagregeerivad alati kogu sisendi; Karpdiagrammid arvutavad\n5-numbrilise kokkuvõtte kogu sisendi üle. Seadke 0, et keelata\nproovimine - ohutu ainult mõõdukate tabelite jaoks.\n\nVaikimisi: 100,000. Numbriline sisend aktsepteerib komaeraldajaid."
chart_max_categories = "Maksimaalne erinevate X-kategooriate arv, mida Tulpdiagramm aktsepteerib enne\njoonistamisest keeldumist. Sellest enam toob renderdaja esile vea,\nselle asemel et toota loetamatut tulpade seina - filtreerige või\nagregeerige tabelit kõigepealt.\n\nVaikimisi: 200. Numbriline sisend aktsepteerib komaeraldajaid."
tables_in_picker = "Mitu tabeli rida peaks mitmetabeli valija dialoog (SQLite,\nDuckDB, ...) oma vaikesuuruses vertikaalselt mahutama. Dialoogi\nsuurust saab kasutaja siiski muuta - lohistage nurka, et seda\nsuurendada, kui andmebaasis on palju tabeleid.\n\nVaikimisi: 10. Miinimum 1."
excel_auto_open = "Mitu mitmelehelise Exceli töövihiku lehte avada\nautomaatselt (igaüks oma kaardil). Töövihikud, millel on rohkem\nlehti kui see, näitavad valijat, et saaksite valida, milliseid avada\n(saate ikkagi valida rohkem kui selle arvu või kõik).\n\nVaikimisi: 5. Miinimum 1."
max_recent = "Hiljuti avatud failide arv, mis kuvatakse Faili menüüs"
start_maximised = "Kui sees, käivitatakse aken maksimeerituna ja allolevat suurust\nkasutatakse maksimeeringust taastamise suurusena.\nKui väljas, käivitatakse aken valitud suuruses."
initial_window_size = "Akna suurus, mida kasutatakse käivitamisel (kui \"Käivita maksimeerituna\" on väljas),\nvõi maksimeeringust taastamise suurus, kui see on sees."
ctrl_close = "Sulge"
ctrl_restore = "Taasta"
ctrl_full_size = "Täissuurus"
ctrl_minimise = "Minimeeri"


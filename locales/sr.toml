chat_audit_warn = "Prikazi upozorenje pri pokretanju kada logovi predju ovu velicinu."
chat_api_key = "Ваш API кључ за овог добављача. Чува се у привеску кључева ОС-а када је доступан, иначе у обичном тексту у settings.toml."
map_intro = "Подразумеване вредности за приказ Мапа (користе GeoJSON датотеке). Активна картица може пребацивати између Плочица и Само геометрије преко траке Мапе."
map_default_mode = "Плочице: преузми клизну мапу са конфигурисаног URL плочица.\nСамо геометрија: цртај само објекте на празном платну."
map_fallback = "Када преузимање плочица не успе (ван мреже, блокирано), аутоматски пребаци на цртање само геометрије за ту картицу."
tile_url = "URL шаблон за растерске плочице. `{z}/{x}/{y}` се замењују нивоом увеличања и координатама плочице. Подразумевано показује на OSM сервер плочица — за продукцију / интензивну употребу усмерите на самостално хостовани или комерцијални добављач."
sidebar_position = "Са које стране је прикачено стабло директоријума када\nсе фасцикла отвори преко Датотека > Отвори фасциклу."
shortcuts_intro = "Кликните „Сними“ па притисните комбинацију тастера (са Ctrl / Shift / Alt).\nПритисните Esc да откажете снимање. „Очисти“ оставља радњу неповезаном."
initial_load_cap = "Максималан број редова учитаних у табелу при првом отварању за\nпротокол формате (Parquet, CSV, TSV). Остали редови\nсе учитавају у позадини док скролујете.\n\nПодразумевано: 5,000,000. Повећање побољшава потпуност\nпрвог исцртавања али користи више меморије. Смањење чини\nпочетно отварање бржим али пребацује више посла на\nпозадински учитавач. Штиклирајте „Неограничено“ да онемогућите\nлимит у потпуности и учитате сваки ред одмах.\n\nУнесите број — примењује се при Примени."
raw_view_cap = "Највећа величина датотеке (у MB) коју Octa у целости учитава у уређивач\nсировог приказа. Ограничава и сирови резервни приказ при грешци\nрашчлањивања и сирову страну приказа поређења. Веће датотеке прескачу\nсирови текст ради заштите меморије.\n\nПодразумевано: 500 MB. Означите \"Неограничено\" да учитате сваку\nдатотеку без обзира на величину. Примењује се при потврди."
decompress_cap = "Највећа распакована величина (у MB) за провидно отворене\n.gz / .zst датотеке. Ситна сажета датотека може се огромно надувати\n(бомба распакивања); преко овог ограничења отварање се одбија.\n\nПодразумевано: 4.295 MB (4 GB). Примењује се при потврди."
decompress_unlimited = "Потпуно уклони ограничење величине распакивања. Означите ово\nсамо за архиве којима верујете."
raw_view_unlimited = "Учитај цео текст било које датотеке у сирови приказ, без\nограничења величине. Користите само уз вишак RAM-а - датотека од\nвише GB се у целости учитава у меморију."
initial_load_unlimited = "Учитај сваки ред у датотеци одмах. Препоручује се само\nкада имате вишка RAM-а — parquet од 100 M редова поједе\nнеколико GB."
syntax_size_cap = "Датотеке веће од овога прелазе на обичан monospace у\nсировом уређивачу. Поставите 0 да онемогућите истицање\nсинтаксе у потпуности; поставите врло велик број да одустанете\nод заштите. JSON/YAML/XML/Markdown/TOML се никада не истичу\n— они користе своје наменске приказе стабло/преглед.\n\nПодразумевано: 1 MB. Унесите број, изаберите јединицу — примењује се при Примени."
open_as_text = "Додатне екстензије датотека које се третирају као обичан текст при\nотварању (замењује читач који би их обично преузео).\nРаздвојено зарезом или размаком, без почетне тачке, малим словима.\nПример: log4j  myproj  rawdata\n\nПримењује се при Примени; ступа на снагу за наредна отварања датотека."
multi_search_cap = "Лимит величине датотеке за опсег директоријума панела Вишеструка претрага.\nДатотеке веће од овога се прескачу и наводе у чипу\nпрескочених датотека. Поставите 0 да онемогућите лимит.\n\nПодразумевано: 50 MB."
chart_max_points = "Максималан број редова које картица Графикон црта пре него што се\nукључи равномерно проређивање (Хистограм, Линија, Расути). Тракасти графикони\nувек агрегирају цео улаз; Кутијасти рачунају\n5-бројни резиме над целим улазом. Поставите 0 да онемогућите\nпроређивање — безбедно само за умерено велике табеле.\n\nПодразумевано: 100,000. Нумерички унос прихвата раздвајаче-зарезе."
chart_max_categories = "Максималан број различитих X категорија које тракасти графикон прихвата пре него\nшто одбије да црта. Изнад тога рендерер приказује грешку\nуместо да направи нечитљив зид трака — прво филтрирајте или\nагрегирајте табелу.\n\nПодразумевано: 200. Нумерички унос прихвата раздвајаче-зарезе."
tables_in_picker = "Колико редова табела дијалог за избор вишетабеларних извора (SQLite,\nDuckDB, ...) треба да уклопи вертикално при подразумеваној величини. Дијалог\nсе и даље може мењати по величини — повуците угао да га направите\nвећим када база података има много табела.\n\nПодразумевано: 10. Минимум 1."
excel_auto_open = "Колико листова вишелистне Excel радне свеске отворити\nаутоматски (сваки у својој картици). Радне свеске са више\nлистова од овога приказују бирач да изаберете које отворити\n(и даље можете изабрати више од овог броја, или све).\n\nПодразумевано: 5. Минимум 1."
max_recent = "Број недавно отвораних датотека приказаних у менију Датотека"
start_maximised = "Када је укључено, прозор се покреће максимизован, а величина испод\nсе користи као величина враћања са максимизовања.\nКада је искључено, прозор се покреће изабраном величином."
initial_window_size = "Величина прозора при покретању (када је „Покрени максимизовано“ искључено),\nили величина враћања са максимизовања када је укључено."
ctrl_close = "Затвори"

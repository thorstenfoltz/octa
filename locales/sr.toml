write_protection = "Штити ваше датотеке од чувања из графичког сучеља и од подразумеване поставке MCP сервера.\nКада је укључено, додавање или уклањање колона у SQLite, DuckDB или GeoPackage\nдатотеци одбија се при чувању. Асистентом се управља по профилу ћаскања\n(прекидач Дозволи уписивање у профилу), а не овом поставком."
backup_before_modify = "Пре него што асистент или чување базе које мења шему препише\nдатотеку, прво је копирај у .bak датотеку са временском ознаком поред ње.\nУобичајена ручна чувања се не копирају."
chat_profiles = "Сваки профил је једна сачувана поставка: добављач, модел, температура и необавезан буџет размишљања, под називом који изаберете. Направите их колико желите, укључујући више њих за истог добављача, и пребацујте се између њих из табле асистента."

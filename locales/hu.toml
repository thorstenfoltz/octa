syntax_size_cap = "Az ennél nagyobb fájlok egyszerű monospace-re váltanak a\nnyers szerkesztőben. 0 a szintaxiskiemelés teljes letiltásához;\nnagyon nagy szám a védelem kikapcsolásához. A\nJSON/YAML/XML/Markdown/TOML soha nem kap kiemelést\n- saját fa/előnézet nézetüket használják.\n\nAlapértelmezett: 1 MB. Írjon számot, válasszon egységet - az Alkalmazáskor."
open_as_text = "További fájlkiterjesztések, amelyek megnyitáskor egyszerű szövegként\nkezelendők (felülírják az egyébként rájuk vonatkozó olvasót).\nVesszővel vagy szóközzel elválasztva, kezdő pont nélkül, kisbetűvel.\nPélda: log4j  myproj  rawdata\n\nAz Alkalmazáskor lép életbe a következő fájlmegnyitásokra."
multi_search_cap = "Fájlonkénti méretkorlát a Többszörös keresés panel mappa-\nhatóköréhez. Az ennél nagyobb fájlok kimaradnak, és a kihagyott\nfájlok jelölőjében jelennek meg. 0 a korlát letiltásához.\n\nAlapértelmezett: 50 MB."
chart_max_points = "A Diagram lap által ábrázolt sorok maximuma, mielőtt az egyenletes\nmintacsökkentés bekapcsol (Hisztogram, Vonal, Pont). A sávdiagramok\nmindig a teljes bemenetet aggregálják; a Box diagramok az\n5-számú összegzést a teljes bemeneten számolják. 0 a mintavételezés\nletiltásához - csak közepes méretű tábláknál biztonságos.\n\nAlapértelmezett: 100 000. A számmező elfogad vesszős elválasztót."
chart_max_categories = "A sávdiagram által elfogadott különböző X kategóriák maximuma, mielőtt\nmegtagadná a rajzolást. Efölött a megjelenítő hibát ad\negy olvashatatlan sávfal helyett - előbb szűrje vagy\naggregálja a táblázatot.\n\nAlapértelmezett: 200. A számmező elfogad vesszős elválasztót."
tables_in_picker = "Hány táblasor férjen el függőlegesen a többtáblás választó\npárbeszédben (SQLite, DuckDB, ...) az alapméreténél. A\npárbeszéd átméretezhető marad - húzza a sarkát, hogy\nnagyobb legyen, ha az adatbázisnak sok táblája van.\n\nAlapértelmezett: 10. Minimum 1."
excel_auto_open = "Egy többlapos Excel-munkafüzet hány lapja nyíljon meg\nautomatikusan (mind külön lapon). Az ennél több lapos\nmunkafüzeteknél választó jelenik meg, hogy Ön döntse el, mit nyit meg\n(ennél többet, vagy mindet is választhatja).\n\nAlapértelmezett: 5. Minimum 1."
max_recent = "A Fájl menüben megjelenő legutóbbi fájlok száma"
start_maximised = "Bekapcsolva az ablak teljes méretben indul, és az alábbi méret\na visszaállítási méretként szolgál.\nKikapcsolva az ablak a választott méretben indul."
initial_window_size = "Az ablak indítási mérete (ha a \"Teljes méretben indítás\" ki van kapcsolva),\nvagy a visszaállítási méret, ha be van kapcsolva."
ctrl_close = "Bezárás"

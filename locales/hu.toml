chat_intro = "Beépített AI-asszisztens, amely az Octa eszközeit használja a megnyitott lapokon és fájlokon. Válasszon szolgáltatót és állítsa be az API-kulcsát (vagy futtasson Ollamát helyben), majd nyissa meg a panelt az eszköztárról (Elemzés menü, Asszisztens)."
chat_max_iterations = "Az eszközhívási körök maximális száma, amelyet az asszisztens egy üzeneten belül futtathat, mielőtt le kell állnia. Védelem az elszabaduló eszközhurkok ellen."
chat_max_tokens = "A válasz hosszának korlátja (tokenben) válaszonként. A Korlátlan engedi a modellnek a saját maximumát (az Anthropicnak mindig kell korlát, ezért ott magas értéket használ)."
chat_provider = "Melyik LLM-háttérrendszerrel beszél az asszisztens. Minden szolgáltatóhoz saját API-kulcs kell, kivéve az Ollamát, amely helyben fut."
chat_model = "Az ehhez a szolgáltatóhoz használt modell. Válasszon előbeállítást, vagy írjon be bármilyen modellnevet."
chat_base_url = "Az OpenAI-kompatibilis végpont alap URL-je (OpenRouter, Groq, LM Studio, egyéni átjáró)."
chat_ollama_url = "A helyi Ollama-kiszolgáló gyökér URL-je. Az Octa hozzáfűzi az API-útvonalakat."
chat_temperature = "A mintavételezés véletlenszerűsége 0 (fókuszált, determinisztikus) és 2 (kreatív) között. Adatfeladatokhoz a 0 ajánlott."
chat_position = "Hol rögzüljön a csevegőpanel a táblázathoz képest."
chat_export_dir = "A mappa, ahová az asszisztens az exportált fájlokat írja (új CSV-k, diagramok), ha nem ad meg teljes elérési utat."
chat_audit_log = "Minden asszisztens-eszkozhivas hozzafuzese egy naplohoz a konfiguracios konyvtarban (chat_audit/). Alapertelmezetten ki."
chat_audit_warn = "Figyelmeztetes inditaskor, ha a naplok meghaladjak ezt a meretet."
chat_api_key = "Az API-kulcsa ehhez a szolgáltatóhoz. Ha elérhető, az OS kulcstartójában tárolva, egyébként egyszerű szövegként a settings.toml-ban."
map_intro = "A Térkép nézet (GeoJSON fájlokhoz) alapértékei. Az aktív lap a Térkép eszköztáron válthat Csempék és Csak geometria között."
map_default_mode = "Csempék: csúszó térkép lekérése a beállított csempe-URL-ről.\nCsak geometria: csak az elemek rajzolása üres vászonra."
map_fallback = "Ha a csempe-letöltés sikertelen (offline, blokkolt), automatikusan átvált csak geometria megjelenítésre az adott lapon."
tile_url = "URL-minta raszteres csempékhez. A `{z}/{x}/{y}` helyére a nagyítási szint és a csempe koordinátái kerülnek. Az alapértelmezett az OSM csempe-kiszolgálóra mutat - éles / nagy terhelésű használathoz mutasson saját üzemeltetésű vagy kereskedelmi szolgáltatóra."
sidebar_position = "Melyik oldalon rögzüljön a mappafa, amikor egy\nmappát a Fájl > Mappa megnyitása útján nyitnak meg."
shortcuts_intro = "Kattintson a 'Rögzítés' gombra, majd nyomjon le egy billentyűkombinációt (Ctrl / Shift / Alt).\nAz Esc megszakítja a rögzítést. A 'Törlés' szabadon hagyja a műveletet."
initial_load_cap = "A táblázatba az első megnyitáskor betöltött sorok maximuma\nstreamelő formátumoknál (Parquet, CSV, TSV). A többi sor\na háttérben töltődik be görgetés közben.\n\nAlapértelmezett: 5 000 000. Növelése javítja az első\nmegjelenítés teljességét, de több memóriát használ. Csökkentése\ngyorsabbá teszi az első megnyitást, de több munkát hárít a\nháttérbetöltőre. Pipálja a \"Korlátlan\" jelölőt a korlát\nteljes letiltásához és minden sor előre betöltéséhez.\n\nÍrjon számot - az Alkalmazáskor lép életbe."
raw_view_cap = "Maximum file size (in MB) Octa reads fully into the Raw\nview editor. Also gates the parse-error raw fallback and\nthe Compare view's raw side. Larger files skip raw text to\nprotect memory.\n\nDefault: 500 MB. Tick \"Unlimited\" to load any file\nregardless of size. Applied on Apply."
raw_view_unlimited = "Read the full text of any file into the Raw view, with\nno size limit. Use only with RAM to spare - a multi-GB\nfile is read entirely into memory."
initial_load_unlimited = "A fájl minden sorának betöltése előre. Csak akkor ajánlott,\nha van szabad RAM - egy 100 M soros parquet több\nGB-ot fogyaszt."
syntax_size_cap = "Az ennél nagyobb fájlok egyszerű monospace-re váltanak a\nnyers szerkesztőben. 0 a szintaxiskiemelés teljes letiltásához;\nnagyon nagy szám a védelem kikapcsolásához. A\nJSON/YAML/XML/Markdown/TOML soha nem kap kiemelést\n- saját fa/előnézet nézetüket használják.\n\nAlapértelmezett: 1 MB. Írjon számot, válasszon egységet - az Alkalmazáskor."
open_as_text = "További fájlkiterjesztések, amelyek megnyitáskor egyszerű szövegként\nkezelendők (felülírják az egyébként rájuk vonatkozó olvasót).\nVesszővel vagy szóközzel elválasztva, kezdő pont nélkül, kisbetűvel.\nPélda: log4j  myproj  rawdata\n\nAz Alkalmazáskor lép életbe a következő fájlmegnyitásokra."
multi_search_cap = "Fájlonkénti méretkorlát a Többszörös keresés panel mappa-\nhatóköréhez. Az ennél nagyobb fájlok kimaradnak, és a kihagyott\nfájlok jelölőjében jelennek meg. 0 a korlát letiltásához.\n\nAlapértelmezett: 50 MB."
chart_max_points = "A Diagram lap által ábrázolt sorok maximuma, mielőtt az egyenletes\nmintacsökkentés bekapcsol (Hisztogram, Vonal, Pont). A sávdiagramok\nmindig a teljes bemenetet aggregálják; a Box diagramok az\n5-számú összegzést a teljes bemeneten számolják. 0 a mintavételezés\nletiltásához - csak közepes méretű tábláknál biztonságos.\n\nAlapértelmezett: 100 000. A számmező elfogad vesszős elválasztót."
chart_max_categories = "A sávdiagram által elfogadott különböző X kategóriák maximuma, mielőtt\nmegtagadná a rajzolást. Efölött a megjelenítő hibát ad\negy olvashatatlan sávfal helyett - előbb szűrje vagy\naggregálja a táblázatot.\n\nAlapértelmezett: 200. A számmező elfogad vesszős elválasztót."
tables_in_picker = "Hány táblasor férjen el függőlegesen a többtáblás választó\npárbeszédben (SQLite, DuckDB, ...) az alapméreténél. A\npárbeszéd átméretezhető marad - húzza a sarkát, hogy\nnagyobb legyen, ha az adatbázisnak sok táblája van.\n\nAlapértelmezett: 10. Minimum 1."
excel_auto_open = "Egy többlapos Excel-munkafüzet hány lapja nyíljon meg\nautomatikusan (mind külön lapon). Az ennél több lapos\nmunkafüzeteknél választó jelenik meg, hogy Ön döntse el, mit nyit meg\n(ennél többet, vagy mindet is választhatja).\n\nAlapértelmezett: 5. Minimum 1."
max_recent = "A Fájl menüben megjelenő legutóbbi fájlok száma"
start_maximised = "Bekapcsolva az ablak teljes méretben indul, és az alábbi méret\na visszaállítási méretként szolgál.\nKikapcsolva az ablak a választott méretben indul."
initial_window_size = "Az ablak indítási mérete (ha a \"Teljes méretben indítás\" ki van kapcsolva),\nvagy a visszaállítási méret, ha be van kapcsolva."

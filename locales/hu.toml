initial_load_cap = "A táblázatba az első megnyitáskor betöltött sorok maximuma\nstreamelő formátumoknál (Parquet, CSV, TSV). A többi sor\na háttérben töltődik be görgetés közben.\n\nAlapértelmezett: 5 000 000. Növelése javítja az első\nmegjelenítés teljességét, de több memóriát használ. Csökkentése\ngyorsabbá teszi az első megnyitást, de több munkát hárít a\nháttérbetöltőre. Pipálja a \"Korlátlan\" jelölőt a korlát\nteljes letiltásához és minden sor előre betöltéséhez.\n\nÍrjon számot - az Alkalmazáskor lép életbe."
raw_view_cap = "A legnagyobb fájlméret (MB-ban), amelyet az Octa teljesen beolvas\na nyers nézet szerkesztőjébe. Ez szabályozza az elemzési hiba utáni\nnyers tartaléknézetet és az összehasonlító nézet nyers oldalát is.\nA nagyobb fájloknál a nyers szöveg kimarad a memória védelmében.\n\nAlapértelmezett: 500 MB. Pipáld ki a \"Korlátlan\" jelölőt bármilyen\nméretű fájl betöltéséhez. Az Alkalmaz gombra lép érvénybe."

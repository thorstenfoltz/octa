mcp_row_limit = "A `read_table` / `run_sql` által visszaadott sorok maximuma, ha a hívó kihagyja a `limit`-et. Az eszközséma ezt az alapértéket közli a modellel, hogy szükség esetén többet (vagy korlátlant) kérhessen.\n\nAlapértelmezett: 1 000. Magasra állítva - vagy a Korlátlan bejelölve - nagyon nagy válaszokat tolhat át az stdio-n és lelassíthatja az MCP-klienst."

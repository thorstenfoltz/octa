name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true
        type: string
      release_notes:
        description: "Release notes (optional, auto-generated if empty)"
        required: false
        type: string

permissions:
  contents: write
  # TODO: Uncomment when enabling SignPath code signing
  # actions: read
  # id-token: write

env:
  CARGO_TERM_COLOR: always
  MAKEFLAGS: -j4

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/^version = .*/version = \"$VERSION\"/" Cargo.toml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libfontconfig1-dev libfreetype6-dev libharfbuzz-dev libfribidi-dev libjpeg-dev libopenjp2-7-dev libgumbo-dev libjbig2dec0-dev libmujs-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build and test
        run: |
          cargo test --release
          cargo build --release

      - name: Package Linux release
        run: |
          DIR="octo-${VERSION}-linux-x86_64"
          mkdir -p "$DIR/assets"
          cp target/release/octo "$DIR/"
          cp install.sh "$DIR/"
          cp uninstall.sh "$DIR/"
          cp octo.desktop "$DIR/"
          cp assets/octo.svg "$DIR/assets/"
          cp assets/octo.png "$DIR/assets/"
          cp pkg/README-linux.md "$DIR/README.md"
          cp LICENSE "$DIR/" 2>/dev/null || true
          tar czf "${DIR}.tar.gz" "$DIR/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: octo-${{ env.VERSION }}-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest
    # TODO: Uncomment when enabling SignPath code signing
    # outputs:
    #   unsigned-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v5

      - name: Set version
        env:
          VERSION: ${{ inputs.version }}
        shell: pwsh
        run: |
          echo "VERSION=$env:VERSION" >> $env:GITHUB_ENV
          (Get-Content Cargo.toml) -replace '^version = .*', "version = `"$env:VERSION`"" | Set-Content Cargo.toml

      - name: Generate ICO from PNG
        run: magick assets/octo.png -define icon:auto-resize=256,128,64,48,32,16 assets/octo.ico

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build and test
        run: |
          cargo test --release
          cargo build --release

      - name: Package Windows release
        shell: pwsh
        run: |
          $dir = "octo-$env:VERSION-windows-x86_64"
          New-Item -ItemType Directory -Path "$dir\assets" -Force
          Copy-Item "target\release\octo.exe" "$dir\"
          Copy-Item "install.bat" "$dir\"
          Copy-Item "assets\octo.svg" "$dir\assets\"
          Copy-Item "assets\octo.png" "$dir\assets\"
          if (Test-Path "assets\octo.ico") { Copy-Item "assets\octo.ico" "$dir\assets\" }
          Copy-Item "pkg\README-windows.md" "$dir\README.md"
          if (Test-Path "LICENSE") { Copy-Item "LICENSE" "$dir\" }
          Compress-Archive -Path "$dir\*" -DestinationPath "octo-$env:VERSION-windows-x86_64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: windows-release
          path: octo-${{ env.VERSION }}-windows-x86_64.zip


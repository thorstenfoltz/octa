name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true
        type: string
      publish_to_store:
        description: "Submit the MSIX to the Microsoft Store (needs PARTNER_CENTER_* secrets; off until Store setup is finished)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  # TODO: Uncomment when enabling SignPath code signing
  # actions: read
  # id-token: write

env:
  CARGO_TERM_COLOR: always
  MAKEFLAGS: -j4

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      # lfs: true is mandatory: assets/ (octa.png, the .ttf/.otf fonts that
      # src/ui/theme embeds via include_bytes!) is tracked in git LFS. Without
      # it checkout fetches only the LFS pointer stubs: the binary compiles but
      # ships tofu fonts, and the Windows magick step errors "improper image
      # header".
      - uses: actions/checkout@v5
        with:
          lfs: true

      # ubuntu-latest ships ~20 GB of preinstalled toolchains (dotnet/android/
      # ghc) this build never touches, leaving only ~21 GB on /. `cargo build
      # --release` (bundled DuckDB C++ + two Arrow versions) plus the AppImage
      # bundling below overrun it and crash the runner with "No space left on
      # device". Reclaim the bloat before compiling. Mirrors ci.yml::test.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/local/lib/node_modules "$AGENT_TOOLSDIRECTORY"
          df -h /

      - name: Set version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/^version = .*/version = \"$VERSION\"/" Cargo.toml

      - name: Install system dependencies
        # asciidoctor renders the man page from docs/cli/octa.1.adoc; bundled
        # with the Linux tarball so `install.sh` can drop it into
        # share/man/man1/. Same package on macOS via brew (asciidoctor) and
        # on Arch via the standard repo, but Linux release is the only path
        # that needs it in CI.
        #
        # The remaining packages are linuxdeploy / linuxdeploy-plugin-gtk
        # runtime deps used in the "Build AppImage" step: patchelf rewrites
        # rpaths in the bundled binary; gtk/gdk-pixbuf/rsvg *-bin packages
        # supply the loader-cache tools the plugin invokes.
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libfontconfig1-dev libfreetype6-dev asciidoctor patchelf librsvg2-common libgdk-pixbuf2.0-bin libgtk-3-bin

      - uses: dtolnay/rust-toolchain@stable

      # No `cargo test` here. PR-time CI (ci.yml::test) already ran fmt + clippy
      # + tests against this exact commit before merge; re-running on tag push
      # would double the wall-time of every release without catching anything new.
      - name: Build release binary
        run: cargo build --release

      - name: Render man page
        run: asciidoctor -b manpage docs/cli/octa.1.adoc -o octa.1

      - name: Package Linux release
        run: |
          DIR="octa-${VERSION}-linux-x86_64"
          mkdir -p "$DIR/assets"
          cp target/release/octa "$DIR/"
          cp install.sh "$DIR/"
          cp uninstall.sh "$DIR/"
          cp octa.desktop "$DIR/"
          cp assets/octa.svg "$DIR/assets/"
          cp assets/octa.png "$DIR/assets/"
          cp pkg/README-linux.md "$DIR/README.md"
          cp LICENSE "$DIR/" 2>/dev/null || true
          cp octa.1 "$DIR/"
          tar czf "${DIR}.tar.gz" "$DIR/"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-release
          path: octa-${{ env.VERSION }}-linux-x86_64.tar.gz

      - name: Download AppImage tooling
        # linuxdeploy ships only as a rolling "continuous" release. Pinning by
        # tag isn't an option; if a future linuxdeploy release breaks the build,
        # swap to a specific dated tag from
        # https://github.com/linuxdeploy/linuxdeploy/releases.
        run: |
          cd "$RUNNER_TEMP"
          wget -q -O linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q -O linuxdeploy-plugin-gtk https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy linuxdeploy-plugin-gtk
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Build AppImage
        env:
          OUTPUT: Octa-${{ env.VERSION }}-x86_64.AppImage
          # linuxdeploy-plugin-gtk can't auto-detect a GTK version when the
          # ELF doesn't link libgtk directly (our binary only pulls libgtk
          # transitively through eframe at runtime); set it explicitly to
          # match the libgtk-3-dev we install above.
          DEPLOY_GTK_VERSION: "3"
        # APPIMAGE_EXTRACT_AND_RUN sidesteps FUSE: ubuntu-latest (24.04) no
        # longer ships libfuse2 by default, and running AppImages without it
        # otherwise fails with "dlopen(): error loading libfuse.so.2".
        run: |
          rm -rf AppDir
          APPIMAGE_EXTRACT_AND_RUN=1 linuxdeploy \
            --appdir AppDir \
            --executable target/release/octa \
            --desktop-file octa.desktop \
            --icon-file assets/octa.png \
            --plugin gtk \
            --output appimage
          # Current linuxdeploy-plugin-appimage honours $OUTPUT and writes
          # the AppImage with that exact name, so the rename is usually a
          # no-op (and `mv X X` errors with "same file"). Only rename if the
          # plugin ever reverts to its older "<Name>-x86_64.AppImage"
          # filename derived from the desktop Name field.
          if [ ! -f "$OUTPUT" ]; then
            mv Octa-*.AppImage "$OUTPUT"
          fi

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-appimage
          path: Octa-${{ env.VERSION }}-x86_64.AppImage

  build-windows:
    # Pinned off windows-latest: that image now ships VS 18 / MSVC 14.51, which
    # fails to compile bundled DuckDB (libduckdb-sys) -- cl.exe exits 2 on
    # ub_src_storage_compression_chimp.cpp. windows-2022 (VS 2022 / MSVC 14.4x)
    # builds it cleanly. Revisit when libduckdb-sys supports the newer toolset.
    runs-on: windows-2022
    # TODO: Uncomment when enabling SignPath code signing
    # outputs:
    #   unsigned-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
    steps:
      # lfs: true: see build-linux. The Generate ICO step below feeds
      # assets/octa.png (an LFS object) to magick.
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set version
        env:
          VERSION: ${{ inputs.version }}
        shell: pwsh
        run: |
          echo "VERSION=$env:VERSION" >> $env:GITHUB_ENV
          (Get-Content Cargo.toml) -replace '^version = .*', "version = `"$env:VERSION`"" | Set-Content Cargo.toml

      - name: Generate ICO from PNG
        run: magick assets/octa.png -define icon:auto-resize=256,128,64,48,32,16 assets/octa.ico

      - uses: dtolnay/rust-toolchain@stable

      # See linux comment: PR-time CI already covered tests on this commit.
      - name: Build release binary
        run: cargo build --release

      - name: Generate MSIX logo assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path msix\Images -Force | Out-Null
          $sizes = @{
            "Square44x44Logo.png"   = 44
            "Square71x71Logo.png"   = 71
            "Square150x150Logo.png" = 150
            "Square310x310Logo.png" = 310
            "StoreLogo.png"         = 50
          }
          foreach ($name in $sizes.Keys) {
            $s = $sizes[$name]
            magick assets/octa.png -resize "$($s)x$($s)" "msix\Images\$name"
          }
          # Wide tile: 150px logo centred on a transparent 310x150 canvas.
          magick assets/octa.png -resize 150x150 -background none -gravity center -extent 310x150 msix\Images\Wide310x150Logo.png

      - name: Stage MSIX payload
        shell: pwsh
        run: |
          Copy-Item target\release\octa.exe msix\octa.exe
          $ver = "$env:VERSION.0"
          (Get-Content windows\AppxManifest.xml) -replace 'Version="0\.0\.0\.0"', "Version=`"$ver`"" | Set-Content msix\AppxManifest.xml
          Write-Host "Manifest version set to $ver"

      - name: Pack MSIX
        shell: pwsh
        run: |
          $sdk = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Directory |
            Where-Object { Test-Path "$($_.FullName)\x64\makeappx.exe" } |
            Sort-Object Name -Descending | Select-Object -First 1
          if (-not $sdk) { throw "makeappx.exe not found in Windows SDK" }
          $makeappx = Join-Path $sdk.FullName "x64\makeappx.exe"
          & $makeappx pack /d msix /p "octa-$env:VERSION.0.msix" /o
          if ($LASTEXITCODE -ne 0) { throw "makeappx failed ($LASTEXITCODE)" }
          Write-Host "Built octa-$env:VERSION.0.msix"

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-msix
          path: octa-${{ env.VERSION }}.0.msix

      - name: Package Windows release
        shell: pwsh
        run: |
          $dir = "octa-$env:VERSION-windows-x86_64"
          New-Item -ItemType Directory -Path "$dir\assets" -Force
          Copy-Item "target\release\octa.exe" "$dir\"
          Copy-Item "install.bat" "$dir\"
          Copy-Item "assets\octa.svg" "$dir\assets\"
          Copy-Item "assets\octa.png" "$dir\assets\"
          if (Test-Path "assets\octa.ico") { Copy-Item "assets\octa.ico" "$dir\assets\" }
          Copy-Item "pkg\README-windows.md" "$dir\README.md"
          if (Test-Path "LICENSE") { Copy-Item "LICENSE" "$dir\" }
          Compress-Archive -Path "$dir\*" -DestinationPath "octa-$env:VERSION-windows-x86_64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-release
          path: octa-${{ env.VERSION }}-windows-x86_64.zip

  # Submit the packed MSIX to the Microsoft Store. A top-level job (not in
  # `publish`'s needs chain) so a Store failure cannot block the GitHub release.
  store-publish:
    needs: build-windows
    if: ${{ inputs.publish_to_store }}
    runs-on: windows-2022
    steps:
      - name: Download MSIX artifact
        uses: actions/download-artifact@v6
        with:
          name: windows-msix

      - name: Set up Microsoft Store CLI
        uses: microsoft/setup-msstore-cli@v1

      - name: Configure Partner Center credentials
        shell: pwsh
        env:
          TENANT: ${{ secrets.PARTNER_CENTER_TENANT_ID }}
          SELLER: ${{ secrets.PARTNER_CENTER_SELLER_ID }}
          CLIENT_ID: ${{ secrets.PARTNER_CENTER_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.PARTNER_CENTER_CLIENT_SECRET }}
        run: |
          msstore reconfigure --tenantId $env:TENANT --sellerId $env:SELLER --clientId $env:CLIENT_ID --clientSecret $env:CLIENT_SECRET

      - name: Submit MSIX to the Store
        shell: pwsh
        run: |
          $pkg = (Get-ChildItem *.msix | Select-Object -First 1).Name
          Write-Host "Publishing $pkg"
          msstore publish $pkg

  build-macos:
    runs-on: macos-latest
    steps:
      # lfs: true: see build-linux. sips/iconutil below consume assets/octa.png.
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Set version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i '' "s/^version = .*/version = \"$VERSION\"/" Cargo.toml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      # See linux comment: PR-time CI already covered tests on this commit.
      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Generate ICNS from PNG
        run: |
          ICONSET="assets/octa.iconset"
          mkdir -p "$ICONSET"
          for size in 16 32 64 128 256 512; do
            sips -z $size $size assets/octa.png --out "$ICONSET/icon_${size}x${size}.png"
            double=$((size * 2))
            sips -z $double $double assets/octa.png --out "$ICONSET/icon_${size}x${size}@2x.png"
          done
          iconutil -c icns "$ICONSET" -o assets/octa.icns

      - name: Build .app bundle
        run: |
          APP="Octa.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp target/aarch64-apple-darwin/release/octa "$APP/Contents/MacOS/octa"
          chmod +x "$APP/Contents/MacOS/octa"
          cp assets/octa.icns "$APP/Contents/Resources/octa.icns"
          cat > "$APP/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key><string>en</string>
            <key>CFBundleDisplayName</key><string>Octa</string>
            <key>CFBundleExecutable</key><string>octa</string>
            <key>CFBundleIconFile</key><string>octa</string>
            <key>CFBundleIdentifier</key><string>dev.octa.Octa</string>
            <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
            <key>CFBundleName</key><string>Octa</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>NSPrincipalClass</key><string>NSApplication</string>
          </dict>
          </plist>
          EOF

      - name: Ad-hoc codesign the bundle
        run: |
          # Sign the inner binary first, then seal the bundle. Ad-hoc (`-`) is
          # not Developer ID: Gatekeeper still warns — but it converts the
          # "Octa.app is damaged" dead-end into the standard "unidentified
          # developer" dialog, where right-click → Open works.
          codesign --force --sign - --timestamp=none \
            --identifier dev.octa.Octa \
            Octa.app/Contents/MacOS/octa
          codesign --force --sign - --timestamp=none Octa.app
          codesign --verify --verbose Octa.app

      - name: Package macOS release
        run: |
          DIR="octa-${VERSION}-macos-aarch64"
          mkdir -p "$DIR"
          cp -R Octa.app "$DIR/"
          cp pkg/README-macos.md "$DIR/README.md"
          cp LICENSE "$DIR/" 2>/dev/null || true
          tar czf "${DIR}.tar.gz" "$DIR/"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: macos-release
          path: octa-${{ env.VERSION }}-macos-aarch64.tar.gz

  publish:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          # Only the release artifacts from the build-* jobs this job needs
          # (linux-release, linux-appimage, windows-release, macos-release).
          # Without this, the blanket download also grabs the dockerbuild build
          # record uploaded by the parallel docker-publish job (now also
          # disabled there), which can still be mid-upload and fail the step.
          pattern: "*-{release,appimage}"

      - name: Generate SHA256SUMS
        # The in-app updater downloads SHA256SUMS from the release and
        # refuses an archive whose hash does not match, so every published
        # artifact must be listed here.
        run: |
          mkdir -p dist
          cp artifacts/linux-release/*.tar.gz \
             artifacts/linux-appimage/*.AppImage \
             artifacts/windows-release/*.zip \
             artifacts/macos-release/*.tar.gz \
             dist/
          (cd dist && sha256sum -- *.tar.gz *.AppImage *.zip > SHA256SUMS)
          cat dist/SHA256SUMS

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          NOTES_ARGS="--generate-notes"
          if [ -s release_notes.md ]; then
            NOTES_ARGS="--notes-file release_notes.md"
          fi
          gh release create "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Octa $VERSION" \
            $NOTES_ARGS \
            dist/*

  aur-publish:
    needs: [publish]
    runs-on: ubuntu-latest
    environment:
      name: aur
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download tarballs and compute sha256
        id: sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          # Source tarball (GitHub auto-generated archive)
          curl -fL -o source.tar.gz \
            "https://github.com/$GITHUB_REPOSITORY/archive/${VERSION}.tar.gz"
          SOURCE_SHA256=$(sha256sum source.tar.gz | awk '{print $1}')
          echo "source=$SOURCE_SHA256" >> "$GITHUB_OUTPUT"
          echo "Source sha256: $SOURCE_SHA256"

          # Binary tarball (release artifact)
          gh release download "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "octa-${VERSION}-linux-x86_64.tar.gz" \
            --output binary.tar.gz
          BINARY_SHA256=$(sha256sum binary.tar.gz | awk '{print $1}')
          echo "binary=$BINARY_SHA256" >> "$GITHUB_OUTPUT"
          echo "Binary sha256: $BINARY_SHA256"

      - name: Prepare PKGBUILDs
        env:
          VERSION: ${{ inputs.version }}
          SOURCE_SHA256: ${{ steps.sha.outputs.source }}
          BINARY_SHA256: ${{ steps.sha.outputs.binary }}
        run: |
          # octa (source)
          sed -i "s/X\.X\.X/$VERSION/g" .github/aur/PKGBUILD .github/aur/.SRCINFO
          sed -i "s/sha256sums=('SKIP')/sha256sums=('$SOURCE_SHA256')/" .github/aur/PKGBUILD
          sed -i "s/sha256sums = SKIP/sha256sums = $SOURCE_SHA256/" .github/aur/.SRCINFO

          # octa-bin (binary)
          sed -i "s/X\.X\.X/$VERSION/g" .github/aur-bin/PKGBUILD .github/aur-bin/.SRCINFO
          sed -i "s/sha256sums=('SKIP')/sha256sums=('$BINARY_SHA256')/" .github/aur-bin/PKGBUILD
          sed -i "s/sha256sums = SKIP/sha256sums = $BINARY_SHA256/" .github/aur-bin/.SRCINFO

      - name: Configure SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur

          cat >> ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          EOF

          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Push to AUR
        env:
          VERSION: ${{ inputs.version }}
        run: |
          # One function, both packages. AUR's SSH occasionally drops the
          # connection mid-clone ("Connection closed ... port 22"), so retry.
          # "Nothing changed" (files already match the AUR repo, e.g. a partial
          # previous run) is a graceful skip, not a failure.
          push_pkg() {
            repo="$1"; srcdir="$2"; dest="/tmp/aur-$repo"

            for attempt in 1 2 3; do
              git -c init.defaultBranch=master clone \
                "ssh://aur@aur.archlinux.org/$repo.git" "$dest" && break
              echo "clone $repo attempt $attempt failed; retrying in 10s"
              rm -rf "$dest"
              sleep 10
            done
            test -d "$dest" || { echo "clone $repo failed after retries"; exit 1; }

            cp "$srcdir/PKGBUILD" "$srcdir/.SRCINFO" "$dest/"
            cd "$dest"

            echo "--- $repo PKGBUILD ---"; cat PKGBUILD
            echo "--- $repo .SRCINFO ---"; cat .SRCINFO

            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add PKGBUILD .SRCINFO
            if git diff --cached --quiet; then
              echo "$repo: already up to date, nothing to push"
            else
              git commit -m "release $VERSION"
              git push
            fi
            cd - >/dev/null
          }

          push_pkg octa .github/aur
          push_pkg octa-bin .github/aur-bin

  # Publish the headless image to GitHub Container Registry. Runs in PARALLEL
  # with the build-* jobs (no `needs:`), not after `publish`: the Dockerfile
  # builds from source in-image and never consumed the release artifacts, so the
  # old `needs: [publish]` was pure ordering that tacked a ~20-min serial tail
  # onto every release. The image push (version + latest) is independent of the
  # GitHub Release. Built from source in-image (the Dockerfile's debian-12
  # builder produces a glibc-correct binary for the distroless runtime; reusing
  # the ubuntu-24.04 build-linux artifact would risk a newer-glibc mismatch).
  docker-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # docker/* actions are pinned to their first Node.js 24 majors
    # (login@v4, metadata@v6, build-push@v7), so no FORCE_JAVASCRIPT_ACTIONS_TO_NODE24
    # opt-in is needed ahead of the June 16 2026 forced Node.js 20 removal.
    # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
    env:
      # build-push-action otherwise uploads a "<repo>.dockerbuild" build-record
      # artifact. The parallel `publish` job does a blanket download-artifact
      # (no filter) and would grab that record mid-upload, failing with
      # "Artifact download failed after 5 retries". We don't consume the record
      # anywhere, so disable it outright.
      DOCKER_BUILD_RECORD_UPLOAD: false
    steps:
      # lfs: true: the Dockerfile's `COPY assets ./assets` + in-image cargo
      # build embeds the LFS-tracked fonts via include_bytes!; pointer stubs
      # would build a binary with tofu fonts.
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + OCI labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          # Stamps the binary's embedded CARGO_PKG_VERSION so `octa --version`
          # inside the image matches the release tag.
          build-args: |
            OCTA_VERSION=${{ inputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
